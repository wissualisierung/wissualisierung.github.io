a.org/wiki/Br%C3%BCder_Grimm#/media/Datei:Brothers_Grimm_Blow.jpg', theme: 'sebastian-wolf', modules: [{"type":"framing","content":"Du triffst gleich auf Jacob und Wilhelm Grimm – oder besser: auf eine Konstruktion, die so spricht, wie sie vielleicht geschrieben und gesprochen hätten. Die Brüder Grimm sind längst Geschichte: Wilhelm starb am 16. Januar 1859, Jacob folgte ihm vier Jahre später, am 20. September 1863. Was du hier liest, basiert auf ihren Werken, Briefen und überlieferten Äußerungen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Grimms Leben","start":1785,"end":1863,"active":true,"info":"Jakob am 4. Jan. 1785 in Hanau, Wilhelm am 24. Feb. 1786 geboren. Tod des Vaters 1796. Gemeinsam bis zuletzt."},{"name":"Romantik","start":1795,"end":1835,"active":false,"info":"Volksmärchen, Sagen, Volkslieder als Kulturschatz der Nation."},{"name":"Restauration/Vormärz","start":1815,"end":1848,"active":false,"info":"Politische Repression, aber auch bürgerliches Engagement."},{"name":"Göttinger Sieben","start":1837,"end":1837,"active":false,"info":"Protest gegen Verfassungsbruch Königs Ernst August."},{"name":"Berliner Zeit","start":1841,"end":1863,"active":false,"info":"Berufung nach Berlin. Arbeit am Deutschen Wörterbuch."}]},{"type":"persona","content":"Guten Tag. Ich bin Jacob Grimm – und mein Bruder Wilhelm ist stets in meiner Nähe. Man nennt uns immer im Doppelpack, fast als wären wir eineiige Zwillinge. Aber wir waren zwei sehr verschiedene Menschen: ich, klein, zäh, robust und von zornigem Fleiß; er, größer, weicher, mit träumerischen Augen und liebendem Wesen. Das Geheimnis unserer Verbindung war nicht Ähnlichkeit, sondern Polarität. Und doch war er die Hälfte von mir. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"learner","content":"Wie seid ihr eigentlich zu Märchen und Sprachforschung gekommen?"},{"type":"context","content":"Jacob und Wilhelm Grimm wurden 1785 und 1786 in Hanau geboren. Ihr Vater, Amtmann in Steinau, starb 1796 – die Familie stand vor dem Nichts. Tante Henriette, Kammerfrau am Kasseler Hof, ermöglichte den Brüdern den Besuch der höheren Schule. Sie teilten sich ein Zimmer, studierten gemeinsam am selben Tisch Jura in Marburg – und entdeckten dabei durch ihren Professor Savigny die altdeutsche Dichtung. In der königlichen Bibliothek zu Kassel, die niemand besuchte, brachten sie sich selbst Alt- und Mittelhochdeutsch bei."},{"type":"persona","content":"König Jeromes Bibliothek war ein Geschenk des Himmels. Bücher wurden kaum verlangt, niemand kam. Die ganze Zeit war mein – und ich verwandte sie auf das Studium der altdeutschen Poesie und Sprache. Als ich in Savignys Bücherei erstmals Minnelieder las, erfüllte mich das mit ganz eigener Ahnung. Diese Gedichte waren in einem seltsamen, halb unverständlichen Deutsch – und ich hatte die größte Lust, unsere alten Dichter genau zu lesen und zu verstehen. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"learner","content":"Und wie sind die Kinder- und Hausmärchen entstanden?"},{"type":"context","content":"Sechs Jahre lang sammelten die Brüder Grimm Märchen aus ihrer Umgebung. Eine besonders ergiebige Quelle war die Sonnenapotheke von Rudolf Wild in Kassel: Frau Wild und ihre Töchter Gretchen und Dorothea kannten viele Geschichten. Dortchen Wild – die spätere Frau Wilhelms – lieferte u. a. „Frau Holle\" und „Tischlein, deck dich\". Es gab aber auch männliche Erzähler, etwa den pensionierten Dragonerwachtmeister Krause. 1812 erschien die erste Ausgabe der Kinder- und Hausmärchen, die sofort ein großer Erfolg wurde."},{"type":"persona","content":"Es war vielleicht gerade Zeit, diese Märchen festzuhalten – denn diejenigen, die sie bewahren sollten, wurden immer seltener. Wir haben nicht einfach abgeschrieben. Wir haben die Märchen, die von den verschiedensten Zuträgern stammten, in einen einheitlichen Erzählton gefasst. Erotische Anspielungen haben wir getilgt, dem Anspruch des „Kinder- und Hausmärchens\" zuliebe. Darüber hinaus haben wir die wissenschaftliche Märchenforschung begründet: Wir unterschieden das Märchen von der Sage. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"annotation","text":"Das Märchen ist poetisch, die Sage historisch. Jenes steht nur in sich selbst. Die Sage ist an einen Ort oder einen geschichtlichen Namen gebunden. Sie kann nicht wie das Märchen überall zu Hause sein.","prompt":"Markiere die begrifflichen Unterscheidungen.","targets":[{"word":"poetisch","feedback":"Das Märchen ist frei von Ort und Zeit – es spielt „irgendwo\" und „irgendwann\". Das macht seine universelle Wirkung aus."},{"word":"historisch","feedback":"Die Sage verankert sich in konkreter Geschichte – ein Ort, ein Name, eine Überlieferung. Sie beansprucht eine Art Wahrheit."}]},{"type":"quiz-single","question":"Welche Aussage über die Entstehung der Kinder- und Hausmärchen ist korrekt?","options":[{"text":"Die Brüder sammelten ausschließlich bei Bauern auf dem Land.","correct":false,"feedback":"Nicht zutreffend. Viele Erzählerinnen stammten aus bürgerlichen Verhältnissen, etwa die Familie Wild in Kassel."},{"text":"Frauen bewahrten am häufigsten die alten Märchen – aber es gab auch männliche Erzähler.","correct":true,"feedback":"Richtig! Im Podcast wird betont, dass Frauen die wichtigsten Trägerinnen der Märchentradition waren, aber z.B. auch der Dragonerwachtmeister Krause Märchen kannte."},{"text":"Die erste Ausgabe erschien erst 1825 mit Illustrationen von Ludwig Emil.","correct":false,"feedback":"Nein – die erste Ausgabe erschien 1812. Die populäre illustrierte Ausgabe folgte 1825."},{"text":"Die Märchen wurden vollständig unverändert übernommen.","correct":false,"feedback":"Falsch. Die Grimms formten die Märchen sprachlich um und tilgten erotische Anspielungen."}]},{"type":"learner","content":"Ihr wart also nicht nur Märchensammler, sondern auch politisch aktiv?"},{"type":"context","content":"1830 wurden die Brüder an die Universität Göttingen berufen – Jacob als ordentlicher, Wilhelm als außerordentlicher Professor. 1837 starb König Wilhelm von Hannover. Sein Nachfolger Ernst August erklärte die Verfassung von 1833 für ungültig und forderte von den Beamten eine Ergebenheitsadresse. Sieben Göttinger Professoren – darunter Jacob und Wilhelm Grimm – verweigerten sich und unterzeichneten einen öffentlichen Protest. Die Folge: fristlose Entlassung und Ausweisung aus dem Königreich Hannover. Der preußische König Friedrich Wilhelm IV. berief sie daraufhin nach Berlin."},{"type":"persona","content":"Die Unterzeichner lehnten es ab, ihren auf die frühere Verfassung geleisteten Eid zu brechen. Wir beharrten auf dem Zusammenhang von Wahrheit und Recht und wollten nicht stillschweigend die Beseitigung des Staatsgrundgesetzes auf dem Wege bloßer Macht geschehen lassen. König Ernst August ließ uns fristlos entlassen. Er soll gesagt haben: „Professoren, Huren und Tänzerinnen kann man überall haben, wo man ihnen einige Taler bietet.\" Wir haben das als Auszeichnung genommen. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"quote","text":"Die Unterzeichner lehnen es ab, ihren auf die frühere Verfassung geleisteten Eid zu brechen und beharren auf dem Zusammenhang von Wahrheit und Recht. Sie wollen nicht stillschweigend die Beseitigung des Staatsgrundgesetzes allein auf dem Wege der Macht geschehen lassen.","source":"Protest der Göttinger Sieben, 1837"},{"type":"barometer","statement":"Der Protest der Göttinger Sieben war ein mutiger Akt mit echten Konsequenzen.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"learner","content":"Was war eigentlich euer größtes wissenschaftliches Werk?"},{"type":"context","content":"In der Berliner Zeit begannen die Brüder Grimm ihr ehrgeizigstes Projekt: das Deutsche Wörterbuch. Anders als bisherige Wörterbücher sollte es nicht nur den gegenwärtigen Wortbestand verzeichnen, sondern die historische Entwicklung jedes Wortes zeigen: Wann taucht es zum ersten Mal auf? In welchem Sinn wurde es verwendet? Trotz 80 Mitarbeitern kamen die Brüder selbst nur bis zum Wort „Frucht\". Viele Generationen Germanisten arbeiteten weiter. Abgeschlossen wurde das Wörterbuch erst 1961, mit dem letzten Wort „Zypressenwald\"."},{"type":"persona","content":"Ich übernahm den Buchstaben A. „Amt\" heißt im Gotischen antpati, althochdeutsch ampati. Beim mittelalterlichen Dichter Frauenlob findet sich gar das „Amt des Rückenkraules.\" Bei Luther: „Und es begab sich, dass die Zeit seines Amts aus war.\" So zeigt jedes Wort eine ganze Geschichte. Die deutsche Sprache ist ein Lebewesen. Sie wächst, wandelt sich, bewahrt Spuren. Ich habe mit der Deutschen Grammatik auch die Wissenschaft der Germanistik mitbegründet; ein Fach, das du heute im Lehrplan trägst. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über die Brüder Grimm sind korrekt?","options":[{"text":"Jacob und Wilhelm wurden nach dem Protest als „Göttinger Sieben\" fristlos entlassen.","correct":true,"feedback":"Richtig! König Ernst August reagierte mit sofortiger Entlassung und Ausweisung."},{"text":"Das Deutsche Wörterbuch wurde von den Brüdern selbst abgeschlossen.","correct":false,"feedback":"Falsch. Es wurde erst 1961 – rund 100 Jahre nach Wilhelms Tod – fertiggestellt."},{"text":"Wilhelm heiratete Dorothea Wild, die selbst viele Märchen beigesteuert hatte.","correct":true,"feedback":"Richtig! Dortchen Wild lieferte u. a. „Frau Holle\" und „Tischlein, deck dich\"."},{"text":"Die Grimms haben mit ihrer Arbeit das Fach der Germanistik mitbegründet.","correct":true,"feedback":"Richtig! Ihre Sprach- und Literaturforschung legte die wissenschaftlichen Grundlagen des Fachs."},{"text":"Jacob Grimm heiratete ebenfalls und gründete einen eigenen Haushalt.","correct":false,"feedback":"Falsch. Jacob blieb zeitlebens Junggeselle und lebte im gemeinsamen Haushalt mit Wilhelm und Dortchen."}]},{"type":"persona","content":"Am 16. Januar 1859 ist Wilhelm gestorben. Gestern ist Wilhelm, die Hälfte von mir, gestorben. Ich war mit ihm von Kindesbeinen an zusammen. Unser Vermögen, unsere Bücher, unser Haushalt waren stets ungetrennt. Was wir unternahmen und zustande brachten, geschah in stetem Bunde. Man kann den einen nicht ohne den anderen denken. Ich werde ihm über nicht lange nachfolgen und an seiner Seite zu liegen kommen, wie ich ihm im Leben fast immer vereint gewesen bin. <span class=\"chat-source-ref\" title=\"Jacob Grimm, Brief nach Wilhelms Tod, 1859\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Jacob Grimm, Brief nach Wilhelms Tod, 1859\">Q</span>"},{"type":"freetext","prompt":"Jacob und Wilhelm Grimm werden immer als untrennbares Paar wahrgenommen – und doch waren sie sehr verschieden. Beschreibe die Polarität der beiden Brüder und erkläre, inwiefern gerade diese Verschiedenheit ihre Stärke war."},{"type":"context","content":"Jacob Grimm (1785–1863) und Wilhelm Grimm (1786–1859) gelten als Begründer der deutschen Philologie und Germanistik. Ihr Hauptwerk, die Kinder- und Hausmärchen (ab 1812), wurde zu einem der meistübersetzten Bücher der Welt. Die Deutsche Grammatik Jacobs (ab 1819) und das gemeinsame Deutsche Wörterbuch (ab 1852) zählen zu den Grundlagenwerken der Sprachwissenschaft. Als Mitglieder der „Göttinger Sieben\" (1837) setzten sie ein politisches Zeichen für Verfassungstreue und Zivilcourage."},{"type":"checkpoint","question":"Erkläre, warum die Brüder Grimm nicht nur als Märchensammler, sondern als Wissenschaftler und politische Akteure bedeutsam sind."},{"type":"self-assessment","items":["Ich kann den Unterschied zwischen Märchen und Sage erklären","Ich kenne die wichtigsten Werke der Brüder Grimm","Ich verstehe, was die Göttinger Sieben taten und riskierten","Ich kann Jacobs und Wilhelms unterschiedliche Charaktere beschreiben"]},{"type":"finale","text":"Wenn dich das Werk der Brüder Grimm weiter interessiert, dann forsche selbst nach!","links":[{"label":"BR2 RadioWissen – Podcast","url":"https://www.br.de/radio/bayern2/sendungen/radiowissen/deutsch-und-literatur/brueder-grimm102.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Br%C3%BCder_Grimm"},{"label":"Deutsches Wörterbuch online","url":"https://www.dwds.de/wb/dwb"}],"literature":["Heinz Rölleke: Die Märchen der Brüder Grimm. Reclam, Stuttgart 2004.","Hans-Jörg Uther: Handbuch zu den Kinder- und Hausmärchen der Brüder Grimm. De Gruyter, Berlin 2008."]}] }, 'epochenchat_theodor_fontane': { name: 'Theodor Fontane', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0K Jq2beOIlSDkdSaryfIwweM5OMVs1oYKV2R7DgnB709SvAUdfbnNBJIGBwRjikiUMSM4b6VNge2pYjy4bcQ2c5PXv1pXyFzwQo6U6JflIIPPU0lxGAv3d2emDmtLaGV/eJ9POJEz7daKbajy3XPHP8P1opozluZuNs+FzkHirdym26HyggjnnrRRWaOqTNXwzdLbeIbdmcpHGHJIPP3T0+vSvTE16AyFisv12ewoorGvFNps68Ls0SPrloyFQZenQJnNcgbnSF8Q3F28cuEYeXHwFBAA6Y655/GiiopwV2aV/dSZJruqvNcI6KUhxhdx6nvU3hHxFcWPiOzlB3RmQK4OcEH5fbpnP4DrRRWsIrlOerOTnr1IfidplpD4nk1Gwx9mvD5jAHO2X+L8D1+ua4cxIynKj60UVtDVanJUXLKyGfZtjA847VIkQzzk9+O1FFWkjNybRbij3EYAYnnFOubcLtJyeOePeiiq6GfUjiQ+aoI4zz7UUUVIz/2Q==', source: 'https://de.wikipedia.org/wiki/Theodor_Fontane#/media/Datei:Theodor_Fontane_Breitbach.jpg', theme: 'sebastian-wolf', modules: [{"type":"framing","content":"Du triffst gleich auf Theodor Fontane – oder besser: auf eine Konstruktion, die so spricht, wie er vielleicht geschrieben hätte. Fontane selbst ist 1898 in Berlin gestorben. Was du hier liest, basiert auf seinen Romanen, Balladen, Essays und Briefen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Fontanes Leben","start":1819,"end":1898,"active":true,"info":"Geboren am 30. Dezember 1819 in Neuruppin. Gestorben am 20. September 1898 in Berlin."},{"name":"Vormärz","start":1815,"end":1848,"active":false,"info":"Politisch aufgewühlte Zeit vor der Revolution von 1848."},{"name":"Poetischer Realismus","start":1848,"end":1890,"active":false,"info":"Literatur als \"Widerspieglung alles wirklichen Lebens\" im Medium der Kunst."},{"name":"Gründerzeit","start":1871,"end":1890,"active":false,"info":"Kaiserreich, Industrialisierung, Bürgertum als neue Leitkultur."},{"name":"Spätes Werk","start":1876,"end":1898,"active":false,"info":"Erst mit 57 Jahren beginnt Fontane Romane zu schreiben. Die große Ernte."}]},{"type":"persona","content":"Guten Tag. Ja, ich bin Theodor Fontane – Apotheker, Journalist, Kriegsberichterstatter, Wanderer und, wenn man so will, ein ziemlich später Romancier. Ich wurde am 30. Dezember 1819 in Neuruppin geboren, über einer Apotheke, die meinem Vater gehörte. Der war ein Fantast und Humorist – und Apotheker nur, wenn es nicht zu umständlich war. Eine Apotheke nach der anderen hat er veräußert. Ich selbst bin dann denselben Weg gegangen, bis ich beschloss: Das Glück liegt woanders als in aufgetürmten Fünftalerscheinen. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 30.12.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 30.12.2019\">Q</span>"},{"type":"learner","content":"Fontane als Apotheker – das klingt etwas unpassend für einen der größten deutschen Schriftsteller. Wie hat er den Sprung zur Literatur geschafft?"},{"type":"context","content":"Theodor Fontane wurde am 30. Dezember 1819 in Neuruppin als Sohn eines Apothekers hugenottischer Abstammung geboren. Ohne Abitur kam er auf die Berliner Gewerbeschule und erlernte wie sein Vater den Apothekerberuf. Erste Manuskripte schickte er ungefragt an Verlage und bekam sie ungelesen zurück. Erst im literarischen Sonntagsverein \"Tunnel über der Spree\" fand er ein erstes Publikum und wichtige Kontakte. Seinen Lebensunterhalt verdiente er jahrzehntelang als Journalist, für die konservative Kreuzzeitung ebenso wie als Theaterkritiker für die liberale Vossische Zeitung. Erst mit 57 Jahren, nach der Kündigung eines gut bezahlten Verwaltungspostens als Erster Sekretär der Akademie der Künste, beschloss er, Romane zu schreiben."},{"type":"persona","content":"Mit mir also war es nichts im Literatentum; so dachte ich selbst lange Zeit. Aber dann kam der \"Tunnel über der Spree\", dieser literarische Sonntagsverein, und langsam das Schreiben als Beruf. Ich habe für die Kreuzzeitung geschrieben, die konservativste Zeitung Preußens – und gleichzeitig als Theaterkritiker für die liberale Vossische. Das klingt widersprüchlich? Es war widersprüchlich. Ich selbst stand 1848 auf den Barrikaden. Ich war ein Mann, der sich ein neues Preußen wünschte. Und dann schrieb ich für jene, die das alte verteidigten. Unanfechtbare Wahrheiten gibt es überhaupt nicht und wenn es welche gibt, so sind sie langweilig. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 30.12.2019; Fontane-Gesellschaft / Roland Berbig\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 30.12.2019; Fontane-Gesellschaft / Roland Berbig\">Q</span>"},{"type":"learner","content":"Widersprüchlich klingt auch die hugenottische Herkunft. Was bedeutete das für Fontane?"},{"type":"context","content":"Die Vorfahren beider Elternteile Fontanes waren Hugenotten, französische Protestanten, die nach der Aufhebung des Edikts von Nantes (1685) nach Preußen eingewandert waren. Fontane empfand diese Herkunft als prägendes Merkmal seiner Identität. Er schrieb, er habe von Jugend auf das Gefühl gehabt, \"als etwas nicht ganz Alltägliches angesehen zu werden\". Diese Außenperspektive – der leicht Fremde im eigenen Land – sollte sein Schreiben grundlegend beeinflussen: Fontane beobachtet die preußische Gesellschaft stets mit einem Blick von innen und außen zugleich."},{"type":"persona","content":"Von Jugend auf bin ich daran gewöhnt, als etwas nicht ganz Alltägliches angesehen zu werden. Das schärft den Blick. Wer immer ein bisschen daneben steht, sieht mehr. Und vielleicht erklärt das auch meine Wanderungen – durch die Mark Brandenburg, durch England, durch Preußens Geschichte und durch die Gesellschaft meiner Zeit. Ich war ein Wanderer, das hat mir sogar mein Vorgesetzter bescheinigt: Fontane habe nicht die Energie, dauerhaft auf einen Zweck hinzuarbeiten. Er ist halt ein Wanderer. Nun, ich nehme das als Kompliment. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 30.12.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 30.12.2019\">Q</span>"},{"type":"annotation","text":"Das beinahe inselförmige Stück Land, um das die Havel ihr blaues Band zieht.","prompt":"Markiere auffällige sprachliche Bilder.","targets":[{"word":"blaues Band","feedback":"Metapher für den Fluss; die Farbe verleiht der Landschaft eine romantisch-malerische Qualität, die typisch für Fontanes Naturbeschreibungen ist."},{"word":"inselförmig","feedback":"Das Bild der Insel isoliert und hebt den Ort hervor – Fontane schreibt der Mark Brandenburg eine besondere, fast mythische Eigenständigkeit zu."}]},{"type":"quiz-single","question":"Welches ist das umfangreichste Werk Theodor Fontanes?","options":[{"text":"Effi Briest","correct":false,"feedback":"Effi Briest ist Fontanes bekanntester Roman, aber nicht sein umfangreichstes Werk."},{"text":"Wanderungen durch die Mark Brandenburg","correct":true,"feedback":"Richtig! Das fünfbändige Reise- und Geschichtswerk über die märkische Landschaft ist Fontanes umfangreichstes Werk."},{"text":"Der Stechlin","correct":false,"feedback":"Der Stechlin ist Fontanes letzter Roman, erschienen kurz vor seinem Tod 1898."},{"text":"Vor dem Sturm","correct":false,"feedback":"Vor dem Sturm war Fontanes erster Roman, erschienen 1878."}]},{"type":"persona","content":"Mit 57 Jahren, mittellos und nach nur drei Monaten als Erster Sekretär der Akademie der Künste, habe ich gekündigt. Mir ist die Freiheit Nachtigall, den anderen Leuten das Gehalt. Meine Frau Emilie war nicht begeistert; sie hatte sich einen ruhigen Lebensabend vorgestellt. Aber sie hat alle meine Romane abgeschrieben, manche sogar zweimal, und war meine erste Kritikerin. Was wäre ich ohne sie geworden? Dann kamen die Romane: Vor dem Sturm, Irrungen Wirrungen, Frau Jenny Treibel, Effi Briest, Der Stechlin. Ich fange erst an, nichts liegt hinter mir, alles vor mir – das sagte ich mit 57. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 30.12.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 30.12.2019\">Q</span>"},{"type":"quote","text":"„Ich fange erst an, nichts liegt hinter mir, alles vor mir.","source":"Theodor Fontane, mit 57 Jahren nach Kündigung seines Akademiepostens"},{"type":"learner","content":"Und was macht Effi Briest so besonders? Warum lesen wir den Roman noch heute?"},{"type":"context","content":"Effi Briest (1894/95 als Fortsetzungsroman, 1896 als Buch) gilt als Fontanes bedeutendster Roman und als Hauptwerk des poetischen Realismus. Er erzählt von der jungen Effi, die mit 17 Jahren den wesentlich älteren Baron von Innstetten heiratet und in einem gesellschaftlichen System gefangen ist, das ihr kaum Handlungsspielraum lässt. Fontane selbst beschrieb Realismus nicht als \"das nackte Wiedergeben alltäglichen Lebens, am wenigsten seines Elends und seiner Schattenseiten\", sondern als \"die Widerspieglung alles wirklichen Lebens, aller wahren Kräfte und Interessen im Elemente der Kunst\". Fontane urteilt nicht über seine Figuren, er zeigt sie. Der Leser muss selbst Position beziehen."},{"type":"persona","content":"Effi Briest; ja, die kleine Effi. Sie schaukelt, springt, lacht, und dann heiratet sie einen Mann, den sie kaum kennt, weil das eben so war. Ich habe nicht erfunden, was ich schrieb. Der Fall, auf dem der Roman beruht, ereignete sich so ähnlich. Ich habe ihn natürlich künstlerisch geformt. Was mich beschäftigt hat war nicht das Urteil, sondern diese Frage: wie kann es so weit kommen? Was macht diese Gesellschaft mit einem Menschen? Ich urteile nicht über Innstetten, nicht über Effi. Ich zeige. Schlechtes schlecht und es muss gesagt werden, aber wie man es sagt, das ist die Kunst. <span class=\"chat-source-ref\" title=\"vgl. Fontane, Aufsatz über Realismus; Effi Briest, 1896\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. Fontane, Aufsatz über Realismus; Effi Briest, 1896\">Q</span>"},{"type":"quote","text":"Realismus ist nicht das nackte Wiedergeben alltäglichen Lebens, am wenigsten seines Elends und seiner Schattenseiten – die Widerspieglung alles wirklichen Lebens, aller wahren Kräfte und Interessen im Elemente der Kunst.","source":"Theodor Fontane, Essay über den Realismus"},{"type":"freetext","prompt":"Kann ein Schriftsteller erzählen, ohne zu werten?"},{"type":"context","content":"Der poetische Realismus (ca. 1848–1890) ist die dominante Strömung der deutschsprachigen Literatur nach der gescheiterten Revolution von 1848. Wichtige Vertreter sind neben Fontane u. a. Gottfried Keller und Adalbert Stifter. Kennzeichen sind: Darstellung des bürgerlichen Alltags, Zurücknahme des Erzähler-Ichs, Verwendung von Symbolen und Leitmotiven, gesellschaftskritischer Blick ohne offene Polemik. Von einem einfachen \"Abbild der Wirklichkeit\" unterscheidet sich der poetische Realismus durch die künstlerische Formung und Stilisierung des Stoffes."},{"type":"quiz-multi","question":"Welche der folgenden Merkmale kennzeichnen den poetischen Realismus?","options":[{"text":"Darstellung des bürgerlichen Alltags als zentrales Sujet","correct":true,"feedback":"Korrekt! Das Bürgertum und seine sozialen Normen stehen im Mittelpunkt."},{"text":"Offene politische Agitation und Gesellschaftskritik","correct":false,"feedback":"Das unterscheidet den Realismus vom Naturalismus und Vormärz. Kritik wird eher indirekt eingebaut."},{"text":"Zurückhaltender, nicht-wertender Erzähler","correct":true,"feedback":"Korrekt! Der Erzähler zeigt, urteilt aber nicht offen."},{"text":"Verwendung von Symbolen und Leitmotiven","correct":true,"feedback":"Korrekt! In Effi Briest z. B. das Schaukel-Motiv oder der Strand als Freiheitssymbol."},{"text":"Rückzug ins Innerliche und religiöse Mystik","correct":false,"feedback":"Das ist eher ein Merkmal der Romantik, nicht des Realismus."}]},{"type":"persona","content":"Glück, das ist ein Wort, das sich in meinem Gesamtwerk am häufigsten findet. Man hat das nachgezählt. Glück, wer will sagen, was du bist und wo du bist? Bei Lichte besehen sind Ruhe und Glück überhaupt dasselbe. Ich bin kein unglücklicher Mensch gewesen, aber ich habe das Glück nie für selbstverständlich gehalten. Mit 78 plagten mich Husten, Asthma und die Nerven. Gott, was ist Glück? Eine Grießsuppe, eine Schlafstelle, keine körperlichen Schmerzen. Das ist schon viel. Und doch: Geschrieben habe ich bis zum Schluss. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 30.12.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 30.12.2019\">Q</span>"},{"type":"barometer","statement":"Fontanes Aussage \"Bei Lichte besehen sind Ruhe und Glück überhaupt dasselbe\" wirkt auch heute noch überzeugend.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"checkpoint","question":"Erkläre, was Fontane meint, wenn er sagt, Realismus sei nicht \"das nackte Wiedergeben\" der Wirklichkeit."},{"type":"self-assessment","items":["Ich kenne die wichtigsten Stationen in Fontanes Leben und seinen Weg zur Literatur.","Ich kann Fontane der Epoche des poetischen Realismus zuordnen und Merkmale nennen.","Ich verstehe, was mit Fontanes beobachtendem, nicht urteilen Erzählstil gemeint ist.","Ich kenne mindestens drei Werke Fontanes und ihre Bedeutung."]},{"type":"persona","content":"Man wird Mühe haben, wenn man mich für eine Richtung festmachen will. Ich habe für Konservative geschrieben und bin auf Barrikaden gestanden. Ich habe über Preußens Junker geschrieben und gleichzeitig gesagt, die Zukunft liege beim vierten Stand. Ich bin ein Wanderer geblieben; in der Landschaft, in der Politik, in der Literatur. <span class=\"chat-source-ref\" title=\"vgl. Roland Berbig, Fontane-Gesellschaft; WDR Zeitzeichen, 30.12.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. Roland Berbig, Fontane-Gesellschaft; WDR Zeitzeichen, 30.12.2019\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt von Fontanes Leben oder Werk hat dich am meisten überrascht oder beeindruckt? Begründe deine Antwort."},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du hier:","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/mediathek/audio/zeitzeichen/audio-theodor-fontane-schriftsteller-geburtstag--100.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Theodor_Fontane"},{"label":"Bibliographie","url":"https://www.fontanearchiv.de/digitale-dienste/fontane-bibliographie"}],"literature":["Helmuth Nürnberger: Fontane. Rowohlt Monographien, Reinbek 2002, ISBN 3-499-50341-0.","Roland Berbig: Theodor Fontane im literarischen Leben. De Gruyter, Berlin 2000.","Wolfgang Rasch: Theodor Fontane Bibliographie online. Auf der Grundlage der Theodor Fontane Bibliographie (3 Bde., Berlin, 2006) hrsg. vom Theodor-Fontane-Archiv. Potsdam 2019ff. (Aktualisierte und ergänzte Fassung der Druckausgabe.)"]}] }, 'epochenchat_theodor_storm': { name: 'Theodor Storm', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD2cEGTJ/Hih3yDzQxXcxJBIPJqvK4APqa5zQWafGcH0rMu7jcAM/WluJ+cZ59qyLq5OOmD6UbgR3l4ckMVBA4INYzXHmusaHLSHAB6ZovJCXZ+gz/kUzR4kk1JT5iJsHG8/Mx9FHc454q7WEd9ZRJFaxoTnbzU7QJIMHI7cGqcMkUoTY6txggc1a8xkIBBxWZQeWE5U1Q1DTI7tfMA2Spyrdvx9RVzzQR16e9M8wlyAeB29aBHJRTmFmjbGU46fn+FacMxbq2Rjp3rP1uD7Jqe8nKTjeM9j0I/r+OKigugr7QDg/j9au1wudNbvtTk9TV1G+UD/JrGt5wQBkFvStGF8ge/eosBcJAPUY9/50VHncv9aKYiWSZiwIBAqpPIoU5BHH5VI7HB579B2rLupcAjAI6c0FEF1KFI2MM5/TrWNczZz6jI6/5/yKs3k3K8nOMetYs0uG4zycZxVolleeY8gfKcen+f8msa7tpdTuI7aSTETOciNgHwFPf/AD3q5PK5UFQ3PUn2rO8m/uL YH//Z', source: 'https://de.wikipedia.org/wiki/Theodor_Storm#/media/Datei:Theodor_Storm_(1817-1888).jpg', theme: 'sebastian-wolf', modules: [{"type":"framing","content":"Du triffst gleich auf Theodor Storm – oder besser: auf eine Konstruktion, die so spricht, wie er vielleicht geschrieben hätte. Storm selbst ist am 4. Juli 1888 in Hanerau-Hademarschen gestorben. Was du hier liest, basiert auf seinen Texten, Novellen und Briefen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Poetischer Realismus","start":1848,"end":1890,"active":false,"info":"Verklärung der Wirklichkeit, psychologische Tiefe, Novelle als bevorzugte Form, Heimatgebundenheit."},{"name":"Storms Leben","start":1817,"end":1888,"active":true,"info":"Geboren in Husum. Gestorben in Hanerau-Hademarschen. 70 Jahre alt."},{"name":"Schleswig-Holstein-Frage","start":1848,"end":1864,"active":false,"info":"Dänische Herrschaft, politischer Widerstand, Exil und Rückkehr prägen Storms Leben direkt."},{"name":"Gründerzeit","start":1871,"end":1890,"active":false,"info":"Industrialisierung, sozialer Wandel – im Schimmelreiter literarisch verarbeitet."}]},{"type":"persona","content":"Ich bin Theodor Storm, geboren in der Mitternachtsstunde zwischen dem 14. und 15. September 1817 in Husum – mitten in einem starken Gewitter. Das war meine Geburtsstunde. Husum, eine graue Stadt am grauen Meer. Als Werbung für den Fremdenverkehr ein Albtraum. Und doch habe ich fast mein ganzes Leben hier verbracht und fast jede Zeile, die ich schrieb, hat diese Stadt in sich. Es hängt mein ganzes Herz an dir, Heimat Husum, du graue Stadt am Meer. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 14.09.2017; Theodor Storm, Die Stadt, 1851\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 14.09.2017; Theodor Storm, Die Stadt, 1851\">Q</span>"},{"type":"learner","content":"Grau, neblig, abseits – wie wird man da Dichter?"},{"type":"context","content":"Storm wuchs in einer wohlhabenden Husumscher Juristenfamilie auf – kulturell eher ferngestellt, wie er selbst sagte. Zwei Einflüsse prägten ihn entscheidend: Das Lübecker Katharineum, wo er erstmals gute Lyrik kennenlernte. Heine, Eichendorff und Goethe wurden seine \"Hausgötter\" fürs Leben. Neben den \"Großen\" verzauberte ihn die Bäckerstochter Lena Wiese abends mit plattdeutschen Spuk- und Gespenstergeschichten, Legenden und volkstümlichen Erinnerungen. Aus diesem Fundus schöpfte er zeitlebens. Mit elf Jahren schrieb er sein erstes Gedicht; nach dem Tod seiner siebenjährigen Schwester Luzi."},{"type":"persona","content":"Von Religion und Christentum habe ich nie reden hören. So stehe ich dem sehr unbefangen gegenüber. Ich habe durchaus keinen Glauben aus der Kindheit her. Was mir blieb, waren die Geschichten der alten Lena – Geister, Spuk, das Rauschen des Meeres. Und die Überzeugung: Mein richterlicher und mein poetischer Beruf sind meistens in gutem Einvernehmen gewesen. Ich habe es sogar oft als Erfrischung empfunden, aus der Welt der Fantasie in die praktische des reinen Verstandes einzukehren. <span class=\"chat-source-ref\" title=\"Storm, Briefe\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Storm, Briefe\">Q</span>"},{"type":"annotation","text":"Am grauen Strand, am grauen Meer / und seitab liegt die Stadt. / Der Nebel drückt die Dächer schwer / und durch die Stille braust das Meer / eintönig durch die Stadt.","prompt":"Markiere, wie in Die Stadt (1851) Atmosphäre geschaffen wird.","targets":[{"word":"grau","feedback":"Die zweifache Farbe „grau\" rahmt den Vers ein und macht Eintönigkeit zur Grundstimmung."},{"word":"eintönig","feedback":"Das Gedicht beschreibt sich selbst: Form und Inhalt fallen zusammen, ein typisches Mittel des Poetischen Realismus."}]},{"type":"quiz-single","question":"Welcher Epoche wird Theodor Storm zugeordnet?","options":[{"text":"Romantik","correct":false,"feedback":"Storm ist zeitlich und stilistisch ein Nachfolger der Romantik, gehört aber einer anderen Epoche an. Er verarbeitet Wirklichkeit, nicht Traumwelten."},{"text":"Expressionismus","correct":false,"feedback":"Der Expressionismus beginnt erst um 1910."},{"text":"Poetischer Realismus","correct":true,"feedback":"Richtig! Storm ist einer der bedeutendsten Vertreter des Poetischen Realismus. Er wollte der Wirklichkeit \"eine poetische Seite abgewinnen\", nicht sie verzerren oder verklären."},{"text":"Biedermeier","correct":false,"feedback":"Das Biedermeier endet um 1848; Storm entwickelt seinen eigenen Stil erst danach."}]},{"type":"context","content":"1849 erschien Storms Novelle Immensee: die melancholische Rückschau eines alten Mannes auf seine Jugendliebe, die er durch eigene Nachlässigkeit verloren hatte. Die Resonanz war enorm. Storm wurde buchstäblich über Nacht berühmt, vergleichbar mit Goethe nach dem Werther. Die Novelle war für Storm die \"Schwester des Dramas\": konzentriert auf einen entscheidenden Moment, psychologisch präzise, offen für Mehrdeutigkeit. Kennzeichnend ist die Gleichzeitigkeit von Außen- und Innenperspektive; nicht die Handlung steht im Vordergrund, sondern die Stimmung."},{"type":"learner","content":"Und dann wurde er aus Husum vertrieben?"},{"type":"persona","content":"Ich hatte Schleswig-Holstein geliebt und verteidigt. Als die Schleswig-Holsteinische Erhebung gegen Dänemark scheiterte, vertrat ich einige Aufständische vor Gericht. Ich verlor meine Anwaltszulassung. Man fertigte Akten über mich an. 1853 ging ich ins preußische Exil – mit Frau und Kindern zunächst nach Potsdam. Preußen konnte ich nicht ausstehen. Das Militär, das Junkertum – ein Graus. Und doch war Preußen das Land, das mich aufgenommen hatte. Das hat aber nicht dazu geführt, es zu lieben. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 14.09.2017\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 14.09.2017\">Q</span>"},{"type":"context","content":"Das Exil in Potsdam und später im thüringischen Heiligenstadt hatte auch eine unerwartete Seite: In Berlin war Storm als Autor von Immensee ein berühmter Literat. Theodor Fontane und Paul Heyse wurden seine Freunde. Man diskutierte, kritisierte, ermunterte einander. Freilich blieb Fontane kritisch: Storms gefühlvollem Seelenton konnte er nichts abgewinnen. Dennoch: In den Berliner Salons und Künstlerstammtischen knüpfte Storm ein literarisches Netz, das seine Karriere vorantrieb. Er traf sogar seinen Hausgott Josef von Eichendorff persönlich."},{"type":"freetext","prompt":"Charakterisiere die \"Vielstimmigkeit\" der Literatur zur Zeit des Realismus anhand der Differenz zwischen Fontane und Storm."},{"type":"persona","content":"Ich war kein einfacher Mensch. Ein aufgeheizter, eifersüchtiger und doch liebevoller Kontrollfreak. Meine erste Frau Konstanze starb 1865 nach der Geburt unseres siebten Kindes. Meine zweite Frau Doris war jahrelang ins Exil gedrängt worden – wegen mir. Und doch: Und war es auch ein großer Schmerz und war es vielleicht gar eine Sünde, wenn es noch einmal vor dir stünde, du tätest es noch einmal, mein Herz. Glück gibt es selten in meinen Geschichten. In meinem Leben auch nicht immer. <span class=\"chat-source-ref\" title=\"Storm, Gedichte\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Storm, Gedichte\">Q</span>"},{"type":"barometer","statement":"Storm beschreibt in seinen Novellen vor allem Scheitern, Verlust und verpasstes Glück und trifft damit bis heute einen Nerv.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"quote","text":"Über die Heide hallet mein Schritt. Dumpf aus der Erde wandert es mit. Brauende Nebel geisten umher. Schwarz ist das Kraut und der Himmel so leer. Wär ich hier nur nicht gegangen im Mai. Leben und Liebe, wie flog es vorbei.","source":"Theodor Storm, Über die Heide (1875)"},{"type":"context","content":"Der Schimmelreiter (1888), Storms letzte und berühmteste Novelle, erschien kurz vor seinem Tod. Sie erzählt von Hauke Haien, einem ehrgeizigen Deichgrafen in Nordfriesland, der durch Fortschrittswahn, Eitelkeit und Selbstherrlichkeit sich selbst und andere in den Untergang reißt: Bei einer Sturmflut bricht der alte Deich an einer geschwächten Stelle, Hauke verliert Frau und Kind und stürzt sich mit seinem Schimmel in die Fluten. Der Schimmelreiter lässt sich als zeitlose Warnung lesen: Nur wer mit Durchblick, Augenmaß und bescheidenem Ehrgeiz an seine Aufgabe geht, wird nicht scheitern wie Hauke Haien."},{"type":"annotation","text":"Die Persönlichkeit des Deichgrafen Hauke Haien ist hochgradig komplex. Er ist hingerissen von Ehrgeiz und Machthunger, von Eitelkeit und Selbstherrlichkeit.","prompt":"Was macht Hauke Haien zu einer modernen Figur?","targets":[{"word":"Ehrgeiz und Machthunger","feedback":"Diese Eigenschaften machen ihn produktiv und zerstörerisch zugleich; kein romantischer Held, sondern ein realistischer Charakter mit inneren Widersprüchen."},{"word":"Selbstherrlichkeit","feedback":"Hauke ignoriert die Bedenken anderer und scheitert daran. Das Motiv des blinden Fortschrittsglaubens ist im Zeitalter der Industrialisierung hochaktuell und auch heute noch."}]},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Storm und sein Werk sind korrekt?","options":[{"text":"Immensee machte Storm 1849 über Nacht berühmt und ist eine melancholische Rückschau auf verlorene Jugendliebe.","correct":true,"feedback":"Richtig! Die Novelle war Storms erster großer Erfolg und begründete seinen Ruf als Meister der Stimmungsnovelle."},{"text":"Storm lebte sein gesamtes Erwachsenenleben in Husum, ohne die Stadt je zu verlassen.","correct":false,"feedback":"Nicht korrekt – Storm verbrachte rund 12 Jahre im Exil in Preußen und Thüringen, bevor er 1864 nach Husum zurückkehren konnte."},{"text":"Der Schimmelreiter erschien 1888 kurz vor Storms Tod und gilt als sein bedeutendstes Werk.","correct":true,"feedback":"Richtig! Die Novelle bündelt Storms lebenslange Themen: Heimat, Ehrgeiz, Scheitern und das Übernatürliche der Küstenlandschaft."},{"text":"Fontane und Storm waren befreundet, obwohl Fontane Storms Stil kritisch ablehnte.","correct":true,"feedback":"Richtig! Literarische Freundschaft und stilistische Differenz schlossen sich nicht aus – ein gutes Beispiel für die Vielstimmigkeit des Realismus."},{"text":"Storm sah sich selbst in erster Linie als Novellist, nicht als Lyriker.","correct":false,"feedback":null}]},{"type":"quiz-single","question":"Was versteht Storm unter der Novelle als „Schwester des Dramas\"?","options":[{"text":"Novellen sollen immer ein glückliches Ende haben wie Theaterstücke.","correct":false,"feedback":"Im Gegenteil: Storms Novellen enden fast nie glücklich."},{"text":"Die Novelle konzentriert sich wie das Drama auf einen zentralen Konflikt und einen entscheidenden Moment.","correct":true,"feedback":"Richtig! Storm meinte damit die Verdichtung, die Konzentration auf das Wesentliche; keine ausschweifende Romanhandlung, sondern dramatische Zuspitzung."},{"text":"Novellen müssen wie Dramen in Akte eingeteilt sein.","correct":false,"feedback":"Storm meinte den Geist, nicht die äußere Form."},{"text":"Storm bevorzugte Novellen, weil sie kürzer zu schreiben waren als Dramen.","correct":false,"feedback":null}]},{"type":"checkpoint","question":"Erkläre, warum Hauke Haien aus dem Schimmelreiter als moderne Figur gilt."},{"type":"self-assessment","items":["Ich verstehe, warum Storm dem Poetischen Realismus zugeordnet wird","Ich kann erklären, was Storm unter der Novelle als \"Schwester des Dramas\" versteht","Ich kenne den Handlungskern des Schimmelreiters und seine Deutungsdimensionen","Ich kann Storms Verhältnis zu seiner Heimat Husum beschreiben"]},{"type":"persona","content":"Ich war ein schmächtiger, agiler Mann mit strahlend blauen Augen und später mit einem schönen weißen Bart. Ich gründete Gesangsvereine, glänzte als eitler Tenor, stritt mit Fontane und liebte heftig. Meine Geschichten enden selten gut und trotzdem oder gerade deswegen wurden sie gelesen, in den großen Zeitschriften meiner Zeit, von vielen Menschen. Ich sah es wohl, schrieb ich einmal: der starre Blick über eine leere ungeheure Kluft, das unerreichbare Luftbild einer Jugend, das jetzt mit reißender Schnelle in Dunst zerfloss. Das ist das Leben, mein Leben. <span class=\"chat-source-ref\" title=\"Storm, Der Schimmelreiter, 1888\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Storm, Der Schimmelreiter, 1888\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt von Storms Leben oder Werk hat dich am meisten überrascht oder beeindruckt?"},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du im Internet.","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/mediathek/audio/zeitzeichen/audio-theodor-storm-dichter-geburtstag--100.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Theodor_Storm"}],"literature":["Jochen Missfeld: Du graue Stadt am Meer. Der Dichter Theodor Storm in seiner Zeit. Hoffmann und Campe, Hamburg 2017.","Christian Demandt: Theodor Storm. Reclam, Stuttgart 2017."]}] }};

                'position:fixed;z-index:9999;top:' + (rect.bottom + 8) + 'px;' +
                'left:' + Math.max(8, rect.left - 20) + 'px;';

            document.body.appendChild(popup);

            popup.querySelector('.source-popup__close').addEventListener('click', function(e) {
                e.stopPropagation();
                popup.remove();
            });

            setTimeout(function() { if (popup.parentNode) popup.remove(); }, 6000);
        });

    

    function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    var currentIndex = 0;
    var checkpointAnswers = [];
    var quizResults = [];
    var barometerResults = [];
    var freetextResults = [];
    var TYPING_DURATION = 800;

    function scrollToBottom() {
        requestAnimationFrame(function() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });
    }

    function createContinueButton() {
        var wrap = document.createElement('div');
        wrap.className = 'chat-continue';
        var btn = document.createElement('button');
        btn.className = 'chat-continue__btn';
        btn.innerHTML = 'Weiter ▾';
        btn.addEventListener('click', function() {
            wrap.remove();
            showNext();
        });
        wrap.appendChild(btn);
        return wrap;
    }

    function advanceAfterInteraction(el) {
        if (currentIndex < MODULES.length) {
            var btn = createContinueButton();
            el.after(btn);
            scrollToBottom();
        } else {
            setTimeout(function(){ showNext(); }, 600);
        }
    }

    function updateProgress() {
        var el = document.getElementById('chatProgressCurrent');
        if (el) el.textContent = currentIndex;
    }

    function renderProgress() {
        var el = document.createElement('div');
        el.className = 'chat-progress';
        el.innerHTML = '<a href="#" onclick="closeChat(); return false;" class="chat-progress__back">' +
            '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>' +
            '<span>Bibliothek</span></a>' +
            '<span class="chat-progress__title">' + PERSONA_NAME + '</span>' +
            '<span class="chat-progress__icon">' +
            '<svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;fill:var(--color-accent)"><path d="M6 2h12a2 2 0 012 2v16a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2zm0 2v16h12V4H6zm2 3h8v2H8V7zm0 4h8v2H8v-2zm0 4h5v2H8v-2z"/></svg>' +
            ' <span id="chatProgressCurrent">0</span>/' + MODULES.length +
            '</span>';
        container.insertBefore(el, container.firstChild);
    }

    function showTypingThenRender(mod) {
        var typing = document.createElement('div');
        typing.className = 'chat-typing';
        typing.innerHTML = '<div class="chat-avatar"><img src="' + AVATAR_SRC + '" alt="' + PERSONA_NAME + '" /></div>' +
            '<div class="chat-typing__dots"><span class="chat-typing__dot"></span><span class="chat-typing__dot"></span><span class="chat-typing__dot"></span></div>';
        container.appendChild(typing);
        scrollToBottom();
        setTimeout(function() {
            typing.remove();
            renderModule(mod);
        }, TYPING_DURATION);
    }

    function showNext() {
        if (currentIndex >= MODULES.length) {
            if (quizResults.length > 0 || barometerResults.length > 0 || checkpointAnswers.length > 0 || freetextResults.length > 0) {
                var summaryBtn = document.createElement('div');
                summaryBtn.className = 'chat-results-trigger';
                summaryBtn.innerHTML = '<button class="chat-results-trigger__btn"><span class="chat-results-trigger__icon">📊</span><span class="chat-results-trigger__text">Zusammenfassung anzeigen</span></button>';
                container.appendChild(summaryBtn);
                scrollToBottom();
                summaryBtn.querySelector('.chat-results-trigger__btn').addEventListener('click', function(){
                    summaryBtn.remove();
                    container.appendChild(renderResultsSummary());
                    scrollToBottom();
                });
            }
            return;
        }
        var mod = MODULES[currentIndex];
        currentIndex++;
        updateProgress();
        if (mod.type === 'persona' && currentIndex > 1) {
            showTypingThenRender(mod);
        } else {
            renderModule(mod);
        }
    }

    function renderModule(mod) {
        var el;
        switch (mod.type) {
            case 'framing': el = renderFraming(mod); break;
            case 'persona': el = renderPersona(mod); break;
            case 'learner': el = renderLearner(mod); break;
            case 'quote': el = renderQuote(mod); break;
            case 'context': el = renderContext(mod); break;
            case 'quiz-single': el = renderQuiz(mod, false); break;
            case 'quiz-multi': el = renderQuiz(mod, true); break;
            case 'freetext': el = renderFreetext(mod); break;
            case 'barometer': el = renderBarometer(mod); break;
            case 'checkpoint': el = renderCheckpoint(mod); break;
            case 'image': el = renderImage(mod); break;
            case 'audio': el = renderAudio(mod); break;
            case 'annotation': el = renderAnnotation(mod); break;
            case 'self-assessment': el = renderSelfAssessment(mod); break;
            case 'timeline': el = renderTimeline(mod); break;
            case 'finale': el = renderFinale(mod); break;
            default: el = renderPersona(mod);
        }
        container.appendChild(el);
        scrollToBottom();
        var interactive = ['quiz-single','quiz-multi','freetext','barometer','checkpoint','framing','annotation','self-assessment','timeline'];
        if (!interactive.includes(mod.type)) {
            if (currentIndex < MODULES.length) {
                container.appendChild(createContinueButton());
                scrollToBottom();
            } else {
                setTimeout(function(){ showNext(); }, 600);
            }
        }
    }

    function renderQuiz(mod, isMulti) {
        var el = document.createElement('div');
        el.className = 'chat-quiz' + (isMulti ? ' chat-quiz--multi' : '');
        var uid = 'q' + Math.random().toString(36).substr(2,6);
        var opts = mod.options.map(function(o,i) {
            return '<label class="chat-quiz__option" data-index="' + i + '" data-correct="' + o.correct + '">' +
                '<input type="' + (isMulti?'checkbox':'radio') + '" name="' + uid + '" class="sr-only" />' +
                '<span class="chat-quiz__indicator" aria-hidden="true"></span><span>' + o.text + '</span></label>';
        }).join('');
        el.innerHTML = '<div class="chat-quiz__card"><div class="chat-quiz__question">' + mod.question + '</div>' +
            '<div class="chat-quiz__options">' + opts + '</div>' +
            '<button class="chat-quiz__check-btn" disabled>Überprüfen</button>' +
            '<div class="chat-quiz__feedback" hidden></div></div>';

        var options = el.querySelectorAll('.chat-quiz__option');
        var checkBtn = el.querySelector('.chat-quiz__check-btn');
        var feedback = el.querySelector('.chat-quiz__feedback');

        options.forEach(function(opt) {
            opt.addEventListener('click', function() {
                if (opt.classList.contains('chat-quiz__option--locked')) return;
                var inp = opt.querySelector('input');
                inp.checked = !inp.checked || !isMulti;
                if (!isMulti) options.forEach(function(o){o.classList.remove('chat-quiz__option--selected');});
                opt.classList.toggle('chat-quiz__option--selected', inp.checked);
                checkBtn.disabled = !el.querySelector('input:checked');
            });
        });

        checkBtn.addEventListener('click', function() {
            var allCorrect = true;
            var feedbackMessages = [];
            options.forEach(function(opt, idx) {
                opt.classList.add('chat-quiz__option--locked');
                var inp = opt.querySelector('input');
                var corr = opt.dataset.correct === 'true';
                var optData = mod.options[idx];
                if (inp.checked && corr) {
                    opt.classList.add('chat-quiz__option--correct');
                    if (optData.feedback) feedbackMessages.push({correct:true,text:optData.feedback});
                } else if (inp.checked && !corr) {
                    opt.classList.add('chat-quiz__option--incorrect');
                    allCorrect = false;
                    if (optData.feedback) feedbackMessages.push({correct:false,text:optData.feedback});
                } else if (!inp.checked && corr) {
                    opt.classList.add('chat-quiz__option--correct');
                    allCorrect = false;
                }
            });
            checkBtn.disabled = true;
            checkBtn.textContent = '✓ Ausgewertet';
            feedback.hidden = false;
            if (feedbackMessages.length > 0) {
                feedback.className = 'chat-quiz__feedback chat-quiz__feedback--custom';
                feedback.innerHTML = feedbackMessages.map(function(fb){
                    return '<div class="chat-quiz__feedback-item ' + (fb.correct?'chat-quiz__feedback-item--correct':'chat-quiz__feedback-item--incorrect') + '">' + (fb.correct?'✓':'✗') + ' ' + fb.text + '</div>';
                }).join('');
            } else {
                feedback.className = 'chat-quiz__feedback ' + (allCorrect ? 'chat-quiz__feedback--correct' : 'chat-quiz__feedback--incorrect');
                feedback.textContent = allCorrect ? '✓ Richtig!' : '✗ Nicht ganz – die richtigen Antworten sind markiert.';
            }
            quizResults.push({question: mod.question, correct: allCorrect});
            advanceAfterInteraction(el);
        });
        return el;
    }

    function renderFreetext(mod) {
        var el = document.createElement('div');
        el.className = 'chat-freetext';
        el.innerHTML = '<div class="chat-freetext__card"><div class="chat-freetext__prompt">' + mod.prompt + '</div>' +
            '<textarea class="chat-freetext__textarea" placeholder="Schreibe hier deine Antwort..." rows="4"></textarea></div>';
        el.querySelector('textarea').addEventListener('input', function() {
            if (this.value.trim().length > 5 && !el._adv) {
                el._adv = true;
                freetextResults.push({prompt:mod.prompt,el:this});
                advanceAfterInteraction(el);
            }
        });
        return el;
    }

    function renderBarometer(mod) {
        var el = document.createElement('div');
        el.className = 'chat-barometer';
        el.innerHTML = '<div class="chat-barometer__card"><div class="chat-barometer__statement">' + mod.statement + '</div>' +
            '<div class="chat-barometer__slider-wrap"><input type="range" class="chat-barometer__input" min="1" max="10" value="5" aria-label="' + mod.statement + '" /></div>' +
            '<div class="chat-barometer__labels"><span>' + mod.min + '</span><span>' + mod.max + '</span></div>' +
            '<div class="chat-barometer__value">5</div>' +
            '<button class="chat-barometer__submit">Bestätigen</button></div>';
        var inp = el.querySelector('input[type="range"]');
        var val = el.querySelector('.chat-barometer__value');
        var sub = el.querySelector('button');
        inp.addEventListener('input', function(){val.textContent=inp.value;});
        sub.addEventListener('click', function(){barometerResults.push({statement:mod.statement,value:parseInt(inp.value),min:mod.min,max:mod.max});inp.disabled=true;sub.disabled=true;sub.textContent='✓ Gespeichert';advanceAfterInteraction(el);});
        return el;
    }

            '<div class="chat-checkpoint__question">' + mod.question + '</div>' +
            '<textarea class="chat-checkpoint__textarea" placeholder="Dein Gedanke dazu..." rows="3"></textarea>' +
            '<button class="chat-checkpoint__submit">Festhalten</button></div>';
        var ta = el.querySelector('textarea');
        var sub = el.querySelector('button');
        sub.addEventListener('click', function(){
            if (!ta.value.trim()) return;
            checkpointAnswers.push({q:mod.question,a:ta.value.trim()});

        });
        return el;
    }

        return el;
    }

    function renderAnnotation(mod) {
        var el = document.createElement('div');
        el.className = 'chat-annotation';
        var tid = 'at' + Math.random().toString(36).substr(2,6);
        var hasTargets = mod.targets && mod.targets.length > 0;
        var progressHtml = hasTargets ? '<div class="chat-annotation__progress">🎯 <span class="chat-annotation__progress-count">0</span> von ' + mod.targets.length + ' Schlüsselwörtern gefunden</div>' : '';
        el.innerHTML = '<div class="chat-annotation__card"><div class="chat-annotation__prompt">' + mod.prompt + '</div><div class="chat-annotation__text" id="' + tid + '">' + mod.text + '</div><div class="chat-annotation__toolbar"><button class="chat-annotation__mark-btn">✏ Markieren</button><button class="chat-annotation__clear-btn">↺ Zurücksetzen</button></div>' + progressHtml + '<div class="chat-annotation__feedbacks"></div></div>';
        var textEl = document.getElementById(tid) || el.querySelector('.chat-annotation__text');
        var feedbacksEl = el.querySelector('.chat-annotation__feedbacks');
        var progressCountEl = el.querySelector('.chat-annotation__progress-count');
        var foundTargets = {};
        el.querySelector('.chat-annotation__mark-btn').addEventListener('click', function(){
            var sel = window.getSelection();
            if (sel.rangeCount > 0) {
                var r = sel.getRangeAt(0);
                var selectedText = r.toString().trim();
                if (selectedText.length > 0) {
                    var matchedTarget = null;
                    if (hasTargets) {
                        for (var ti = 0; ti < mod.targets.length; ti++) {
                            var tw = mod.targets[ti].word.toLowerCase();
                            var st = selectedText.toLowerCase();
                            if (st === tw || st.indexOf(tw) >= 0 || tw.indexOf(st) >= 0) {
                                matchedTarget = mod.targets[ti];
                                break;
                            }
                        }
                    }
                    var s = document.createElement('span');
                    if (matchedTarget && !foundTargets[matchedTarget.word.toLowerCase()]) {
                        s.className = 'annotation-highlight annotation-highlight--target';
                        foundTargets[matchedTarget.word.toLowerCase()] = true;
                        var fbEl = document.createElement('div');
                        fbEl.className = 'chat-annotation__feedback-item';
                        fbEl.innerHTML = '<strong>„' + matchedTarget.word + '“</strong> – ' + matchedTarget.feedback;
                        feedbacksEl.appendChild(fbEl);
                        if (progressCountEl) progressCountEl.textContent = Object.keys(foundTargets).length;
                    } else {
                        s.className = 'annotation-highlight';
                        s.style.background = 'rgba(123,158,168,0.3)';
                        s.style.borderBottom = '2px solid var(--color-accent)';
                        s.style.padding = '1px 2px';
                        s.style.borderRadius = '2px';
                    }
                    try { r.surroundContents(s); } catch(e) {}
                    sel.removeAllRanges();
                }
            }
            if (!el._adv) {
                var shouldAdv = hasTargets ? Object.keys(foundTargets).length > 0 : true;
                if (shouldAdv) { el._adv = true; advanceAfterInteraction(el); }
            }
        });
        el.querySelector('.chat-annotation__clear-btn').addEventListener('click', function(){
            var t = el.querySelector('.chat-annotation__text');
            t.innerHTML = t.textContent;
            foundTargets = {};
            feedbacksEl.innerHTML = '';
            if (progressCountEl) progressCountEl.textContent = '0';
        });
        return el;
    }

        el.innerHTML = '<div class="chat-self-assessment__card"><div class="chat-self-assessment__title">📋 Selbsteinschätzung</div><div class="chat-self-assessment__items">'+items+'</div></div>';
        var total = (mod.items||[]).length;
        el.querySelectorAll('.chat-self-assessment__tile').forEach(function(tile){

    function renderTimeline(mod) {
        var el = document.createElement('div');
        el.className = 'chat-timeline';
        var epochs = mod.epochs||[];
        var eps = epochs.map(function(ep, idx){
            var isAct = ep.active;
            return '<div class="chat-timeline__epoch '+(isAct?'chat-timeline__epoch--active':'')+'" data-index="'+idx+'">' +
                '<div class="chat-timeline__label">'+ep.name+'</div>' +
                '<button class="chat-timeline__dot" type="button" aria-label="'+ep.name+' '+ep.start+'–'+ep.end+'"></button>' +
                '<div class="chat-timeline__dates">'+ep.start+'–'+ep.end+'</div>' +
                '</div>';
        }).join('');
        el.innerHTML = '<div class="chat-timeline__card"><div class="chat-timeline__track"><div class="chat-timeline__line"></div>'+eps+'</div></div>';
        var card = el.querySelector('.chat-timeline__card');
        var infoBox = null;
        el.querySelectorAll('.chat-timeline__epoch').forEach(function(epochEl, idx){
            var dot = epochEl.querySelector('.chat-timeline__dot');
            var ep = epochs[idx];
            dot.addEventListener('click', function(){
                var wasSelected = epochEl.classList.contains('chat-timeline__epoch--selected');
                el.querySelectorAll('.chat-timeline__epoch--selected').forEach(function(s){
                    s.classList.remove('chat-timeline__epoch--selected');
                });
                if (infoBox) { infoBox.remove(); infoBox = null; }
                if (!wasSelected) {
                    epochEl.classList.add('chat-timeline__epoch--selected');
                    if (ep.info) {
                        infoBox = document.createElement('div');
                        infoBox.className = 'chat-timeline__info-box';
                        infoBox.innerHTML = '<strong>'+ep.name+'</strong> – '+ep.info;
                        card.appendChild(infoBox);
                    }
                }
                if (!el._adv) { el._adv = true; advanceAfterInteraction(el); }
            });
        });
        return el;
    }

    function renderResultsSummary() {
        var el = document.createElement('div');
        el.className = 'chat-results';
        var qC = quizResults.filter(function(q){return q.correct;}).length;
        var qT = quizResults.length;
        var pct = qT > 0 ? Math.round((qC/qT)*100) : 0;
        var total = qT + barometerResults.length + checkpointAnswers.length + freetextResults.length;
        var h = '<div class="chat-results__card"><div class="chat-results__watermark" aria-hidden="true">📊</div>';
        h += '<div class="chat-results__header"><div class="chat-results__badge">'+PERSONA_NAME+'</div><div class="chat-results__title">Deine Ergebnisse</div><div class="chat-results__subtitle">'+total+' Aufgaben bearbeitet</div></div>';
        // Stats row
        var stats = '';
        if (qT > 0) stats += '<div class="chat-results__stat"><div class="chat-results__stat-value">'+pct+'%</div><div class="chat-results__stat-label">Quiz</div></div>';
        if (barometerResults.length > 0) stats += '<div class="chat-results__stat"><div class="chat-results__stat-value">'+barometerResults.length+'</div><div class="chat-results__stat-label">Barometer</div></div>';
        if (checkpointAnswers.length > 0) stats += '<div class="chat-results__stat"><div class="chat-results__stat-value">'+checkpointAnswers.length+'</div><div class="chat-results__stat-label">Reflexionen</div></div>';
        if (freetextResults.length > 0) stats += '<div class="chat-results__stat"><div class="chat-results__stat-value">'+freetextResults.length+'</div><div class="chat-results__stat-label">Freitext</div></div>';
        if (stats) h += '<div class="chat-results__stats-row">'+stats+'</div>';
        // Quiz with ring
        if (qT > 0) {
            var circ = 2 * Math.PI * 42;
            var off = circ - (circ * pct / 100);
            var ringColor = pct >= 70 ? '#2d8a4e' : pct >= 40 ? 'var(--color-accent)' : '#c0392b';
            h += '<div class="chat-results__section"><div class="chat-results__section-title">🎯 Quiz-Ergebnisse</div>';
            h += '<div class="chat-results__quiz-hero"><div class="chat-results__ring-wrap">';
            h += '<svg class="chat-results__ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="var(--color-border)" stroke-width="6"/>';
            h += '<circle cx="50" cy="50" r="42" fill="none" stroke="'+ringColor+'" stroke-width="6" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" transform="rotate(-90 50 50)" style="transition: stroke-dashoffset 1s ease;"/></svg>';
            h += '<div class="chat-results__ring-text"><div class="chat-results__ring-number">'+qC+'/'+qT+'</div><div class="chat-results__ring-label">richtig</div></div></div>';
            h += '<div class="chat-results__quiz-list">';
            quizResults.forEach(function(q){
                h += '<div class="chat-results__quiz-row '+(q.correct?'chat-results__quiz-row--correct':'chat-results__quiz-row--incorrect')+'"><span class="chat-results__quiz-icon">'+(q.correct?'✓':'✗')+'</span><span class="chat-results__quiz-text">'+q.question+'</span></div>';
            });
            h += '</div></div></div>';
        }
        if (barometerResults.length > 0) {
            h += '<div class="chat-results__section"><div class="chat-results__section-title">📈 Stimmungsbarometer</div>';
            barometerResults.forEach(function(b){var p=((b.value-1)/9)*100;h+='<div class="chat-results__bar"><span class="chat-results__bar-label">'+b.statement+'</span><div class="chat-results__bar-track"><div class="chat-results__bar-fill" style="width:'+p+'%"></div></div><span class="chat-results__bar-value">'+b.value+'/10</span></div>';});
            h += '</div>';
        }
        if (checkpointAnswers.length > 0) {
            h += '<div class="chat-results__section"><div class="chat-results__section-title">📌 Deine Reflexionen</div>';
            checkpointAnswers.forEach(function(c){h+='<div class="chat-results__reflection"><div class="chat-results__reflection-q">'+c.q+'</div><div class="chat-results__reflection-a"><span class="chat-results__reflection-quote" aria-hidden="true">❝</span>'+c.a+'</div></div>';});
            h += '</div>';
        }
        if (freetextResults.length > 0) {
            h += '<div class="chat-results__section"><div class="chat-results__section-title">✏️ Deine Texte</div>';
            freetextResults.forEach(function(f){var t=f.el?f.el.value.trim():'';if(t){h+='<div class="chat-results__reflection"><div class="chat-results__reflection-q">'+f.prompt+'</div><div class="chat-results__reflection-a"><span class="chat-results__reflection-quote" aria-hidden="true">❝</span>'+t+'</div></div>';}});
            h += '</div>';
        }
        h += '<div class="chat-results__footer"><button class="chat-results__copy-btn">📋 Ergebnisse kopieren</button><div class="chat-results__footer-note">Tipp: Kopiere deine Ergebnisse und füge sie in ein Dokument ein.</div></div></div>';
        el.innerHTML = h;
        el.querySelector('.chat-results__copy-btn').addEventListener('click', function(){
            var NL = String.fromCharCode(10);
            var l = ['EpochenChat \u2013 Ergebnisse ('+PERSONA_NAME+')','='.repeat(50)];
            if(qT>0){l.push(NL+'Quiz: '+qC+'/'+qT+' richtig ('+pct+'%)');quizResults.forEach(function(q,i){l.push('  '+(q.correct?'\u2713':'\u2717')+' '+q.question);});}
            if(barometerResults.length>0){l.push(NL+'Barometer:');barometerResults.forEach(function(b){l.push('  '+b.statement+': '+b.value+'/10');});}
            if(checkpointAnswers.length>0){l.push(NL+'Reflexionen:');checkpointAnswers.forEach(function(c){l.push('  '+c.q+NL+'    \u2192 '+c.a);});}
            if(freetextResults.length>0){l.push(NL+'Freitext:');freetextResults.forEach(function(f){var t=f.el?f.el.value.trim():'';if(t)l.push('  '+f.prompt+NL+'    \u2192 '+t);});}
            var txt=l.join(NL);
            try{navigator.clipboard.writeText(txt).then(function(){el.querySelector('.chat-results__copy-btn').textContent='\u2713 Kopiert!';setTimeout(function(){el.querySelector('.chat-results__copy-btn').textContent='\uD83D\uDCCB Ergebnisse kopieren';},2000);});}catch(e){}
        });
        return el;
    }

    // Init
    

        // Patch updateProgress to keep the back button
        const originalUpdateProgress = typeof updateProgress === 'function' ? updateProgress : null;
        if (originalUpdateProgress) {
            updateProgress = function() {
                originalUpdateProgress();
                const header = document.querySelector('.chat-progress');
                if (header && !header.querySelector('.chat-progress__back')) {
                    const backBtn = document.createElement('a');
                    backBtn.className = 'chat-progress__back';
                    backBtn.href = '#';
                    backBtn.innerHTML = '\u2190 Bibliothek';
                    backBtn.onclick = (e) => { e.preventDefault(); closeChat(); };
                    header.prepend(backBtn);
                }
            };
        }

        // Library Overrides handled by patching openModal directly in libHtml

    </script>
