<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LitDM – Literaturgeschichte im Chat-Format</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --glass-bg: #FAFAF5;
      --glass-border: #1A1A1A;
      --shelf-accent: #8D6E63;
      --os-primary: #7DFFC2;
      --os-secondary: #FF6B9D;
      --os-accent: #FFE66D;
      --os-bg: #D8D0E8;
      --os-text: #1A1A1A;
      --os-shadow: 4px 4px 0 #000;
      --os-border: 3px solid #1A1A1A;
      --os-font: 'VT323', monospace;
      --os-font-body: 'IBM Plex Mono', monospace;
      --os-btn-face: #D4D0C8;
    }

    body {
      min-height: 100vh;
      background-color: var(--os-bg);
      background-image:
        radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      font-family: var(--os-font-body);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px;
      overflow-x: hidden;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 12px 20px;
      background: var(--os-btn-face);
      border-bottom: var(--os-border);
      margin-bottom: 30px;
      animation: fadeDown 0.6s ease both;
    }

    header h1 {
      font-family: var(--os-font);
      font-weight: 400;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: var(--os-text);
      letter-spacing: 0.04em;
    }

    header p {
      margin-top: 4px;
      font-size: 0.9rem;
      color: #555;
      font-family: var(--os-font-body);
      font-weight: 500;
    }

    .ornament {
      color: #FFC107;
      font-size: 1.4rem;
      display: block;
      margin: 8px 0;
    }

    /* SHELF */
    .shelf-wrap {
      width: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 1.1s 0.3s ease both;
      margin: 40px 0;
    }

    .bookshelf {
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
      gap: 8px;
      width: 100%;
      height: 320px;
      padding: 0 10vw 40px;
      position: relative;
      z-index: 2;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .bookshelf::-webkit-scrollbar {
      height: 8px;
    }

    .bookshelf::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      margin: 0 10vw;
      border-radius: 10px;
    }

    .bookshelf::-webkit-scrollbar-thumb {
      background: var(--shelf-accent);
      border-radius: 10px;
    }

    .shelf-board {
      position: absolute;
      bottom: 30px;
      left: 5%;
      right: 5%;
      height: 12px;
      background: linear-gradient(to bottom, #8D6E63, #5D4037);
      border-radius: 4px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      z-index: 1;
    }

    .shelf-shadow {
      position: absolute;
      bottom: 10px;
      left: 8%;
      right: 8%;
      height: 20px;
      background: rgba(0, 0, 0, 0.1);
      filter: blur(10px);
      border-radius: 50%;
      z-index: 0;
    }

    /* BOOK */
    .book {
      position: relative;
      width: 72px;
      height: 220px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1);
      animation: bookDrop 0.7s ease both;
      flex-shrink: 0;
    }

    .book:nth-child(1) {
      animation-delay: 0.1s;
    }

    .book:nth-child(2) {
      animation-delay: 0.2s;
    }

    .book:nth-child(3) {
      animation-delay: 0.3s;
    }

    .book:nth-child(4) {
      animation-delay: 0.4s;
    }

    .book:nth-child(5) {
      animation-delay: 0.5s;
    }

    .book:nth-child(6) {
      animation-delay: 0.6s;
    }

    .book:hover {
      transform: translateY(-28px) rotateY(-18deg);
      z-index: 10;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    .book:hover .spine {
      box-shadow:
        inset -4px 0 15px rgba(0, 0, 0, 0.5),
        inset 2px 0 10px rgba(255, 255, 255, 0.1),
        0 0 20px rgba(255, 255, 255, 0.2);
    }

    /* SPINE */
    .spine {
      position: absolute;
      inset: 0;
      border-radius: 3px 0 0 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 14px 6px;
      box-shadow:
        inset -4px 0 12px rgba(0, 0, 0, 0.4),
        inset 2px 0 6px rgba(255, 255, 255, 0.06),
        -3px 4px 14px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    .spine::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.07) 0%, transparent 40%, rgba(0, 0, 0, 0.15) 100%);
      pointer-events: none;
    }

    .spine-icon {
      font-size: 1.3rem;
      filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.5));
    }

    .spine-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      letter-spacing: 0.12em;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      line-height: 1;
    }

    .spine-year {
      font-size: 0.62rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.05em;
    }

    /* TOOLTIP */
    .book-tip {
      position: absolute;
      left: 50%;
      bottom: 110%;
      transform: translateX(-50%) translateY(10px);
      width: 240px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 20;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    .book:hover .book-tip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .book-tip::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: var(--glass-bg);
      border-bottom: 0;
    }

    .tip-epoch {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .tip-name {
      font-family: 'Segoe Print', cursive;
      font-weight: 700;
      font-size: 1.05rem;
      color: #333;
      margin-bottom: 8px;
    }

    .tip-quote {
      font-size: 0.82rem;
      color: #555;
      font-style: italic;
      line-height: 1.5;
      border-left: 3px solid #FFC107;
      padding-left: 8px;
      margin-bottom: 10px;
    }

    .tip-cta {
      font-size: 0.75rem;
      color: #666;
      font-weight: 600;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* TIMELINE */
    .timeline-wrap {
      width: 100%;
      max-width: 800px;
      margin-top: 44px;
      animation: fadeUp 1s 1.3s ease both;
      opacity: 0;
      animation-fill-mode: both;
      padding-bottom: 60px;
    }

    .timeline-label {
      font-size: 0.7rem;
      color: #666;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .timeline-bar {
      position: relative;
      height: 3px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 20px;
    }

    .timeline-bar::before,
    .timeline-bar::after {
      content: attr(data-start);
      position: absolute;
      top: 8px;
      font-size: 0.65rem;
      color: #999;
    }

    .timeline-bar::after {
      content: attr(data-end);
      right: 0;
    }

    .t-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #fff;
      transition: transform 0.3s, border-color 0.3s;
      cursor: default;
    }

    .t-dot.active {
      transform: translate(-50%, -50%) scale(1.5);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .t-name {
      position: absolute;
      top: 16px;
      transform: translateX(-50%);
      font-size: 0.6rem;
      color: #888;
      white-space: nowrap;
      transition: color 0.3s;
    }

    .t-dot.active+.t-name {
      color: #333;
      font-weight: 700;
    }

    /* INTRO OVERLAY */
    .intro-overlay {
      position: fixed;
      inset: 0;
      background: var(--os-bg);
      background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s 0.2s;
    }

    .intro-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .intro-overlay h2 {
      font-family: var(--os-font);
      color: var(--os-text);
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 0.06em;
      padding: 8px 24px;
      background: var(--os-primary);
      border: var(--os-border);
      box-shadow: var(--os-shadow);
    }

    .intro-overlay p {
      color: var(--os-text);
      font-size: 0.85rem;
      margin-top: 16px;
      font-family: var(--os-font-body);
      font-weight: 500;
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: var(--os-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-inner {
      text-align: center;
      background: #FAFAF5;
      border: var(--os-border);
      box-shadow: 6px 6px 0 #000;
      padding: 2.5rem 2rem;
      max-width: 500px;
      transform: translateY(20px);
      transition: transform 0.4s 0.1s;
    }

    .modal.active .modal-inner {
      transform: translateY(0);
    }

    .modal-epoch {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
      font-weight: 700;
      font-family: var(--os-font);
      color: var(--os-secondary);
    }

    .modal-name {
      font-family: var(--os-font);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--os-text);
      margin-bottom: 6px;
      font-weight: 400;
    }

    .modal-dates {
      color: #555;
      font-size: 0.9rem;
      margin-bottom: 20px;
      font-weight: 500;
      font-family: var(--os-font-body);
      letter-spacing: 0.05em;
    }

    .modal-quote {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: #444;
      font-style: italic;
      max-width: 440px;
      line-height: 1.7;
      border-left: 4px solid var(--os-accent);
      padding: 8px 16px;
      margin: 0 auto 24px;
      text-align: left;
      background: #FAFAF5;
      border: var(--os-border);
      border-left: 4px solid var(--os-accent);
      font-family: var(--os-font-body);
    }

    .modal-hint {
      font-size: 0.8rem;
      color: #777;
      font-family: var(--os-font);
      letter-spacing: 0.1em;
      animation: pulse 1.5s infinite;
    }



    /* ANIMATIONS */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes bookDrop {
      from {
        opacity: 0;
        transform: translateY(-60px) rotateX(20deg);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }
  </style>
    <style>
        
/* ============================================
   EpochenChat – Font Declarations
   Lokal eingebettete Schriften (WOFF2)
   Kein Google Fonts CDN – alles offline
   ============================================ */

/* Playfair Display – Persona-Bubbles & Überschriften */




/* Playfair Display Italic – Fallback auf Regular mit synthetic italic */


/* Inter – Variable Font: eine Datei für Regular (400) bis Bold (700) */


/* CSS Custom Properties für Font-Stacks */
:root {
    --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
    --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-size-persona: 1.05rem;
    --font-size-ui: 0.95rem;
    --font-size-quote: 1.15rem;
    --font-size-small: 0.8rem;
    --font-size-label: 0.85rem;
    --line-height-body: 1.6;
    --line-height-tight: 1.3;
}

/* ============================================
   EpochenChat – Player Styles
   Chat-Darstellung für Schüler-Ansicht
   CC-BY-SA 4.0 Sebastian Wolf 2026
   ============================================ */

/* === Chat Container === */
.chat-player {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 1rem 6rem; /* Removed top padding */
    min-height: 100vh;
    background-color: var(--color-bg);
    background-image: var(--texture-bg);
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
    line-height: var(--line-height-body);
    color: var(--color-text);
    position: relative;
}

.chat-player[role="log"] {
    outline: none;
}

/* === Progress Bar (Buchseiten-Stil) === */
.chat-progress {
    position: sticky;
    top: 0;
    z-index: 1000; /* Increased z-index */
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    padding: 0.6rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: var(--font-size-small);
    color: var(--color-text-muted);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}

.chat-progress__back {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    text-decoration: none;
    color: var(--color-text-muted);
    font-size: var(--font-size-small);
    font-weight: 500;
    transition: color 200ms;
}

.chat-progress__back:hover {
    color: var(--color-accent);
}

.chat-progress__icon {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-weight: 500;
}

.chat-progress__icon svg {
    width: 18px;
    height: 18px;
    fill: var(--color-accent);
}

.chat-progress__title {
    font-family: var(--font-serif);
    font-weight: 700;
    color: var(--color-primary);
    font-size: var(--font-size-ui);
}

/* === Rahmungsmodul === */
.chat-framing {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.5rem;
    margin: 1.5rem 0;
    text-align: center;
    animation: fadeSlideIn 400ms ease-out both;
}

.chat-framing__icon {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
}

.chat-framing__title {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--color-primary);
    margin-bottom: 0.75rem;
}

.chat-framing__text {
    font-size: var(--font-size-ui);
    color: var(--color-text-muted);
    line-height: var(--line-height-body);
    max-width: 520px;
    margin: 0 auto 1rem;
}

.chat-framing__btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--color-primary);
    color: var(--color-text-inverse);
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.4rem;
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
    font-weight: 600;
    cursor: pointer;
    transition: background 200ms, transform 100ms;
}

.chat-framing__btn:hover {
    background: var(--color-primary-light);
}

.chat-framing__btn:active {
    transform: scale(0.97);
}

.chat-framing__btn:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
}

/* === Message Bubbles === */
.chat-message {
    display: flex;
    gap: 0.75rem;
    margin: 1rem 0;
    animation: fadeSlideIn 300ms ease-out both;
    max-width: 85%;
}

.chat-message--persona {
    align-self: flex-start;
    margin-right: auto;
}

.chat-message--learner {
    align-self: flex-end;
    margin-left: auto;
    flex-direction: row-reverse;
}

/* Avatar */
.chat-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.25);
    border: 2px solid var(--color-border);
}

.chat-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: sepia(0.1) saturate(0.9);
}

/* Bubble */
.chat-bubble {
    padding: 0.85rem 1.1rem;
    line-height: var(--line-height-body);
    position: relative;
    box-shadow: 0 2px 8px var(--color-shadow);
}

.chat-bubble--persona {
    background: var(--color-bubble-persona);
    color: var(--color-bubble-persona-text);
    border-radius: 18px 18px 18px 4px;
    font-family: var(--font-serif);
    font-size: var(--font-size-persona);
}

.chat-bubble--learner {
    background: var(--color-bubble-learner);
    color: var(--color-bubble-learner-text);
    border-radius: 18px 18px 4px 18px;
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
}

/* Source reference */
.chat-source-ref {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--color-accent);
    color: var(--color-text-inverse);
    font-size: 0.65rem;
    font-weight: 700;
    font-family: var(--font-sans);
    cursor: pointer;
    vertical-align: super;
    margin-left: 2px;
    text-decoration: none;
    transition: background 200ms, transform 100ms;
}

.chat-source-ref:hover {
    background: var(--color-accent-light);
    transform: scale(1.15);
}

/* Persona name label */
.chat-persona-name {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--color-text-muted);
    margin-bottom: 0.25rem;
    font-family: var(--font-sans);
}

/* === Typing Indicator === */
.chat-typing {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 0.75rem 0;
    animation: fadeSlideIn 200ms ease-out both;
}

.chat-typing__dots {
    display: flex;
    gap: 4px;
    padding: 0.7rem 1rem;
    background: var(--color-bubble-persona);
    border-radius: 18px 18px 18px 4px;
    box-shadow: 0 2px 8px var(--color-shadow);
}

.chat-typing__dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-text-muted);
    animation: typingBounce 1.4s ease-in-out infinite;
}

.chat-typing__dot:nth-child(2) { animation-delay: 0.4s; }
.chat-typing__dot:nth-child(3) { animation-delay: 0.8s; }

/* === Zitat-Karte === */
.chat-quote {
    width: 100%;
    max-width: 100%;
    margin: 1.2rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-quote__card {
    background: var(--color-surface);
    border-left: 4px solid var(--color-accent);
    border-radius: 0 8px 8px 0;
    padding: 1.2rem 1.4rem;
    position: relative;
}

.chat-quote__ornament {
    position: absolute;
    top: 0.6rem;
    right: 1rem;
    font-size: 2.5rem;
    color: var(--color-accent);
    opacity: 0.15;
    font-family: var(--font-serif);
    line-height: 1;
}

.chat-quote__text {
    font-family: var(--font-serif);
    font-size: var(--font-size-quote);
    font-style: italic;
    line-height: var(--line-height-body);
    color: var(--color-text);
    margin-bottom: 0.6rem;
}

.chat-quote__source {
    font-size: var(--font-size-small);
    font-style: italic;
    color: var(--color-text-muted);
    text-align: right;
}

/* === Kontext-Karte (Aufklappbar) === */
.chat-context {
    width: 100%;
    margin: 0.8rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-context__toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
    font-weight: 500;
    color: var(--color-primary);
    transition: background 200ms;
    text-align: left;
}

.chat-context__toggle:hover {
    background: var(--color-surface-hover);
}

.chat-context__toggle:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
}

.chat-context__arrow {
    transition: transform 250ms ease;
    flex-shrink: 0;
}

.chat-context[open] .chat-context__arrow {
    transform: rotate(90deg);
}

.chat-context__body {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 1rem 1.2rem;
    font-size: var(--font-size-ui);
    line-height: var(--line-height-body);
    color: var(--color-text);
    animation: fadeIn 200ms ease-out;
}

/* === Quiz === */
.chat-quiz {
    width: 100%;
    margin: 1rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-quiz__card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.2rem;
    overflow: hidden;
}

.chat-quiz__question {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--color-text);
    margin-bottom: 1rem;
    line-height: var(--line-height-tight);
}

.chat-quiz__options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.chat-quiz__option {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 1rem;
    background: var(--color-bg);
    border: 2px solid var(--color-border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 200ms, background 200ms, transform 100ms;
    font-size: var(--font-size-ui);
    color: var(--color-text);
}

.chat-quiz__option:hover:not(.chat-quiz__option--locked) {
    border-color: var(--color-accent);
    background: var(--color-surface-hover);
}

.chat-quiz__option:active:not(.chat-quiz__option--locked) {
    transform: scale(0.98);
}

.chat-quiz__option:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
}

.chat-quiz__option--selected {
    border-color: var(--color-accent);
    background: var(--color-surface-hover);
}

.chat-quiz__option--correct {
    border-color: #2d8a4e;
    background: rgba(45, 138, 78, 0.1);
}

.chat-quiz__option--incorrect {
    border-color: #c0392b;
    background: rgba(192, 57, 43, 0.08);
}

.chat-quiz__option--locked {
    cursor: default;
    opacity: 0.85;
}

.chat-quiz__indicator {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--color-border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 200ms, background 200ms;
}

.chat-quiz__option--selected .chat-quiz__indicator {
    border-color: var(--color-accent);
    background: var(--color-accent);
}

.chat-quiz__option--correct .chat-quiz__indicator {
    border-color: #2d8a4e;
    background: #2d8a4e;
}

.chat-quiz__option--incorrect .chat-quiz__indicator {
    border-color: #c0392b;
    background: #c0392b;
}

.chat-quiz__check-btn {
    margin-top: 0.8rem;
    width: 100%;
    padding: 0.7rem;
    background: var(--color-primary);
    color: var(--color-text-inverse);
    border: none;
    border-radius: 8px;
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
    font-weight: 600;
    cursor: pointer;
    transition: background 200ms, transform 100ms;
}

.chat-quiz__check-btn:hover {
    background: var(--color-primary-light);
}

.chat-quiz__check-btn:active {
    transform: scale(0.97);
}

.chat-quiz__check-btn:disabled {
    opacity: 0.5;
    cursor: default;
}

.chat-quiz__check-btn:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
}

.chat-quiz__feedback {
    margin-top: 0.75rem;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    font-size: var(--font-size-ui);
    font-weight: 500;
    animation: fadeIn 200ms ease-out;
}

.chat-quiz__feedback--correct {
    background: rgba(45, 138, 78, 0.1);
    color: #2d8a4e;
}

.chat-quiz__feedback--incorrect {
    background: rgba(192, 57, 43, 0.08);
    color: #c0392b;
}

.chat-quiz__feedback--custom {
    background: var(--color-bg);
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}

.chat-quiz__feedback-item {
    padding: 0.55rem 0.75rem;
    border-radius: 6px;
    font-size: var(--font-size-ui);
    line-height: var(--line-height-body);
    animation: fadeSlideIn 200ms ease-out both;
}

.chat-quiz__feedback-item--correct {
    background: rgba(45, 138, 78, 0.1);
    color: #2d8a4e;
    border-left: 3px solid #2d8a4e;
}

.chat-quiz__feedback-item--incorrect {
    background: rgba(192, 57, 43, 0.08);
    color: #c0392b;
    border-left: 3px solid #c0392b;
}

/* Multi-select: checkbox indicator */
.chat-quiz--multi .chat-quiz__indicator {
    border-radius: 4px;
}

/* === Stimmungsbarometer === */
.chat-barometer {
    width: 100%;
    margin: 1rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-barometer__card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.2rem;
}

.chat-barometer__statement {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    color: var(--color-text);
    margin-bottom: 1rem;
    text-align: center;
}

.chat-barometer__slider-wrap {
    padding: 0 0.5rem;
}

.chat-barometer__input {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--color-border);
    outline: none;
    cursor: pointer;
}

.chat-barometer__input::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--color-accent);
    border: 3px solid var(--color-bg);
    box-shadow: 0 2px 6px var(--color-shadow);
    cursor: pointer;
    transition: transform 150ms;
}

.chat-barometer__input::-webkit-slider-thumb:hover {
    transform: scale(1.15);
}

.chat-barometer__input::-moz-range-thumb {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--color-accent);
    border: 3px solid var(--color-bg);
    box-shadow: 0 2px 6px var(--color-shadow);
    cursor: pointer;
}

.chat-barometer__input:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 4px;
}

.chat-barometer__labels {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-size: var(--font-size-small);
    color: var(--color-text-muted);
}

.chat-barometer__value {
    text-align: center;
    margin-top: 0.6rem;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--color-accent);
}

.chat-barometer__submit {
    margin-top: 0.8rem;
    width: 100%;
    padding: 0.6rem;
    background: var(--color-primary);
    color: var(--color-text-inverse);
    border: none;
    border-radius: 8px;
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
    font-weight: 600;
    cursor: pointer;
    transition: background 200ms;
}

.chat-barometer__submit:hover { background: var(--color-primary-light); }
.chat-barometer__submit:disabled { opacity: 0.5; cursor: default; }

/* === Checkpoint === */
.chat-checkpoint {
    width: 100%;
    margin: 1rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-checkpoint__card {
    background: var(--color-surface);
    border: 2px dashed var(--color-accent);
    border-radius: 12px;
    padding: 1.2rem;
    text-align: center;
}

.chat-checkpoint__icon {
    font-size: 1.6rem;
    margin-bottom: 0.4rem;
}

.chat-checkpoint__question {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    color: var(--color-text);
    margin-bottom: 0.75rem;
}

.chat-checkpoint__textarea {
    width: 100%;
    min-height: 80px;
    padding: 0.7rem;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
    resize: vertical;
    line-height: var(--line-height-body);
}

.chat-checkpoint__textarea:focus {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
    border-color: transparent;
}

.chat-checkpoint__submit {
    margin-top: 0.6rem;
    padding: 0.55rem 1.2rem;
    background: var(--color-accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
    font-weight: 600;
    cursor: pointer;
    transition: background 200ms;
}

.chat-checkpoint__submit:hover { background: var(--color-accent-light); }
.chat-checkpoint__submit:disabled { opacity: 0.5; cursor: default; }

/* === Freitext === */
.chat-freetext {
    width: 100%;
    margin: 1rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-freetext__card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.2rem;
}

.chat-freetext__prompt {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    color: var(--color-text);
    margin-bottom: 0.75rem;
}

.chat-freetext__textarea {
    width: 100%;
    min-height: 100px;
    padding: 0.7rem;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
    resize: vertical;
    line-height: var(--line-height-body);
}

.chat-freetext__textarea:focus {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
    border-color: transparent;
}

/* === Abschluss-Slide === */
.chat-finale {
    width: 100%;
    margin: 2rem 0;
    animation: fadeSlideIn 400ms ease-out both;
}

.chat-finale__card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
}

/* Watermark */
.chat-finale__watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12rem;
    opacity: 0.04;
    pointer-events: none;
    font-family: var(--font-serif);
    color: var(--color-primary);
}

.chat-finale__seal {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    position: relative;
}

.chat-finale__text {
    font-family: var(--font-serif);
    font-size: 1.15rem;
    line-height: var(--line-height-body);
    color: var(--color-text);
    max-width: 480px;
    margin: 0 auto 1.5rem;
    position: relative;
}

.chat-finale__link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--color-accent);
    color: #fff;
    padding: 0.7rem 1.6rem;
    border-radius: 8px;
    text-decoration: none;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: var(--font-size-ui);
    transition: background 200ms, transform 100ms;
    position: relative;
}

.chat-finale__link:hover {
    background: var(--color-accent-light);
}

.chat-finale__link:active {
    transform: scale(0.97);
}

/* === Continue Button (between messages) === */
.chat-continue {
    display: flex;
    justify-content: center;
    margin: 0.5rem 0;
    animation: fadeIn 200ms ease-out both;
}

.chat-continue__btn {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: transparent;
    border: 1px solid var(--color-border);
    border-radius: 20px;
    padding: 0.45rem 1rem;
    font-family: var(--font-sans);
    font-size: var(--font-size-small);
    color: var(--color-text-muted);
    cursor: pointer;
    transition: all 200ms;
}

.chat-continue__btn:hover {
    background: var(--color-surface);
    border-color: var(--color-accent);
    color: var(--color-accent);
}

.chat-continue__btn:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
}

/* === Bild === */
.chat-image {
    width: 100%;
    margin: 1rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-image__card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    overflow: hidden;
}

.chat-image__img {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    display: block;
    background: var(--color-bg);
}

.chat-image__caption {
    padding: 0.6rem 1rem;
    font-size: var(--font-size-small);
    color: var(--color-text-muted);
    font-style: italic;
    border-top: 1px solid var(--color-border);
}

/* === Audio === */
.chat-audio {
    width: 100%;
    margin: 1rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-audio__card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
}

.chat-audio__icon {
    font-size: 1.8rem;
    flex-shrink: 0;
}

.chat-audio__info {
    flex: 1;
}

.chat-audio__label {
    font-family: var(--font-serif);
    font-size: 1rem;
    color: var(--color-text);
    margin-bottom: 0.3rem;
}

.chat-audio__player {
    width: 100%;
    height: 36px;
    border-radius: 4px;
}

.chat-audio__player::-webkit-media-controls-panel {
    background: var(--color-bg);
}

/* === Annotation (Textmarkierung) === */
.chat-annotation {
    width: 100%;
    margin: 1rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-annotation__card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.2rem;
}

.chat-annotation__prompt {
    font-family: var(--font-serif);
    font-size: 1rem;
    color: var(--color-text);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--color-border);
}

.chat-annotation__text {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    line-height: 1.9;
    color: var(--color-text);
    padding: 0.5rem;
    border-radius: 6px;
    background: var(--color-bg);
    cursor: text;
    -webkit-user-select: text;
    user-select: text;
}

.chat-annotation__text::selection {
    background: var(--color-accent);
    color: var(--color-text-inverse);
}

.chat-annotation__text .annotation-highlight {
    background: rgba(123, 158, 168, 0.25);
    border-bottom: 2px solid var(--color-accent);
    padding: 1px 2px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 200ms;
}

.chat-annotation__text .annotation-highlight--target {
    background: rgba(45, 138, 78, 0.25);
    border-bottom: 2px solid #2d8a4e;
}

.chat-annotation__progress {
    margin-top: 0.6rem;
    padding: 0.4rem 0.7rem;
    font-size: var(--font-size-small);
    color: var(--color-accent);
    font-family: var(--font-sans);
    font-weight: 600;
    text-align: center;
}

.chat-annotation__feedbacks {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    margin-top: 0.5rem;
}

.chat-annotation__feedback-item {
    background: rgba(45, 138, 78, 0.08);
    border-left: 3px solid #2d8a4e;
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-size: var(--font-size-ui);
    color: var(--color-text);
    line-height: var(--line-height-body);
    animation: fadeSlideIn 200ms ease-out both;
}

.chat-annotation__toolbar {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.6rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--color-border);
}

.chat-annotation__mark-btn {
    padding: 0.4rem 0.8rem;
    background: var(--color-accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--font-sans);
    font-size: var(--font-size-small);
    font-weight: 600;
    cursor: pointer;
    transition: background 200ms;
}

.chat-annotation__mark-btn:hover { background: var(--color-accent-light); }

.chat-annotation__clear-btn {
    padding: 0.4rem 0.8rem;
    background: transparent;
    color: var(--color-text-muted);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    font-family: var(--font-sans);
    font-size: var(--font-size-small);
    cursor: pointer;
    transition: all 200ms;
}

.chat-annotation__clear-btn:hover {
    background: var(--color-surface-hover);
    color: var(--color-text);
}

/* === Selbsteinschätzung === */
.chat-self-assessment {
    width: 100%;
    margin: 1rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-self-assessment__card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.2rem;
}

.chat-self-assessment__title {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    color: var(--color-text);
    margin-bottom: 1rem;
    text-align: center;
}

.chat-self-assessment__items {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
}

.chat-self-assessment__item {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
}

.chat-self-assessment__item-text {
    font-size: var(--font-size-ui);
    color: var(--color-text);
    margin-bottom: 0.6rem;
}

.chat-self-assessment__tiles {
    display: flex;
    gap: 0.4rem;
}

.chat-self-assessment__tile {
    flex: 1;
    padding: 0.5rem 0.4rem;
    background: var(--color-surface);
    border: 2px solid var(--color-border);
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    transition: all 200ms;
    font-size: 0.75rem;
    color: var(--color-text-muted);
    font-family: var(--font-sans);
}

.chat-self-assessment__tile-icon {
    font-size: 1.2rem;
    display: block;
    margin-bottom: 0.2rem;
}

.chat-self-assessment__tile:hover {
    border-color: var(--color-accent);
    color: var(--color-accent);
    background: var(--color-surface-hover);
}

.chat-self-assessment__tile--selected {
    border-color: var(--color-accent);
    background: var(--color-accent);
    color: var(--color-text-inverse);
}

.chat-self-assessment__tile--selected .chat-self-assessment__tile-icon {
    filter: brightness(10);
}

/* === Zeitstrahl === */
.chat-timeline {
    width: 100%;
    margin: 1.2rem 0;
    animation: fadeSlideIn 300ms ease-out both;
}

.chat-timeline__card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.2rem 0.8rem;
}

.chat-timeline__track {
    display: flex;
    align-items: center;
    position: relative;
    min-height: 80px;
    padding: 0.5rem 0;
}

.chat-timeline__line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--color-border);
    transform: translateY(-50%);
    border-radius: 2px;
}

.chat-timeline__epoch {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    flex: 1;
    min-width: 0;
    z-index: 1;
    cursor: pointer;
}

.chat-timeline__dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--color-border);
    border: 2px solid var(--color-surface);
    box-shadow: 0 0 0 1px var(--color-border);
    transition: all 200ms;
    cursor: pointer;
    padding: 0;
    font-size: 0;
    line-height: 0;
    flex-shrink: 0;
}

.chat-timeline__dot:hover {
    transform: scale(1.25);
    box-shadow: 0 0 0 2px var(--color-accent), 0 0 6px rgba(0,0,0,0.1);
}

.chat-timeline__dot:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 3px;
}

.chat-timeline__epoch--active .chat-timeline__dot {
    width: 18px;
    height: 18px;
    background: var(--color-accent);
    box-shadow: 0 0 0 2px var(--color-accent), 0 0 8px rgba(0,0,0,0.15);
}

.chat-timeline__epoch--selected .chat-timeline__dot {
    width: 20px;
    height: 20px;
    background: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary), 0 0 12px rgba(0,0,0,0.2);
    animation: timelinePulse 400ms ease-out;
}

@keyframes timelinePulse {
    0% { transform: scale(0.6); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

.chat-timeline__label {
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--color-text-muted);
    text-align: center;
    word-break: break-word;
    max-width: 100%;
    padding: 0 2px;
    font-family: var(--font-sans);
    transition: color 200ms;
}

.chat-timeline__epoch--active .chat-timeline__label {
    color: var(--color-accent);
    font-weight: 700;
}

.chat-timeline__epoch--selected .chat-timeline__label {
    color: var(--color-primary);
    font-weight: 700;
}

.chat-timeline__dates {
    font-size: 0.58rem;
    color: var(--color-text-muted);
    opacity: 0.7;
    transition: all 200ms;
}

.chat-timeline__epoch--active .chat-timeline__dates {
    opacity: 1;
    color: var(--color-accent);
}

.chat-timeline__epoch--selected .chat-timeline__dates {
    opacity: 1;
    color: var(--color-primary);
}

/* Info box: shared element below the track */
.chat-timeline__info-box {
    margin-top: 0.75rem;
    padding: 0.6rem 0.9rem;
    background: var(--color-bg);
    border-left: 3px solid var(--color-primary);
    border-radius: 0 8px 8px 0;
    font-size: var(--font-size-small);
    color: var(--color-text);
    font-family: var(--font-sans);
    line-height: var(--line-height-body);
    animation: fadeSlideIn 200ms ease-out both;
}

.chat-timeline__info-box strong {
    color: var(--color-primary);
    font-weight: 700;
}

/* === Animations === */
@keyframes fadeSlideIn {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes typingBounce {
    0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
    }
    30% {
        transform: translateY(-6px);
        opacity: 1;
    }
}

/* === Responsive === */
@media (max-width: 768px) {
    .chat-player {
        padding: 1rem 0.75rem 5rem;
    }

    .chat-message {
        max-width: 92%;
    }

    .chat-avatar {
        width: 40px;
        height: 40px;
    }

    .chat-finale__card {
        padding: 1.8rem 1.2rem;
    }
}

/* === Scrollbar Styling === */
.chat-player::-webkit-scrollbar {
    width: 6px;
}

.chat-player::-webkit-scrollbar-track {
    background: transparent;
}

.chat-player::-webkit-scrollbar-thumb {
    background: var(--color-border);
    border-radius: 3px;
}

/* === Zusammenfassung-Trigger === */
.chat-results-trigger {
    width: 100%;
    margin: 1.5rem 0;
    animation: fadeSlideIn 400ms ease-out both;
}

.chat-results-trigger__btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    width: 100%;
    padding: 1rem 1.5rem;
    background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: var(--font-sans);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 200ms, box-shadow 200ms;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.chat-results-trigger__btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
}

.chat-results-trigger__btn:active {
    transform: translateY(0);
}

.chat-results-trigger__icon {
    font-size: 1.3rem;
    animation: triggerPulse 2s ease-in-out infinite;
}

@keyframes triggerPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

/* === Ergebnis-Zusammenfassung === */
.chat-results {
    width: 100%;
    margin: 2rem 0;
    animation: fadeSlideIn 500ms ease-out both;
}

.chat-results__card {
    background: var(--color-surface);
    border: 2px solid var(--color-accent);
    border-radius: 16px;
    padding: 0;
    position: relative;
    overflow: hidden;
}

.chat-results__watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 10rem;
    opacity: 0.03;
    pointer-events: none;
}

.chat-results__header {
    text-align: center;
    padding: 1.5rem 1.5rem 1rem;
    background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
    color: #fff;
    position: relative;
}

.chat-results__badge {
    display: inline-block;
    padding: 0.2rem 0.8rem;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    font-family: var(--font-sans);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    backdrop-filter: blur(4px);
}

.chat-results__title {
    font-family: var(--font-serif);
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
}

.chat-results__subtitle {
    font-size: var(--font-size-small);
    color: rgba(255,255,255,0.75);
    margin-top: 0.2rem;
}

/* Stats overview row */
.chat-results__stats-row {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0;
    margin: -0.5rem 1.5rem 1rem;
    background: var(--color-bg);
    border-radius: 12px;
    position: relative;
    z-index: 1;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.chat-results__stat {
    flex: 1;
    text-align: center;
    padding: 0.7rem 0.5rem;
    border-right: 1px solid var(--color-border);
}

.chat-results__stat:last-child {
    border-right: none;
}

.chat-results__stat-value {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--color-accent);
    font-family: var(--font-sans);
}

.chat-results__stat-label {
    font-size: 0.6rem;
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-family: var(--font-sans);
    font-weight: 600;
}

/* Sections */
.chat-results__section {
    padding: 0 1.5rem;
    margin-bottom: 1.2rem;
}

.chat-results__section-title {
    font-family: var(--font-sans);
    font-size: var(--font-size-label);
    font-weight: 600;
    color: var(--color-accent);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

/* Quiz hero: ring + list */
.chat-results__quiz-hero {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
}

.chat-results__ring-wrap {
    position: relative;
    width: 90px;
    height: 90px;
    flex-shrink: 0;
}

.chat-results__ring {
    width: 100%;
    height: 100%;
}

.chat-results__ring-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.chat-results__ring-number {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--color-text);
    font-family: var(--font-sans);
    line-height: 1;
}

.chat-results__ring-label {
    font-size: 0.55rem;
    color: var(--color-text-muted);
    text-transform: uppercase;
    font-family: var(--font-sans);
    font-weight: 600;
}

.chat-results__quiz-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.chat-results__quiz-row {
    display: flex;
    align-items: flex-start;
    gap: 0.4rem;
    padding: 0.35rem 0.5rem;
    border-radius: 6px;
    font-size: 0.8rem;
    line-height: 1.4;
    color: var(--color-text);
    background: var(--color-bg);
}

.chat-results__quiz-row--correct {
    border-left: 3px solid #2d8a4e;
}

.chat-results__quiz-row--incorrect {
    border-left: 3px solid #c0392b;
}

.chat-results__quiz-icon {
    font-weight: 700;
    flex-shrink: 0;
    width: 1rem;
    text-align: center;
}

.chat-results__quiz-row--correct .chat-results__quiz-icon { color: #2d8a4e; }
.chat-results__quiz-row--incorrect .chat-results__quiz-icon { color: #c0392b; }

.chat-results__quiz-text {
    flex: 1;
}

/* Barometer bars */
.chat-results__bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.4rem;
}

.chat-results__bar-label {
    flex: 1;
    font-size: 0.82rem;
    color: var(--color-text);
}

.chat-results__bar-track {
    flex: 1.5;
    height: 8px;
    background: var(--color-border);
    border-radius: 4px;
    overflow: hidden;
}

.chat-results__bar-fill {
    height: 100%;
    background: var(--color-accent);
    border-radius: 4px;
    transition: width 800ms ease;
}

.chat-results__bar-value {
    width: 2rem;
    text-align: right;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--color-accent);
}

/* Reflection / Freetext cards */
.chat-results__reflection {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.5rem;
}

.chat-results__reflection-q {
    font-weight: 600;
    color: var(--color-text);
    font-size: 0.82rem;
    margin-bottom: 0.4rem;
    font-family: var(--font-sans);
}

.chat-results__reflection-a {
    position: relative;
    padding-left: 1.4rem;
    font-family: var(--font-serif);
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--color-text);
    font-style: italic;
}

.chat-results__reflection-quote {
    position: absolute;
    left: 0;
    top: -0.1rem;
    font-size: 1.4rem;
    color: var(--color-accent);
    opacity: 0.6;
    font-style: normal;
    line-height: 1;
}

/* Footer */
.chat-results__footer {
    padding: 1rem 1.5rem 1.5rem;
}

.chat-results__footer-note {
    text-align: center;
    margin-top: 0.5rem;
    font-size: 0.7rem;
    color: var(--color-text-muted);
    font-family: var(--font-sans);
}

.chat-results__copy-btn {
    display: block;
    width: 100%;
    padding: 0.7rem;
    background: var(--color-primary);
    color: var(--color-text-inverse);
    border: none;
    border-radius: 8px;
    font-family: var(--font-sans);
    font-size: var(--font-size-ui);
    font-weight: 600;
    cursor: pointer;
    transition: background 200ms, transform 100ms;
    position: relative;
}

.chat-results__copy-btn:hover { background: var(--color-primary-light); }
.chat-results__copy-btn:active { transform: scale(0.97); }

/* === Print Styles === */
@media print {
    .chat-progress, .chat-continue, .export-header { display: none; }
    .chat-player { padding: 0; max-width: 100%; }
    .chat-message { animation: none; max-width: 100%; }
    .chat-framing, .chat-quiz, .chat-barometer, .chat-checkpoint,
    .chat-freetext, .chat-results, .chat-finale { break-inside: avoid; }
    .chat-results__copy-btn { display: none; }
}


/* Font Fallback */
:root {
    --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
    --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-size-persona: 1.05rem;
    --font-size-ui: 0.95rem;
    --font-size-quote: 1.15rem;
    --font-size-small: 0.8rem;
    --font-size-label: 0.85rem;
    --line-height-body: 1.6;
    --line-height-tight: 1.3;
}
.sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0; }

/* ============================================
   EpochenChat – Theme: Sebastian Wolf
   Stil: Corporate Design (Lapbook / Marker)
   ============================================ */

[data-theme="sebastian-wolf"] {
    --color-primary: #7DFFC2;
    --color-primary-light: #a8ffd8;
    --color-primary-dark: #1a9960;
    --color-accent: #FF6B9D;
    --color-accent-light: #ff99bb;
    --color-accent-dark: #d44a78;
    --color-bg: #ece8f4;
    --color-surface: #FAFAF5;
    --color-surface-hover: #f0eee8;
    --color-bubble-persona: #FAFAF5;
    --color-bubble-persona-text: #1A1A1A;
    --color-bubble-learner: #e8ffe8;
    --color-bubble-learner-text: #1A1A1A;
    --color-text: #1A1A1A;
    --color-text-muted: #4a4a4a;
    --color-text-inverse: #ffffff;
    --color-border: #9e94b0;
    --color-shadow: rgba(0, 0, 0, 0.12);
    --color-overlay: rgba(0, 0, 0, 0.5);

    /* Texture – OS Dot Pattern */
    --texture-bg: radial-gradient(circle, rgba(0,0,0,0.04) 1px, transparent 1px);
    
    /* Font override for headers */
    --font-header-marker: 'VT323', monospace;
}

/* === Theme-spezifische Overrides === */

/* Desktop-Dot-Hintergrund für den Player */
[data-theme="sebastian-wolf"].chat-player {
    background-color: var(--color-bg);
    background-image: var(--texture-bg);
    background-size: 24px 24px;
    padding-top: 3rem;
}

/* Rahmungsmodul als OS-Panel */
[data-theme="sebastian-wolf"] .chat-framing {
    background: var(--color-primary);
    border: 2px solid #1A1A1A;
    border-radius: 0;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.25);
    transform: none;
    padding: 2rem 1.5rem 1.5rem;
    position: relative;
}

[data-theme="sebastian-wolf"] .chat-framing:before {
    content: attr(data-creator);
    position: absolute;
    top: -10px;
    left: 16px;
    background: var(--color-surface);
    padding: 2px 8px;
    font-size: 0.7rem;
    font-weight: 700;
    color: #666;
    border: 1px solid #999;
    border-radius: 0;
    box-shadow: 1px 1px 0 rgba(0,0,0,0.15);
    transform: none;
}

[data-theme="sebastian-wolf"] .chat-framing__title {
    font-family: var(--font-header-marker);
    font-weight: 400;
    color: var(--color-text);
    font-size: 1.5rem;
    text-transform: none;
    letter-spacing: 0.04em;
}

[data-theme="sebastian-wolf"] .chat-framing__text {
    color: var(--color-text);
    font-weight: 500;
}

/* Bubbles – dezent mit Akzent-Linie */
[data-theme="sebastian-wolf"] .chat-bubble {
    border-radius: 4px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    border: 1px solid #c0b8d0;
    transform: none;
}

[data-theme="sebastian-wolf"] .chat-message--persona .chat-bubble {
    transform: none;
    border-left: 3px solid var(--color-primary-dark);
    background: #FAFAF5;
}

[data-theme="sebastian-wolf"] .chat-message--learner .chat-bubble {
    transform: none;
    border-right: 3px solid var(--color-accent-dark);
    background: #f0f8f0;
}

/* Quiz-Card */
[data-theme="sebastian-wolf"] .chat-quiz__card {
    border: 2px solid #1A1A1A;
    border-radius: 0;
    background: var(--color-surface);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
}

[data-theme="sebastian-wolf"] .chat-quiz__question,
[data-theme="sebastian-wolf"] .chat-annotation__prompt,
[data-theme="sebastian-wolf"] .chat-self-assessment__title,
[data-theme="sebastian-wolf"] .chat-checkpoint__question,
[data-theme="sebastian-wolf"] .chat-freetext__prompt,
[data-theme="sebastian-wolf"] .chat-barometer__statement {
    font-family: var(--font-header-marker);
    font-weight: 400;
    font-size: 1.3rem;
    color: var(--color-text);
    margin-bottom: 1rem;
    line-height: 1.2;
    letter-spacing: 0.03em;
}

/* Checkpoint/Selbst/Annotation – unterscheidbare Panels */
[data-theme="sebastian-wolf"] .chat-checkpoint__card,
[data-theme="sebastian-wolf"] .chat-self-assessment__card,
[data-theme="sebastian-wolf"] .chat-annotation__card,
[data-theme="sebastian-wolf"] .chat-freetext__card,
[data-theme="sebastian-wolf"] .chat-barometer__card {
    border: 2px solid #1A1A1A;
    border-radius: 0;
    background: var(--color-surface);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    position: relative;
    padding: 1.5rem;
}

/* Annotation-Text selektierbar halten */
[data-theme="sebastian-wolf"] .chat-annotation__text {
    -webkit-user-select: text;
    user-select: text;
    cursor: text;
    background: #fff;
    border: 1px solid #c0b8d0;
    padding: 0.6rem;
}

/* Zitat als hervorgehobene Karte */
[data-theme="sebastian-wolf"] .chat-quote__card {
    background: #faf8f0;
    border: 2px solid #1A1A1A;
    border-left: 4px solid var(--color-accent);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    border-radius: 0;
}

[data-theme="sebastian-wolf"] .chat-quote__text {
    font-size: 1.1rem;
    color: var(--color-text);
}

/* Buttons – klar lesbar mit weißem Text */
[data-theme="sebastian-wolf"] .chat-framing__btn,
[data-theme="sebastian-wolf"] .chat-quiz__check-btn {
    border-radius: 0;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border: 2px solid #1A1A1A;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    font-family: var(--font-header-marker);
    font-size: 1.1rem;
    color: #fff;
}

[data-theme="sebastian-wolf"] .chat-framing__btn:active,
[data-theme="sebastian-wolf"] .chat-quiz__check-btn:active {
    box-shadow: 0 0 0 rgba(0,0,0,0.25);
    transform: translate(2px, 2px);
}

/* Timeline Contrast Boost */
[data-theme="sebastian-wolf"] .chat-timeline__dot {
    background: #7b6f96;
    border: 2px solid var(--color-surface);
    box-shadow: 0 0 0 1px #7b6f96;
}
[data-theme="sebastian-wolf"] .chat-timeline__epoch--active .chat-timeline__dot {
    background: var(--color-accent-dark);
    box-shadow: 0 0 0 2px var(--color-accent-dark), 0 0 8px rgba(0,0,0,0.2);
}
[data-theme="sebastian-wolf"] .chat-timeline__epoch--selected .chat-timeline__dot {
    background: var(--color-primary-dark);
    box-shadow: 0 0 0 3px var(--color-primary-dark), 0 0 12px rgba(0,0,0,0.25);
}
[data-theme="sebastian-wolf"] .chat-timeline__label {
    color: #3a3050;
    font-weight: 600;
}
[data-theme="sebastian-wolf"] .chat-timeline__epoch--active .chat-timeline__label {
    color: var(--color-accent-dark);
    font-weight: 700;
}
[data-theme="sebastian-wolf"] .chat-timeline__epoch--selected .chat-timeline__label {
    color: var(--color-primary-dark);
    font-weight: 700;
}
[data-theme="sebastian-wolf"] .chat-timeline__dates {
    color: #555;
    opacity: 0.85;
}
[data-theme="sebastian-wolf"] .chat-timeline__epoch--active .chat-timeline__dates {
    color: var(--color-accent-dark);
    opacity: 1;
}
[data-theme="sebastian-wolf"] .chat-timeline__epoch--selected .chat-timeline__dates {
    color: var(--color-primary-dark);
    opacity: 1;
}
[data-theme="sebastian-wolf"] .chat-timeline__info-box {
    border-left: 3px solid var(--color-primary-dark);
    background: rgba(26, 153, 96, 0.08);
}
[data-theme="sebastian-wolf"] .chat-timeline__info-box strong {
    color: var(--color-primary-dark);
}

/* Context Toggle Contrast */
[data-theme="sebastian-wolf"] .chat-context__toggle {
    color: var(--color-accent-dark);
    border: 1px solid #9e94b0;
    font-weight: 600;
}

/* Quiz Feedback Contrast */
[data-theme="sebastian-wolf"] .chat-quiz__feedback--correct {
    background: rgba(26, 100, 50, 0.12);
    color: #1a6432;
    border-left: 3px solid #1a6432;
}
[data-theme="sebastian-wolf"] .chat-quiz__feedback--incorrect {
    background: rgba(160, 30, 30, 0.1);
    color: #8b1a1a;
    border-left: 3px solid #8b1a1a;
}
[data-theme="sebastian-wolf"] .chat-quiz__option {
    border: 2px solid #9e94b0;
    background: #f5f3fa;
    color: #1A1A1A;
}
[data-theme="sebastian-wolf"] .chat-quiz__option--correct {
    border-color: #1a6432;
    background: rgba(26, 100, 50, 0.1);
}
[data-theme="sebastian-wolf"] .chat-quiz__option--incorrect {
    border-color: #8b1a1a;
    background: rgba(160, 30, 30, 0.06);
}
[data-theme="sebastian-wolf"] .chat-quiz__check-btn {
    background: #1a9960;
    color: #fff;
}
[data-theme="sebastian-wolf"] .chat-quiz__check-btn:hover {
    background: #15804f;
}

/* Barometer Contrast */
[data-theme="sebastian-wolf"] .chat-barometer__labels {
    color: #3a3050;
}

/* Source Reference Contrast */
[data-theme="sebastian-wolf"] .chat-source-ref {
    background: var(--color-accent-dark);
}

/* Persona Name Contrast */
[data-theme="sebastian-wolf"] .chat-persona-name {
    color: #3a3050;
}


/* Source Popup */
#source-popup {
    max-width: 340px;
    background: var(--os-bg, #1a0a2e);
    color: var(--os-text, #e0d0ff);
    border: 2px solid var(--os-primary, #8b5cf6);
    box-shadow: 4px 4px 0 var(--os-primary, #8b5cf6);
    padding: 0.75rem 1rem;
    font-family: var(--font-mono, 'IBM Plex Mono', monospace);
    font-size: 0.8rem;
    line-height: 1.5;
    border-radius: 0;
    animation: fadeDown 0.15s ease;
}
#source-popup .source-popup__label {
    font-family: var(--font-pixel, 'VT323', monospace);
    font-size: 1rem;
    color: var(--os-primary, #8b5cf6);
    margin-bottom: 0.4rem;
    letter-spacing: 1px;
}
#source-popup .source-popup__text {
    color: var(--os-text, #e0d0ff);
}
#source-popup .source-popup__close {
    display: block;
    margin-top: 0.5rem;
    background: none;
    border: 1px solid var(--os-primary, #8b5cf6);
    color: var(--os-primary, #8b5cf6);
    font-family: var(--font-pixel, 'VT323', monospace);
    font-size: 0.9rem;
    cursor: pointer;
    padding: 0.1rem 0.5rem;
    float: right;
}
#source-popup .source-popup__close:hover {
    background: var(--os-primary, #8b5cf6);
    color: var(--os-bg, #1a0a2e);
}

/* Export-spezifisch */
body {
    margin: 0;
    padding: 0;
    background: var(--color-bg);
    min-height: 100vh;
}

.export-header {
    text-align: center;
    padding: 1rem;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    font-family: var(--font-sans);
    font-size: 0.8rem;
    color: var(--color-text-muted);
}

.export-time {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
}
.export-footer {
    text-align: center;
    padding: 0.6rem;
    font-family: var(--font-sans);
    font-size: 0.6rem;
    color: var(--color-text-muted);
    opacity: 0.6;
}
.export-footer a {
    color: var(--color-accent);
    text-decoration: none;
}
.export-footer a:hover { text-decoration: underline; }
.export-footer__cc {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 12px;
    height: 12px;
    border: 1.5px solid var(--color-accent);
    border-radius: 50%;
    font-size: 0.4rem;
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1;
    vertical-align: middle;
    margin-right: 1px;
}
    

        /* Isolation Logic */
        body.chat-active > *:not(#chat-view):not(script) { display: none !important; }
        #chat-view .chat-player { max-width: 800px; margin: 0 auto; padding: 0 1rem 6rem; min-height: 100vh; display: flex; flex-direction: column; }
        .chat-progress .chat-progress__back + .chat-progress__back { display: none; }

    function numberToWord(n, feminine = false) {
      const words = ["Keine", "Ein", "Zwei", "Drei", "Vier", "Fünf", "Sechs", "Sieben", "Acht", "Neun", "Zehn", "Elf", "Zwölf", "Dreizehn", "Vierzehn", "Fünfzehn", "Sechzehn", "Siebzehn", "Achtzehn", "Neunzehn", "Zwanzig"];
      if (n <= 20) {
        let word = words[n];
        if (n === 1 && feminine) return "Eine";
        return word;
      }
      return n;
    }

      statsElem.textContent = `${numberToWord(authorCount)} ${aText}. ${numberToWord(epochCount, true)} ${eText}. Ein Gespräch.`;
    }

    const shelf = document.getElementById('shelf');
    const tline = document.getElementById('tline');

    sortedAuthors.forEach((a, i) => {

      <div class="tip-cta">✨ Klicken zum Öffnen</div>
    </div>
  `;
      book.addEventListener('click', () => openModal(a));
      book.addEventListener('mouseenter', () => highlightDot(a.id, true));
      book.addEventListener('mouseleave', () => highlightDot(a.id, false));
      shelf.appendChild(book);

      // Timeline dot
      const dot = document.createElement('div');
      dot.className = 't-dot';
      dot.id = 'dot-' + a.id;
      dot.style.left = a.timelinePos + '%';
      dot.style.background = a.highlight;

      if (offset > 0) lbl.style.transform = `translateX(-50%) translateY(${offset}px)`;

      tline.appendChild(lbl);

    function highlightDot(id, on) {
      const dot = document.getElementById('dot-' + id);
      if (dot) dot.classList.toggle('active', on);

      modal.classList.add('active');
