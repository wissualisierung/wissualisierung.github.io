ournalist, der über den Schriftsteller berichtet? 1956 habe ich mich in einer Radiosendung selbst in zwei Personen gespalten: den Journalisten und den Schriftsteller. Beide heißen Erich Kästner. Das amüsiert mich noch immer. Du liest meine Bücher in der Schule? Gut so. Denn ich war, wie ich selbst sagte: \"ein Moralist, ein Rationalist, ein Urenkel der deutschen Aufklärung.\" <span class=\"chat-source-ref\" title=\"Kästner in einer Radiosendung, 1956, zit. nach WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Kästner in einer Radiosendung, 1956, zit. nach WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"learner","content":"Kästner – das ist doch der mit Emil und die Detektive, oder? Ein Kinderbuchautor?"},{"type":"context","content":"Erich Kästner (1899–1974) gilt als einer der vielseitigsten deutschsprachigen Autoren des 20. Jahrhunderts. Er schrieb Satiren, Gedichte, Romane, Kabaretttexte und Kinderbücher. Sein erster Gedichtband Herz auf Taille (1928) machte ihn bekannt; mit Emil und die Detektive (1929) gelang ihm der Welterfolg. Hinzu kamen Pünktchen und Anton (1931), Das fliegende Klassenzimmer (1933) und der düstere Erwachsenenroman Fabian (1931). Der Germanistik-Professor Sven Hanuschek, Autor der maßgeblichen Kästner-Biographie Keiner blickte hinter das Gesicht, betont: Das Bild vom harmlosen Kinderbuchautor greife entschieden zu kurz."},{"type":"persona","content":"Kinderbuchautor – ja, das auch. Aber vor allem: Schulmeister. Ich selbst habe gesagt, man solle alle meine Texte vom Bilderbuch bis zum verfänglichsten Gedicht unter diesem Gesichtspunkt betrachten: geht die Rechnung ohne Bruch auf? Ist das Ergebnis klar genug? Ich wollte einfach und klar schreiben, mein Stil sollte klingen wie hingespuckt. Wobei man mich da heute gern korrigiert: Mein Stil war sehr poliert, ich hatte sehr lange daran gesessen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"learner","content":"Wie war deine Kindheit? Du kommst aus Dresden?"},{"type":"context","content":"Erich Kästner wurde am 23. Februar 1899 in einer Mietskaserne in Dresden geboren. Sein Vater Emil, gelernter Sattlermeister und später Arbeiter in einer Kofferfabrik, hatte in der Familie wenig zu sagen. Die eigentliche prägende Kraft war seine Mutter Ida Kästner: überaus ehrgeizig, kontrollierend und zeitweise an Depressionen erkrankt. Sie unternahm wiederholt Suizidversuche – Erich fand als Kind mehrfach Abschiedsbriefe auf dem Küchentisch und lief ihr nach, um sie von den Brücken zurückzuholen. Ida wollte dennoch stets eine perfekte Mutter sein, sie vermietete sogar Zimmer der kleinen Wohnung gezielt an Lehrer, damit ihr Sohn die richtigen Vorbilder hatte. Mit 14 wurde Kästner bereits ins Lehrerseminar aufgenommen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"persona","content":"Meine Mutter wollte die vollkommene Mutter werden. Und weil sie das wollte, nahm sie auf niemanden Rücksicht, auch auf sich selbst nicht. Und wurde es. Wenn man mich als Kind fragte, was ich werden wolle, antwortete ich aus ganzem Herzen: Lehrer. Woher dieser Wunsch kam, muss ich wohl nicht erklären. Ich habe sie später in meinem autobiographischen Buch Als ich ein kleiner Junge war (1957) beschrieben; mit Liebe, aber auch mit dem kühlen Blick des Moralisten. <span class=\"chat-source-ref\" title=\"Kästner, Als ich ein kleiner Junge war, 1957\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Kästner, Als ich ein kleiner Junge war, 1957\">Q</span>"},{"type":"learner","content":"Und wie bist du dann Schriftsteller geworden?"},{"type":"context","content":"Nach dem Lehrerseminar erkannte Kästner, dass er für den Lehrerberuf nicht geeignet sei. Er holte das Abitur nach und studierte in Leipzig Germanistik. Seine Doktorarbeit über die Aufklärung schloss er mit Summa cum Laude ab. Parallel begann er als Journalist zu arbeiten; der Journalismus war Kästners eigentliche Schriftstellerausbildung. Allein in den Leipziger Jahren soll er rund 10.000 Artikel verfasst haben, meist unter Pseudonym. 1927 zog er nach Berlin, wo er in Rekordzeit Autor für alle wichtigen Zeitungen wurde und auch für Hörfunk und Film schrieb. Alle seine Texte entstanden in Cafés und Bars, in Kurzschrift auf Papier gekritzelt, um sie später zu diktieren. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"persona","content":"Berlin, 1927. Das war meine Zeit. Die Weimarer Republik, die Großstadt, das Kabarett, das Kino. Ich schrieb für alle, ich schrieb über alles. Mein erster Gedichtband Herz auf Taille (1928) war ein Erfolg. Und dann kam Emil. Ich habe die Großstadt zum Schauplatz eines Kinderromans gemacht und die Sprache der Berliner Straße benutzt. Kein Wunder, dass Kinder und Erwachsene dieses Buch liebten. Ich wollte Mut machen und zeigen, dass Kinder, wenn sie zusammenhalten, Erwachsenen in nichts nachstehen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"annotation","text":"Als sie einander 8 Jahre kannten / und man darf sagen, sie kannten sich gut, / kam ihre Liebe plötzlich abhanden, / wie anderen Leuten ein Stock oder Hut.","prompt":"Markiere Merkmale der Neuen Sachlichkeit.","targets":[{"word":"abhanden","feedback":"Alltägliches, nüchternes Bild; Liebe wie ein verlorenes Alltagsobjekt, kein romantischer Pathos."},{"word":"8 Jahre kannten","feedback":"Sachliche Zeitangabe statt emotionaler Beschreibung; typisch für den „Gebrauchslyriker\" Kästner."}]},{"type":"quiz-single","question":"Welche literarische Epoche ist mit Kästners Schreibstil in der Weimarer Republik am engsten verbunden?","options":[{"text":"Expressionismus","correct":false,"feedback":"Der Expressionismus ist zeitlich früher (ca. 1910–1925) und arbeitet mit Übertreibung und Zerrissenheit, nicht mit Kästners kühler Sachlichkeit."},{"text":"Neue Sachlichkeit","correct":true,"feedback":"Richtig! Kästner selbst nennt sich \"Gebrauchslyriker\" und schreibt bewusst klar, direkt und ohne Pathos – Kernmerkmale der Neuen Sachlichkeit."},{"text":"Romantik","correct":false,"feedback":"Die Romantik liegt im frühen 19. Jahrhundert und ist geprägt von Gefühlstiefe und Natursehnsucht."},{"text":"Expressionismus","correct":false,"feedback":null}]},{"type":"learner","content":"Du hast die Bücherverbrennung 1933 selbst erlebt?"},{"type":"context","content":"Am 10. Mai 1933 verbrannten die Nationalsozialisten auf dem Berliner Opernplatz Bücher zahlreicher Autoren, darunter explizit Erich Kästner. Kästner war als Augenzeuge anwesend und hörte, wie man seinen Namen rief: \"Für Zersetzung und moralischen Zersatz in Familie und Staat, ich übergebe dem Feuer die Schriften von Erich Kästner.\" Es folgten Publikationsverbot im Inland, Beobachtung durch die Gestapo und zwei Verhaftungen. Kästner blieb dennoch in Deutschland; anders als viele seiner Kollegen, die ins Exil gingen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"persona","content":"Ich stand dabei und sah meine Bücher brennen. Ich war einer von wenigen Autoren, die das selbst mit ansehen mussten. Danach war ich, wie ich es selbst beschrieben habe: \"ein verbotener, ein ausradierter Schriftsteller – beschimpft, bespitzelt und jeden Tag und jede Stunde auf eigene Gefahr.\" Ich ging trotzdem nicht ins Ausland. Ich dachte zunächst: Der Spuk dauert ein Jahr. Und dann: Ich will Zeitzeuge sein und eines Tages darüber schreiben; einen großen Roman über das Dritte Reich. <span class=\"chat-source-ref\" title=\"Kästner, zit. nach WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Kästner, zit. nach WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"freetext","prompt":"Kästner blieb – im Gegensatz zu vielen Kollegen wie Thomas Mann oder Bertolt Brecht – in Deutschland. Beurteile diese Entscheidung."},{"type":"context","content":"Unter dem Pseudonym Berthold Bürger schrieb Kästner 1943 mit einer Sondergenehmigung von Goebbels das Drehbuch für Münchhausen, den teuersten Film des Dritten Reichs, gedreht zum 25. Jubiläum der UFA. Man deutet die Figur des Cagliostro im Film heute als Hitler-Karikatur; der Film soll Hitler in Berchtesgaden vorgeführt worden sein, woraufhin dieser einen Wutanfall bekam und ein Totalverbot erließ. Am Ende des Krieges begleitete Kästner mit gefälschten Papieren ein Filmteam nach Österreich. Dort traf er den KZ-Überlebenden Menno Kratz, dessen Bericht über Auschwitz ihn tief erschütterte. Den geplanten Roman über das Dritte Reich schrieb er nie. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"persona","content":"Ich wollte Zeuge sein. Ich wollte es aufschreiben. Doch als Menno Kratz mir erzählte, was in Auschwitz geschehen war, fiel dieser ganze Lebensentwurf in sich zusammen. Wie hätte ich das in einen Roman fassen sollen? Ich war nicht weggelaufen und ich hatte das Schlimmste doch nicht gesehen. Diese Scham hat mich nie ganz losgelassen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"barometer","statement":"Kästner trägt nach dem Krieg eine moralische Mitschuld, weil er unter dem NS-Regime weiter arbeitete.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"context","content":"In der Nachkriegszeit lebte Kästner in München. Er berichtete als Journalist von den Nürnberger Prozessen, schrieb Kabaretttexte und engagierte sich öffentlich: gegen die Wiederaufrüstung, gegen Atomwaffen. Mit Das doppelte Lottchen (1949) gelang ihm der größte Nachkriegserfolg. Er besuchte regelmäßig Schulklassen. In den letzten Lebensjahren litt er unter Krankheit, Schreibblockaden und betäubte seine Sorgen mit Alkohol. Seine letzten beiden Kinderbücher musste er sich Zeile für Zeile abquälen. Am 29. Juli 1974 starb Erich Kästner in München an Krebs. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"persona","content":"Lasst euch die Kindheit nicht austreiben. Nur wer erwachsen wird und Kind bleibt, ist ein Mensch. Haltet die Erinnerung wach. Wer das, was schön war, vergisst, wird böse. Wer das, was schlimm war, vergisst, wird dumm. <span class=\"chat-source-ref\" title=\"Kästner, zit. nach WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Kästner, zit. nach WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Kästner sind korrekt?","options":[{"text":"Kästner war 1933 selbst Augenzeuge der Bücherverbrennung auf dem Berliner Opernplatz.","correct":true,"feedback":"Korrekt! Er hörte seinen Namen bei der Verbrennung und beschrieb sich später als \"ausradierten Schriftsteller\"."},{"text":"Kästner emigrierte 1933 wie Thomas Mann ins Ausland.","correct":false,"feedback":"Falsch. Kästner blieb in Deutschland – eine seiner umstrittensten Entscheidungen."},{"text":"Unter falschem Namen schrieb Kästner 1943 das Drehbuch für den NS-Film Münchhausen.","correct":true,"feedback":"Korrekt! Er arbeitete unter dem Pseudonym Berthold Bürger mit einer Sondergenehmigung von Goebbels."},{"text":"Emil und die Detektive (1929) war Kästners erster großer Welterfolg.","correct":true,"feedback":"Korrekt! Das Buch wurde schnell übersetzt, auf dem Theater gespielt und 1931 erstmals verfilmt."},{"text":"Kästner schrieb nach dem Krieg den geplanten Roman über das Dritte Reich.","correct":false,"feedback":"Falsch. Der Bericht des KZ-Überlebenden Menno Kratz erschütterte ihn so tief, dass er dieses Vorhaben aufgab."}]},{"type":"quote","text":"Wer das, was schön war, vergisst, wird böse. Wer das, was schlimm war, vergisst, wird dumm.","source":"Erich Kästner"},{"type":"checkpoint","question":"Erkläre, weshalb Kästners Entscheidung, in Deutschland zu bleiben, kontrovers diskutiert wird."},{"type":"self-assessment","items":["Ich kann Kästners Werk den wichtigsten Gattungen zuordnen (Lyrik, Kinderliteratur, Roman)","Ich kann seinen Schreibstil mit der Neuen Sachlichkeit in Verbindung bringen","Ich kenne Kästners zwiespältige Rolle im Dritten Reich","Ich kann Kästners Selbstbild als Moralist und Aufklärer erläutern"]},{"type":"persona","content":"Keiner blickte hinter das Gesicht – das meint eine Biographie über mich. Vielleicht stimmt das. Ich habe viele Masken getragen: den Kinderbuchautor, den Kabarettisten, den Moralisten, den Bohemien. Dahinter steckte ein Mensch mit Schuldgefühlen, Schreibblockaden und einer übermächtigen Mutter. Schreiben war mein einziges verlässliches Handwerkszeug. Mit diesen Fähigkeiten schrieb ich vor allem für Kinder – in ihnen sah ich die Hoffnung. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen 23.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen 23.02.2019\">Q</span>"},{"type":"freetext","prompt":"Kästner nennt sich selbst einen „Urenkel der deutschen Aufklärung\". Erkläre diese Haltung."},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du hier:","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/erich-kaestner-118.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Erich_K%C3%A4stner"}],"literature":["Sven Hanuschek: Keiner blickte hinter das Gesicht. Das Leben Erich Kästners. Hanser, München 1999.","Kästner, Erich: Als ich ein kleiner Junge war. Atrium, Zürich 1957."]}] }, 'epochenchat_e_t_a_hoffmann': { name: 'E.T.A. Hoffmann', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD0whQSdoyB60vyjPGMDNIsm1iAX5B7DApCeoIY4JyfX6/rQAm0iRsEHHQ8iuQ8ZvJ5bLuEcflhT8m4yDPPBxgDIOcjH8+w3Mf73uM4rE8QWS3dvvmbnaEQEcZJwSRg547fWgR5O8UkM5jdNpU5VigXIwOwJ7Y/yK2LPw/HftbGMBQ+WZvs7YOU49iPlY+nPuBVGa382+SBIxvZuQ0pVjyCM5PBAI69B9OfRNDtrW2t4IZvLjUrjDAEnAwP6njg/wAqYgm8BaXLYAWVvGkygfMSDv4HBPX9ecmsVfhjKhSS5ljuBgiRUQIcgZB5b1ABwRwT0616VF5WSkUqkgcDZ255z3HWp3cKi7iD74xzSuOxw8nw6010idY/KuEbeGSQ8fMTjPsDjOOw+lYniDwy+iwQXNq0jxpwUDHcDkfMpAyGyM9eSAPavSzPbqPnlVBzgucA/T9Ko6rawarpE0cU0biVfkeNgecZBB7+tFwseNPLCsjNbYaAEbyJmLEcAttOOc4/GvTvBM3m2DovO5txfAK7wAGBIJwfu8Hr1Ga8++1S2xSZyBIRh0dd3mc8Hp1BA75BOTzur0zwVFEdFS4Ct58mVkJO0EqxHToMHPT9abBG4FOQwH/jmM09CM/KD+VT4JIGOvXmnbDkcZ9w2MVIyJWHfrj0PSilCMAeMN6Z7dfWigDOHmBTkgnsaTGGOX6dQKY+3nCoSelO2q3J4/DtQAqoANwfj6dKiuITcQtEHC5BHXkHHv0qXcoYZCkew4phK5B+UevHegDyq8tQviwR7XjCtIUff/CQc9c+/wDia0mkYxyw2WjxSsiBne5hMjOBwFUE545Pt+Oas+KYha69ZSOSI5jIoEQJPIJyecdTgAc8E84xWnpiQXNvHICjblxIr4LHnqfU8e3X6VQjJstd1rSo7bZapCkm5hbKpYxqpORg8jjBABx3HpXf3E1xLbJcoUWQR5IP3QcZ9uKz inen Texten, Erzählungen und Briefen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Hoffmanns Leben","start":1776,"end":1822,"active":true,"info":"Geboren als Ernst Theodor Wilhelm Hoffmann in Königsberg. Gestorben in Berlin mit nur 46 Jahren."},{"name":"Romantik","start":1795,"end":1835,"active":false,"info":"Gefühlstiefe, Natursehnsucht, Hinwendung zum Irrationalen und Übernatürlichen."},{"name":"Schwarze Romantik","start":1800,"end":1830,"active":false,"info":"Schauerromantik, Doppelgängermotiv, dämonische Psyche, Automaten, Wahnsinn."},{"name":"Befreiungskriege","start":1813,"end":1815,"active":false,"info":"Napoleons Feldzüge erschüttern Europa. Hoffmann erlebt politische Zeitenwende und persönliche Not."}]},{"type":"persona","content":"Guten Abend – oder sollte ich sagen: Gute Nacht? Das ist wohl die passendere Stunde für mein Werk. Ich bin Ernst Theodor Amadeus Hoffmann, Jurist, Komponist, Zeichner und Schriftsteller; obwohl mir die Reihenfolge dieser Tätigkeiten herzlich gleichgültig war. Meinen dritten Vornamen Wilhelm habe ich übrigens selbst in Amadeus umgetauft, zu Ehren meines Abgottes Mozart. Du begegnest mir in der Schule? Nun, dort begegnete ich selbst dem langweiligsten aller Zwänge: dem bürgerlichen Vernunftleben. Doch es blieb mir wenig übrig. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 25.06.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 25.06.2022\">Q</span>"},{"type":"learner","content":"Du warst also eigentlich kein reiner Schriftsteller?"},{"type":"context","content":"E.T.A. Hoffmann (1776–1822) war ein echter Universalkünstler: Er arbeitete hauptberuflich als Jurist und Richter, komponierte Opern und Sinfonien, zeichnete Karikaturen und schrieb Erzählungen – oft parallel. Er selbst formulierte seine Zerrissenheit in einem Brief: \"Die Wochentage bin ich Jurist und höchstens etwas Musiker. Sonntags am Tage wird gezeichnet und abends bin ich ein sehr witziger Autor bis spät in die Nacht.\" Sein literarisches Werk entstand fast ausschließlich in den letzten acht Jahren seines Lebens."},{"type":"persona","content":"Ich musste mich zwingen, Jurist zu werden. Die Kunst war mein eigentliches Leben. Aber die Familie, die Gesellschaft, das notwendige Übel Geld; alles verlangte, dass ich Akten wälze. Ich schloss das Studium mit Auszeichnung ab. Dann aber begannen die Jahre der Strafversetzungen, der Skandale, des Hungers. In Posen zeichnete ich Spottbilder auf hochrangige Offiziere. Das war, nun, sagen wir einfach \"diplomatisch unklug\". Man versetzte mich nach Płock, ans Ende der Welt. Dort komponierte ich. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 25.06.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 25.06.2022\">Q</span>"},{"type":"learner","content":"Spottbilder auf Militäroffiziere? Wie kam es dazu?"},{"type":"context","content":"Beim Posener Karnevalsumzug 1802 kursierten Karikaturen hochrangiger Militärangehöriger. Als herauskam, dass Hoffmann die Zeichnungen angefertigt hatte, wurde er disziplinarisch strafversetzt – zunächst nach Płock, dann nach Warschau. Hoffmann hatte schon eine gewisse Begabung für Skandale. Er verabscheute Spitzelwesen und preußische Bürokratie zeitlebens und wehrte sich – mal literarisch, mal zeichnerisch."},{"type":"persona","content":"Płock war eine Strafe, ja. Aber ich komponierte dort. Warschau dann war besser; eine Großstadt, ein Orchester, ein Singspiel. Doch 1806 rückten Napoleons Soldaten ein, die preußischen Behörden wurden aufgelöst, und ich verlor meine Stellung. Berlin. Hunger. Fünf Tage nur Brot. Ich schrieb damals an meinen Freund Hippel: \"Ich arbeite mich müde und matt, setze der Gesundheit zu und erwerbe nichts. Seit fünf Tagen habe ich nichts gegessen als Brot. So war es noch nie.\" <span class=\"chat-source-ref\" title=\"Brief an Theodor Gottlieb von Hippel, zit. nach WDR Zeitzeichen, 25.06.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Brief an Theodor Gottlieb von Hippel, zit. nach WDR Zeitzeichen, 25.06.2022\">Q</span>"},{"type":"annotation","text":"Die Wochentage bin ich Jurist und höchstens etwas Musiker. Sonntags am Tage wird gezeichnet und abends bin ich ein sehr witziger Autor bis spät in die Nacht.","prompt":"Markiere Hinweise auf Hoffmanns Doppelleben als Beamter und Künstler.","targets":[{"word":"Wochentage / Jurist","feedback":"Das bürgerliche Pflichtleben dominiert den Alltag; die Kunst ist in die Randzeiten verbannt."},{"word":"Sonntags","feedback":"Der einzige freie Tag gehört der Kunst – Zeichnen und Schreiben als Gegenwelt zum Berufsalltag."},{"word":"witziger Autor","feedback":"Die Selbstironie verdeckt den Ernst: Hoffmann schreibt bis tief in die Nacht, was ihm eigentlich am wichtigsten ist."}]},{"type":"quiz-single","question":"Warum ersetzte Hoffmann seinen Vornamen Wilhelm durch Amadeus?","options":[{"text":"Aus Verehrung für Mozart, der starb, als Hoffmann 15 Jahre alt war.","correct":true,"feedback":"Genau! Hoffmann bewunderte Mozart als musikalisches Vorbild und übernahm dessen zweiten Vornamen als Zeichen seiner Huldigung."},{"text":"Um sich vor seinen Vorgesetzten zu verbergen.","correct":false,"feedback":"Nein, das ist eine Verwechslung mit späteren Zensurproblemen."},{"text":"Weil sein Vater diesen Namen trug.","correct":false,"feedback":"Nein, sein Vater verließ die Familie früh; der Name ist eine künstlerische Geste."},{"text":"Auf Geheiß seines Verlegers, um Verwechslungen zu vermeiden.","correct":false,"feedback":null}]},{"type":"context","content":"Hoffmanns literarisches Gesamtwerk entstand fast ausschließlich zwischen 1814 und 1822 – den letzten acht Jahren seines Lebens. In diesen letzten acht Jahren seines Lebens ist Hoffmann künstlerisch förmlich explodiert. In dieser Zeit schrieb er über 40 teils umfangreiche Erzählungen, sieben Romane und mehrere Sammelwerke. Bekannte Werke sind u. a. Der Sandmann (1816), Die Elixiere des Teufels (1815/16), Lebensansichten des Katers Murr (1819–1821) und das Märchen Das fremde Kind."},{"type":"learner","content":"Was ist das Besondere an deinen Erzählungen? Warum nennt man dich \"Gespenster-Hoffmann\"?"},{"type":"persona","content":"Weil ich das beschreibe, was die Aufklärung so gerne verdrängen wollte: die dunklen Seiten der menschlichen Seele. Das Triebhafte, das Dämonische, den Wahnsinn. Nach einem Jahrhundert der Vernunft wollte ich wissen: Was lauert darunter? In meinen Nachtstücken – zu denen der Sandmann gehört – begegnen euch menschliche Automaten, Traumata, Träume und unheimliche Wiederholungen. Und die Grenzen zwischen Wirklichkeit und Fantasie? Die habe ich absichtlich fließend gehalten. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 25.06.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 25.06.2022\">Q</span>"},{"type":"quote","text":"Sie schließt den Menschen ein unbekanntes Reich auf, eine Welt, die nichts gemein hat mit der äußeren Sinnenwelt, die ihn umgibt.","source":"E.T.A. Hoffmann über die Musik, zit. nach WDR Zeitzeichen (2022)"},{"type":"learner","content":"Der Sandmann – was passiert da eigentlich?"},{"type":"context","content":"Der Sandmann (1816) ist Hoffmanns bekannteste Erzählung und Teil des Zyklus Nachtstücke. Im Mittelpunkt steht der Student Nathanael, der seit seiner Kindheit vom \"Sandmann\" verfolgt wird – einer Schreckfigur, die in seiner Vorstellung mit dem Advokaten Coppelius verschmilzt. Später begegnet Nathanael dem Wetterglashändler Coppola, hält ihn für dieselbe unheimliche Gestalt und gerät immer tiefer in Angst und Wahn. Zugleich verliebt er sich in Olimpia, die Tochter des Professors Spalanzani, die sich schließlich als Automat erweist. Gerade diese Mischung aus Kindheitstrauma, Verfolgungsangst, Automatenmotiv und Realitätsverlust macht die Erzählung zu einem Schlüsseltext der Schwarzen Romantik."},{"type":"persona","content":"Viele lesen den Sandmann als bloße Schauergeschichte. Das ist zu wenig. Mich interessierte, wie ein Mensch an seiner Wahrnehmung zerbricht. Nathanael sieht, hört und deutet die Welt nicht mehr verlässlich; alles wird Zeichen einer Bedrohung. Olimpia ist deshalb so wichtig: Sie ist schön, reglos, künstlich, scheinbar vollkommen – und doch nur Mechanik. Der Schrecken entsteht nicht erst im Dämonischen, sondern dort, wo das Leblose dem Lebendigen zu ähnlich wird. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 25.06.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 25.06.2022\">Q</span>"},{"type":"annotation","text":"Da fiel mein in der Kirche umherschweifender Blick auf einen langen, hageren Mann, der mir schräg gegenüber auf eine Bank gestiegen, sich an einen Eckpfeiler lehnte. Er hatte auf seltsame, fremde Weise einen dunkelvioletten Mantel umgeworfen und die übereinander geschlagenen Arme darin gewickelt. Sein Gesicht war leichenblass, aber der Blick der großen, schwarzen, stieren Augen fuhr wie ein glühender Dolchstich durch meine Brust.","prompt":"Markiere Stilmittel der Schauerromantik.","targets":[{"word":"leichenblass","feedback":"Leichenmetaphorik – das Lebendige wird mit dem Tod kontaminiert; typisches Motiv der Schwarzen Romantik."},{"word":"glühender Dolchstich","feedback":"Synästhesie und Gewaltmetapher: Ein Blick wird als körperlicher Angriff dargestellt; so wird Angst sinnlich erfahrbar."},{"word":"dunkelvioletter Mantel","feedback":"Farb- und Kostümsymbolik: Dunkelviolett verbindet Trauer, Mysterium und das Dämonische."}]},{"type":"annotation","text":"Der Sandmann, der den Kindern die Augen nimmt, ist für Nathanael keine harmlose Märchenfigur, sondern der Kern eines lebenslangen Traumas. Später erscheint Coppola wieder – oder scheint wiederzuerscheinen.","prompt":"Markiere, mit welchen Elementen das Unheimliche erzeugt wird.","targets":[{"word":"Augen","feedback":"Das Motiv bündelt Angst, Wahrnehmung und Identität; bedroht sind nicht nur Körperteile, sondern das sichere Sehen selbst."},{"word":"wieder - oder scheint","feedback":"Das Unheimliche entsteht aus Unsicherheit: Ist es wirklich dieselbe Figur oder nur Nathanaels Projektion?"},{"word":"Traumas","feedback":"Kindheitserfahrung wirkt in die Gegenwart hinein und verzerrt die Wirklichkeit."}]},{"type":"quiz-single","question":"Warum wirkt Olimpia im Sandmann so unheimlich?","options":[{"text":"Weil sie eine offen dämonische Hexengestalt ist.","correct":false,"feedback":"Nein, gerade ihre scheinbare Perfektion macht sie unheimlich."},{"text":"Weil sie wie ein Mensch erscheint, aber in Wahrheit ein Automat ist.","correct":true,"feedback":"Genau! Das Leblose im Gewand des Lebendigen gehört zum Kern des Unheimlichen."},{"text":"Weil sie Nathanael absichtlich in den Wahnsinn treibt.","correct":false,"feedback":"Nicht direkt; entscheidend ist Nathanaels Wahrnehmung."},{"text":"Weil sie am Ende als Doppelgängerin Claras entlarvt wird.","correct":false,"feedback":null}]},{"type":"persona","content":"Freilich hat Goethe meine Texte als \"fieberhafte Träume eines leicht beweglichen, kranken Gehirns\" abgetan. Und doch: Edgar Allan Poe, Balzac, Baudelaire und Gogol haben mich gelesen. Die Nachwelt hat geurteilt, nicht Goethe. Meister-Erzähler der Schauerromantik nennt man mich heute. Das nehme ich an. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 25.06.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 25.06.2022\">Q</span>"},{"type":"context","content":"Hoffmanns Einfluss auf die Weltliteratur ist enorm. Zu seinen Nachfolgern zählen unter anderem Edgar Allan Poe, Honoré de Balzac, Charles Baudelaire und Nikolai Gogol. Auch moderne Literaturtheorien und spätere Erzählverfahren knüpfen an ihn an: Die ungewöhnliche Struktur des Katers Murr, bei der zwei Manuskripte quer durcheinander gedruckt sind, wirkt erstaunlich modern. Friedhelm Marx sagt dazu, die Postmoderne habe in gewisser Weise erst wieder eingeholt, was Hoffmann dort schon angestellt habe."},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Hoffmanns Werk sind korrekt?","options":[{"text":"Der Sandmann thematisiert das Motiv des Automaten und des Wahnsinns.","correct":true,"feedback":"Richtig! Nathanaels Liebe zu Olimpia und sein Absturz in den Wahn stehen im Zentrum."},{"text":"Hoffmann gilt als prägender Autor der deutschen Schauerromantik.","correct":true,"feedback":"Korrekt! Mit Texten wie Die Elixiere des Teufels und dem Sandmann prägte er die \"Schwarze Romantik\" wie kaum ein anderer."},{"text":"Hoffmann veröffentlichte sein Gesamtwerk über einen Zeitraum von 30 Jahren.","correct":false,"feedback":"Nein, das Werk entstand fast vollständig in nur acht Jahren (1814–1822)."},{"text":"Im Kater Murr parodiert Hoffmann den klassischen Bildungsroman.","correct":true,"feedback":"Genau! Statt eines Menschen durchläuft ein Kater den Bildungsweg und die Manuskriptseiten werden mit einer anderen Biographie vermischt."},{"text":"Goethe lobte Hoffmanns Werk ausdrücklich als Vorbild für die Romantik.","correct":false,"feedback":"Das Gegenteil ist der Fall: Goethe verbreitete Walter Scotts vernichtende Kritik mit."}]},{"type":"freetext","prompt":"Im Sandmann zerbricht Nathanael an seiner Wahrnehmung. Erkläre, wie Hoffmann Angst erzeugt."},{"type":"barometer","statement":"Hoffmanns Automaten-Motiv ist auch heute noch aktuell.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"persona","content":"Am Ende meines Lebens war ich gelähmt. Beine, Arme, nichts gehorchte mehr. Ich diktierte meine Texte. Mein letztes großes Werk, den Kater Murr, konnte ich nicht mehr vollenden; der Roman bricht ab. Am 25. Juni 1822 starb ich in Berlin an einer Atemlähmung. 46 Jahre. Ich habe nicht viel Zeit gehabt. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 25.06.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 25.06.2022\">Q</span>"},{"type":"quote","text":"„Wer wagt durch das Reich der Träume zu schreiten, gelangt zur Wahrheit.“ – E.T.A. Hoffmann, zit. nach WDR Zeitzeichen (2022)","source":""},{"type":"checkpoint","question":"Erkläre, was mit dem Begriff \"das Unheimliche\" bei Hoffmann gemeint ist."},{"type":"self-assessment","items":["Ich kenne die wichtigsten Lebensstationen E.T.A. Hoffmanns","Ich kann Hoffmanns Doppelleben als Jurist und Künstler erläutern","Ich verstehe, was die Schwarze Romantik von der Hochromantik unterscheidet","Ich kann das Motiv des Automaten und des Unheimlichen im Sandmann erklären"]},{"type":"persona","content":"Ich war Jurist, der lieber Künstler gewesen wäre. Ich war Komponist, der auch als Schriftsteller überleben konnte. Ich war Romantiker, der das Dunkle, das Irrationale und das Wahnhafte in die Literatur trug. Widersprüchlich? Gewiss. Aber vielleicht ist es gerade das, was meine Texte lebendig hält. Die Vernunft ordnet. Die Fantasie öffnet Türen, die ihr am liebsten geschlossen ließet. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 25.06.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 25.06.2022\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt des Sandmanns oder von Hoffmanns Leben hat dich am meisten überrascht oder beeindruckt? Begründe kurz."},{"type":"finale","text":"Wenn dich mein Leben und mein Werk interessieren, dann recherchiere weiter!","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/zeitzeichen-todestag-e-t-a-hoffmann-100.html"},{"label":"BR2 RadioWissen","url":"https://www.ardsounds.de/episode/urn:ard:episode:6c41e6875320e19c/"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/E._T._A._Hoffmann"}],"literature":["Friedhelm Marx: E.T.A. Hoffmann. Reclam, Stuttgart 2005.","Hartmut Steinecke: E.T.A. Hoffmann. Darmstadt 2011."]}] }, 'epochenchat_georg_trakl': { name: 'Georg Trakl', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0H ber 1914 in Krakau gestorben. Was du hier liest, basiert auf seinen Gedichten, Briefen und biografischen Zeugnissen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Expressionismus","start":1910,"end":1925,"active":false,"info":"Aufschrei gegen Moderne und Krieg, Farbsymbolik, Ich-Zerfall, Großstadtangst."},{"name":"Trakls Leben","start":1887,"end":1914,"active":true,"info":"Geboren in Salzburg. Gestorben in Krakau an Kokainvergiftung. Nur 27 Jahre alt."},{"name":"Zerfall der Monarchie","start":1900,"end":1918,"active":false,"info":"Die k. u. k. Monarchie Österreich-Ungarn verfällt politisch und kulturell. Mit dem Krieg kommt der endgültige Untergang."},{"name":"Erster Weltkrieg","start":1914,"end":1918,"active":false,"info":"Trakl erlebt die Grausamkeit als Militärapotheker – und überlebt sie nicht."}]},{"type":"persona","content":"Ich bin Georg Trakl, geboren am 3. Februar 1887 in Salzburg. Eine Stadt, die ihre Wunderkinder liebt... spätestens, wenn sie tot sind. Ich war nicht lebenstauglich, wie man so sagt. Tram fahren, umziehen, telefonieren – das alles hat mir wahnsinnige Schwierigkeiten bereitet. Und trotzdem – oder vielleicht genau deswegen – habe ich Gedichte geschrieben, die die Nachwelt nicht loswird. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 03.02.2012\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 03.02.2012\">Q</span>"},{"type":"learner","content":"Trakl aus Salzburg – das klingt erstmal harmlos. Was hat ihn so geprägt, dass er als \"Autor der Extreme\" gilt?"},{"type":"context","content":"Trakl wuchs äußerlich behütet auf: Der Vater war ein wohlhabender Eisenwarenhändler. Doch die Mutter war eine labile Persönlichkeit, drogengeneigt und tagelang abwesend. Geborgenheit und Liebe kamen von den Eltern kaum. Das Haus Trakl kann man wohl als \"kühl\" beschreiben. Die einzige wirklich innige Beziehung führte Trakl mit seiner jüngeren Schwester Grete: eine Seelenverwandtschaft, die beiden auf absonderlich anmutende Weise Halt gab. Zugleich spürte Trakl früh die Starre und den Verfall der k. u. k. Monarchie und eine dunkle Ahnung, dass eine große Umwälzung bevorstehen würde."},{"type":"persona","content":"Ich habe früh versagt: in der Schule, in der Familie, im Alltag. Ich las Dostojewski, Nietzsche, Rimbaud. Ich schloss mich Literaturkreisen an, diskutierte wild und heftig, kleidete mich mit großer Pose. Die Schule interessierte mich nicht mehr. Das war eine Schande für meine Familie. Ohne Matura blieb nur Pharmazie. Und die Apotheke hatte einen praktischen Vorteil: Man kommt leicht an Drogen. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 03.02.2012\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 03.02.2012\">Q</span>"},{"type":"learner","content":"Also haben Drogen bei der Dichtung geholfen?"},{"type":"context","content":"Das wäre zu weit gegriffen. Trakls Gedichte sind, trotz des Drogenexzesses, streng durchkomponiert: kleine Gebäude mit einer sehr bewussten Architektur, bei denen nichts dem Zufall überlassen ist. Das schließt einen völligen Rausch beim Schreiben aus. Trakl feilte an jedem Wort, rang um seinen Stil. Was auffällt: sein einzigartiger Umgang mit Farben. Schwarz, Blau, Rot; bei ihm sind Farben tragende Bilder für Seelenzustände: \"Schwermut blaut im Schoß der Fraun\"."},{"type":"annotation","text":"Dunkle Stille der Kindheit. / Unter grünen Eschen weidet die Sanftmut bläulichen Blickes. / Goldene Ruh.","prompt":"Markiere die Farbnutzung in den Versen.","targets":[{"word":"grün","feedback":"Grün steht bei Trakl mehrdeutig für Natur und Jugend, aber auch für Verwesung und das Vergängliche."},{"word":"bläulich","feedback":"Blau ist Trakls häufigste Farbe. Sie steht für Transzendenz, Stille, Sehnsucht nach dem Unerreichbaren."},{"word":"golden","feedback":"Gold evoziert Stille und eine vergangene Schönheit und wird oft mit einem Unterton von Melancholie verbunden."}]},{"type":"quiz-single","question":"Wie verwendet Trakl Farben in seinen Gedichten?","options":[{"text":"Als realistische Beschreibung der Natur","correct":false,"feedback":"Trakl geht weit über Naturbeschreibung hinaus. Bei ihm sind Farben keine Adjektive, sondern eigenständige Träger von Bedeutung."},{"text":"Als politische Symbole für Revolution und Aufstand","correct":false,"feedback":"Das ist eher der explizite Expressionismus anderer Autoren. Trakls Politisierung ist verdeckter, abgründiger."},{"text":"Als eigenständige Metaphern für Seelenzustände und Verfall","correct":true,"feedback":"Richtig! Farben wie Blau, Schwarz und Rot verselbständigen sich bei Trakl zu Bedeutungsträgern, losgelöst von konkreten Gegenständen."},{"text":"Als dekoratives Stilmittel ohne tiefere Bedeutung","correct":false,"feedback":"Im Gegenteil: Trakls Farbgebung ist das meistuntersuchte Merkmal seiner Lyrik."}]},{"type":"persona","content":"Nach dem Examen wurde ich Militärapotheker; Medikamenten-Akzessist, wie es amtlich hieß. Ich wurde nach Innsbruck versetzt. Todunglücklich. Bis ein Freund dafür sorgte, dass die Zeitschrift Brenner eines meiner Gedichte druckte. Ludwig von Ficker, ihr Herausgeber, wurde so etwas wie ein Vaterfigur für mich. Er hat mir manchmal buchstäblich das Leben gerettet – einen Unterschlupf, etwas Geld, einen Ort zum Schlafen. Ohne den Brennerkreis hätte ich nicht überlebt, bevor der Krieg mich holte. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 03.02.2012\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 03.02.2012\">Q</span>"},{"type":"context","content":"Der Brenner, eine in Innsbruck erscheinende Avantgarde-Zeitschrift, wurde Trakls wichtigstes Publikationsorgan. Herausgeber Ludwig von Ficker nahm eine Vaterfunktion ein und rettete Trakl immer wieder aus materieller Not. Trakl selbst suchte gleichzeitig Halt bei zwei Extremen: beim Militär einerseits – als Sehnsucht nach dem ganz handfesten Leben –, bei der Religion andererseits. Doch beide Extreme haben ihn nicht gerettet. Der Trost, den er vermeintlich suchte, blieb ihm unerreichbar."},{"type":"freetext","prompt":"Trakl sehnte sich gleichzeitig nach dem Militär und der Religion; nach zwei Welten, zu denen er selbst sagte, er könne nie wirklich dazugehören. Was sagt das über seine innere Zerrissenheit aus? Charakterisiere diese Sehnsucht."},{"type":"persona","content":"Dann kam Sarajevo. Der Thronfolger war tot. Das ganze Land war in Schockstarre – und ich war mittendrin. Im August 1914 zog ich mit einer Sanitätskolonne ins Feld. In Grodek, in Ostgalizien, lag ich in einer Scheune mit sechzig schwerverwundeten Soldaten. Keine Medikamente. Nur Schreien, Bluten, Sterben. Meine Aufgabe war es, Hilfe zu geben, wo es keine Hilfe mehr geben konnte. Bisher war die Finsternis meiner Gedichte Fantasie. Jetzt war sie Wirklichkeit. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 03.02.2012\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 03.02.2012\">Q</span>"},{"type":"quote","text":"Am Abend tönen die herbstlichen Wälder von tödlichen Waffen, die goldnen Ebenen und blauen Seen, darüber die Sonne düstrer hinrollt; umfängt die Nacht sterbende Krieger, die wilde Klage ihrer zerbrochenen Münder.","source":"Georg Trakl, Grodek (1914)"},{"type":"annotation","text":"Alle Straßen münden in schwarze Verwesung.","prompt":"Markiere die komprimierten, eindringlichen Kernbilder dieses Auszugs.","targets":[{"word":"Straßen","feedback":"Straßen sind eigentlich Wege zum Ziel, doch hier führen alle ins Nichts. Die Richtungslosigkeit ist total."},{"word":"schwarze Verwesung","feedback":"Schwarz ist Trakls Farbe des Todes; Die \"Verwesung\" macht den biologischen Zerfall konkret und unausweichlich."}]},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Trakl und Grodek sind korrekt?","options":[{"text":"Grodek entstand 1914 in der psychiatrischen Klinik in Krakau, wohin Trakl nach einem Zusammenbruch eingewiesen wurde.","correct":true,"feedback":"Richtig! Trakl schrieb das Gedicht nach seinen traumatischen Erlebnissen an der Ostfront, während er sich in Krakau unter psychiatrischer Beobachtung befand."},{"text":"Grodek ist ein Lobgedicht auf den Heldenmut der österreichischen Soldaten.","correct":false,"feedback":"Im Gegenteil: das Gedicht zeigt den Krieg als sinnloses Sterben, ohne jede Verklärung."},{"text":"Trakl hatte bei Grodek keine Medikamente und musste Sterbenden zusehen, ohne helfen zu können.","correct":true,"feedback":"Richtig! Diese traumatische Ohnmacht gilt als einer der Auslöser seines Zusammenbruchs."},{"text":"Das Gedicht Grodek gilt als eines der bedeutendsten Antikriegsgedichte der deutschen Literatur.","correct":true,"feedback":"Richtig! Es verbindet persönliche Erschütterung mit expressionistischer Bildsprache zu einem zeitlosen Dokument."},{"text":"Trakl überlebte den Krieg und kehrte nach Salzburg zurück.","correct":false,"feedback":null}]},{"type":"persona","content":"Nach Grodek versuchte ich, mich zu erschießen. Man riss mir die Waffe aus der Hand. Man brachte mich zur psychiatrischen Beobachtung nach Krakau. Dort schrieb ich Grodek. Und dort starb ich – in der Nacht auf den 3. November 1914 - an einer Überdosis Kokain. Ich war 27 Jahre alt. Man schrieb: \"Leutnant Trakl konnte trotz aller möglichen ärztlichen Hilfe nicht mehr gerettet werden.\" <span class=\"chat-source-ref\" title=\"Brief Oberstabsarzt Thoman, Krakau, 15. November 1914\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Brief Oberstabsarzt Thoman, Krakau, 15. November 1914\">Q</span>"},{"type":"barometer","statement":"Trakls Gedichte, die manifeste Dunkelheit der Worte, wirken auch heute noch.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"context","content":"Georg Trakl starb am 3. November 1914 in Krakau an einer Überdosis Kokain; vermutlich aus der Feldapotheke, in der er als Militärapotheker tätig war. Er wurde 27 Jahre alt. Sein letztes Gedicht Grodek entstand kurz vor seinem Tod und gilt heute als eines der bedeutendsten Antikriegsgedichte der deutschen Literatur. Einsamkeit, Verlust, Zerfall sind keine historischen Raritäten. Trakls Gedichte lassen sich bis heute mit der menschlichen Lebenswirklichkeit füllen und das macht sie zeitlos."},{"type":"quiz-single","question":"In welchem Alter starb Georg Trakl?","options":[{"text":"34","correct":false,"feedback":"Trakl starb deutlich früher. Sein kurzes Leben ist Teil seines Mythos."},{"text":"19","correct":false,"feedback":"So früh starb er nicht; er veröffentlichte noch mehrere Jahre Gedichte im Brenner."},{"text":"27","correct":true,"feedback":"Richtig! Trakl starb mit 27 Jahren. Er gehört damit zum sogenannten \"Club 27\", einer Reihe von Künstlerinnen und Künstlern, die in diesem Alter starben."},{"text":"42","correct":false,"feedback":null}]},{"type":"checkpoint","question":"Erkläre in zwei bis drei Sätzen, warum Trakls Erlebnis in Grodek als Wendepunkt gilt. Erkläre, was seine Sichtweise dort von der Dunkelheit seiner früheren Gedichte unterscheidet."},{"type":"self-assessment","items":["Ich verstehe, wie Trakls Biografie sein Werk geprägt hat","Ich kann Trakls Farbsymbolik an einem Beispiel erklären","Ich kenne den Kontext des Gedichts Grodek","Ich kann Trakl begründet in die Epoche des Expressionismus einordnen"]},{"type":"persona","content":"Ich war ein großer, massiver Mensch mit einer sehr leisen Stimme. Ich konnte nicht Tram fahren und hatte Angst vor Fremden an der Apothekentheke. Ich war unfähig, im Alltag zu bestehen. Und doch schrieb ich Gedichte, die wie kleine Gebäude stehen, streng gebaut und voller Abgründe. Vielleicht ist mein Leben und Werk kein Widerspruch. Vielleicht braucht man gerade die Unfähigkeit, in der Welt zu wohnen, um beschreiben zu können, wie sie wirklich ist. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 03.02.2012\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 03.02.2012\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt von Trakls Leben oder Werk hat dich am meisten überrascht oder beeindruckt?"},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du im Internet.","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/mediathek/audio/zeitzeichen/audio-georg-trakl-oesterreichischer-dichter-geburtstag--100.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Georg_Trakl"}],"literature":["Hans Szklenar / Walter Methlagl (Hrsg.): Georg Trakl – Dichtungen und Briefe. Otto Müller Verlag, Salzburg 1987.","Rüdiger Görner: Georg Trakl. Dichter im Jahrzehnt der Extreme. Zsolnay, Wien 2014."]}] }, 'epochenchat_goethe': { name: 'Goethe', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDxYSfKvGMDqe9RsT6fjRuAxkHp1pmKk0Q9mPTPP1pBg+5+tJjIx2FOCkcnnH60DuKPunAq5ZWX2nLNIEQc9Mk/hVEZ4x37V2OhWrC0RY9u5h37HPJoJbKNj4dlvJSLdJJWHouBn3Jq7deE7uAEOi5AySp/OvUNAsLWygWFI1GDztHeti4t027Qkfoc1hKq76HTGgmrtnz2dNMbupjIYcYbqMf5/Ws2QES4DdD616v4r0yBblJRGg3Ha2R1zXmV/CsUvGM57dK1hLmVzGpBwlYqHAHpULHNTkHYCc4PWoSOSMGqZKFyBjH5U1uuaPwNNLMR/SgYpJ2Y60UZGDkUUCZJk7R2FB+77Ck54I/Cg8L1FIYobp3NPBHOT+FRA8Zp2M onen."},{"name":"Weimarer Klassik","start":1786,"end":1832,"active":false,"info":"Humanitätsideal, Maß und Harmonie, Orientierung an der Antike."},{"name":"Italienische Reise","start":1786,"end":1788,"active":false,"info":"Flucht aus Weimar. Wiedergeburt als Künstler. Wendepunkt im Schaffen."}]},{"type":"persona","content":"Guten Tag. Ich bin Johann Wolfgang von Goethe, geboren am 28. August 1749 in Frankfurt am Main, gestorben am 22. März 1832 in Weimar. Du lernst mich in der Schule kennen? Das mag ich mir gut vorstellen. Meine Freunde prophezeiten mir schon zu Lebzeiten, was Professoren mit meinen Texten anstellen würden: \"Zergliedern, auslegen und der Jugend einpfläuen.\" Ich hoffe, es geschieht mit einigem Vergnügen. <span class=\"chat-source-ref\" title=\"Weihnachtsbrief von Goethes Mutter an Goethe, zit. nach Goethezeitportal.de\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Weihnachtsbrief von Goethes Mutter an Goethe, zit. nach Goethezeitportal.de\">Q</span>"},{"type":"learner","content":"Du warst ja fast zwei Jahre in Italien. Warum bist du überhaupt einfach so weggelaufen?"},{"type":"context","content":"Am 3. September 1786 brach Goethe heimlich aus Karlsbad auf – inkognito, mit einem Mantelsack und einem Dachsranzen als einzigem Gepäck. Weder seinen Freunden noch vollständig dem Herzog Karl August hatte er seinen Plan offenbart. Goethe war seit 1775 am Weimarer Hof tätig und mit Ämtern überhäuft worden. Er fühlte sich als Dichter, hatte kaum noch Zeit für sein künstlerisches Schaffen, und litt unter einer tiefen inneren Krise. Auch die Beziehung zu Charlotte von Stein, die ihm Mäßigung verordnet hatte, empfand er zunehmend als Umklammerung."},{"type":"persona","content":"Das Ziel meiner innigsten Sehnsucht, deren Qualen mein ganzes Inneres erfüllte, war Italien. Ich kämpfte mit Tod und Leben und keine Zunge spricht aus, was in mir vorging. Man hätte mich sonst nicht fortgelassen. Also schrieb ich meinen Freunden Herder ein kurzes Briefchen und überließ mich dem Strom der Ereignisse. <span class=\"chat-source-ref\" title=\"Goethes Reisetagebuch / Briefe, nach WDR Zeitzeichen, 18.06.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Goethes Reisetagebuch / Briefe, nach WDR Zeitzeichen, 18.06.2023\">Q</span>"},{"type":"quote","text":"Ich warf mich ganz allein, nur einen Mantelsack und Dachsranzen aufpackend, in eine Postchäse.","source":"Goethe über seinen Aufbruch am 3. September 1786"},{"type":"learner","content":"Und wie war Italien für dich?"},{"type":"persona","content":"Eine Wiedergeburt. Ich setzte den Fuß auf römischen Boden und konnte nur sagen: Ich bin hier. Die griechische Antike hatte ich gesucht – und sie in Italien gefunden. Die Antike war mein Leitstern: das Maß, die Klarheit, die Harmonie. Ich zeichnete, aquarellierte, überarbeitete meine Manuskripte. Die Theaterstücke Faust, Egmont, vor allem Iphigenie auf Tauris. Und ich überließ mich auch den Wonnen des Lebens: In Rom fanden sich Frauen, die gewährten, was Frau von Stein nie zugelassen hatte. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 18.06.2023; vgl. Goethe: Italienische Reise, 1816/17\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 18.06.2023; vgl. Goethe: Italienische Reise, 1816/17\">Q</span>"},{"type":"annotation","text":"Das Land der Griechen mit der Seele suchend.","prompt":"Markiere Hinweise auf Goethes ästhetisches Reise-Programm.","targets":[{"word":"Griechen","feedback":"Die Antike dient Goethe als ästhetisches Ideal: Harmonie, Maß, Schönheit."},{"word":"suchend","feedback":"Goethe findet in Italien nicht nur Kunst, sondern sucht aktiv eine neue künstlerische Identität."}]},{"type":"context","content":"Fast zwei Jahre blieb Goethe. Herzog Karl August, sein großzügiger Arbeitgeber, finanzierte die Reise und ließ ihn gewähren. Während in Weimar alle warteten, entwickelte Goethe in Italien die ästhetischen Prinzipien, die später die Weimarer Klassik prägen sollten: Klarheit, Humanitätsideal, Orientierung an der Antike. Werke wie Iphigenie auf Tauris und Torquato Tasso entstammen diesem Geist."},{"type":"quiz-single","question":"Welche Aussage beschreibt das zentrale ästhetische Ideal, das Goethe in Italien entwickelte?","options":[{"text":"Gefühl und Leidenschaft gegen Vernunft und Ordnung","correct":false,"feedback":"Das ist eher das Programm des Sturm und Drang; Goethes frühere Phase."},{"text":"Harmonie, Maß und Orientierung an der Antike","correct":true,"feedback":"Richtig! In Italien formte Goethe sein klassisches Ideal: Schönheit durch Ordnung, Klarheit und Humanität."},{"text":"Politischer Protest gegen die deutschen Fürsten","correct":false,"feedback":"Das ist eher Heines Programm. Goethe stand dem Politischen auch aus beruflichen Gründen wesentlich distanzierter gegenüber."},{"text":"Volksnahe Schlichtheit und romantische Natursehnsucht","correct":false,"feedback":null}]},{"type":"learner","content":"Wie haben deine Freunde in Weimar auf deine Rückkehr reagiert?"},{"type":"persona","content":"Aus Italien, dem Formenreichen, bin ich in das gestaltlose Deutschland zurückgekehrt, heiteren Himmel mit einem düsteren zu vertauschen. Die Freunde, statt mich zu trösten und wieder an sich zu ziehen, brachten mich zur Verzweiflung. Mein Entzücken über entfernteste Gegenstände, mein Leiden über das Verlorene, das schien sie zu beleidigen. Ich vermisste jede Teilnahme. Keiner verstand meine Sprache. <span class=\"chat-source-ref\" title=\"Goethe, Brief nach der Rückkehr, nach WDR Zeitzeichen, 18.06.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Goethe, Brief nach der Rückkehr, nach WDR Zeitzeichen, 18.06.2023\">Q</span>"},{"type":"context","content":"Am 18. Juni 1788 kehrte Goethe abends um 10 Uhr mit dem Vollmond nach Weimar zurück. Charlotte von Stein, die sich jahrelang in Sehnsucht verzehrt hatte, war tief gekränkt: Der Seelenfreund so vieler Jahre war zurück; aber verändert, verschlossen, distanziert. Sie fand fortan nur noch verächtliche Worte für ihn. Auch Friedrich Schiller, der 1787 eigens nach Weimar gezogen war, um dem hochgelobten nahe zu sein, musste enttäuscht feststellen: Goethe war noch in Italien."},{"type":"quote","text":"Goethe ist recht brav und gut. Es ist nur schlimm, dass er immer seinen Panzer anhat.","source":"Karoline Herder über Goethe nach seiner Rückkehr, 1788"},{"type":"learner","content":"Charlotte von Stein und du – war das mehr als eine Freundschaft?"},{"type":"persona","content":"Hatte ich ihr nicht in jenem wunderbaren Gedicht von gewissen Blicken gesprochen, als ich 1775 nach Weimar kam? Warum gabst du uns die tiefen Blicke, unsere Zukunft ahnungsvoll zu schauen? Wir waren uns aufs innigste nahe, soweit eine verheiratete Frau die Nähe eines Stürmers und Drängers dulden kann. Sie formte mich, mäßigte mich. In Italien aber löste ich mich von dieser Umklammerung. Und kaum einen Monat nach meiner Rückkehr traf ich im Park eine junge Frau: Christiane Vulpius. Ihre Natürlichkeit entzückte mich, ihre Unbefangenheit. <span class=\"chat-source-ref\" title=\"Gedicht \"Warum gabst du uns die tiefen Blicke\", 1776; WDR Zeitzeichen, 18.06.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Gedicht \"Warum gabst du uns die tiefen Blicke\", 1776; WDR Zeitzeichen, 18.06.2023\">Q</span>"},{"type":"freetext","prompt":"Beschreibe, worin sich die Beziehungen zu Charlotte von Stein und Christiane Vulpius unterschieden."},{"type":"context","content":"Christiane Vulpius (1765–1816) wurde Goethes Lebensgefährtin. In Weimar rümpfte man die Nase über die bürgerliche Verbindung ohne Zeremonie. Goethe kommentierte trocken: \"Ich bin verheiratet, nur nicht mit Zeremonie.\" Die Begegnung mit Christiane inspirierte ihn zu einer neuen Gedichtsammlung: den Römischen Elegien (1788–1790), die sowohl die Erinnerung an Italien als auch die neue Liebe spiegeln. Erst 1806, nach 18 Jahren Zusammenleben, heiratete Goethe Christiane offiziell."},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Goethes Rückkehr aus Italien 1788 sind korrekt?","options":[{"text":"Goethe kehrte am 18. Juni 1788 nach fast zwei Jahren Abwesenheit nach Weimar zurück.","correct":true,"feedback":"Korrekt!"},{"text":"Charlotte von Stein freute sich uneingeschränkt über seine Rückkehr.","correct":false,"feedback":"Falsch. Sie war tief gekränkt und ließ kein gutes Haar an ihm."},{"text":"Friedrich Schiller war 1787 nach Weimar gezogen, um Goethe nahe zu sein.","correct":true,"feedback":"Korrekt! Die berühmte Freundschaft begann erst einige Jahre später; zunächst überwog Schillers Neid."},{"text":"Goethe begann kurz nach seiner Rückkehr eine Beziehung mit Christiane Vulpius.","correct":true,"feedback":"Korrekt! Sie begegneten sich im Weimarer Park und wurden noch im Sommer 1788 ein Paar."},{"text":"Goethe vollendete Faust direkt nach seiner Rückkehr.","correct":false,"feedback":null}]},{"type":"persona","content":"Ich hatte mich in dieser anderthalbjährigen Einsamkeit selbst wiedergefunden. Aber als was? Als Künstler. Freude und Hoffnung waren wieder ganz in mir lebendig geworden. Und so vollendete ich nach der Rückkehr Torquato Tasso, ein Stück über die Konflikte einer Künstlerexistenz. Eine Tragödie. Im richtigen Leben aber lachte mir das Glück. <span class=\"chat-source-ref\" title=\"Goethe, Brief nach der Rückkehr; WDR Zeitzeichen, 18.06.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Goethe, Brief nach der Rückkehr; WDR Zeitzeichen, 18.06.2023\">Q</span>"},{"type":"barometer","statement":"Goethes Italienreise war vor allem eine Flucht vor Verantwortung.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"persona","content":"Mein Tagebuch aus der Zeit im Süden wurde zur Grundlage eines der bekanntesten Reisewerke der deutschen Literatur. Zwischen 1813 und 1817 schrieb ich die Italienische Reise nieder. Sie endet mit einem Zitat des römischen Dichters Ovid, der aus Rom verbannt wurde – ihm fühlte ich mich nahe und teilte seinen Schmerz. <span class=\"chat-source-ref\" title=\"Goethe: Italienische Reise, veröff. 1816/17; WDR Zeitzeichen, 18.06.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Goethe: Italienische Reise, veröff. 1816/17; WDR Zeitzeichen, 18.06.2023\">Q</span>"},{"type":"quote","text":"Wandelt von jener Nacht mir das traurige Bild vor die Seele, welche die letzte für mich war in der römischen Stadt, wiederhole ich die Nacht, wo des teuren so viel mir zurückblieb, gleitet vom Auge mir noch jetzt eine Träne herab.","source":"Goethe, Schluss der Italienischen Reise, nach Ovid"},{"type":"checkpoint","question":"Erkläre, warum die Italienreise als Wendepunkt in Goethes Schaffen gilt."},{"type":"self-assessment","items":["Ich verstehe, was Goethe zur heimlichen Flucht nach Italien trieb","Ich kann die Bedeutung der Antike für Goethes klassisches Ideal erläutern","Ich kenne mindestens drei Werke, die mit der Italienreise zusammenhängen","Ich kann Goethes Entwicklung vom Sturm und Drang zur Klassik beschreiben"]},{"type":"persona","content":"Das Haus am Frauenplan in Weimar richtete ich mir wie ein privates Italien ein: mit Statuen, Stichen und Gemälden. Ich brauchte diese Erinnerung. Sie hielt mich aufrecht. Die Freundschaft mit Schiller, die sich erst ab 1794 wirklich entwickelte, und die Vollendung des Faust, das alles wäre ohne die Wiedergeburt in Italien undenkbar gewesen. Ich habe mich selbst als Künstler erst in der Fremde gefunden. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 18.06.2023; Goethe: Dichtung und Wahrheit\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 18.06.2023; Goethe: Dichtung und Wahrheit\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt von Goethes Reise-Biografie oder Werk hat dich am meisten überrascht oder beeindruckt?"},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich und meine <em>stürmerische</em>, <em>empfindsame</em> oder <em>klassische</em> Phase findest du im Internet.","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/mediathek/audio/zeitzeichen/audio-goethe-kehrt-von-seiner-italienischen-reise-nach-weimar-zurueck-100.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Johann_Wolfgang_von_Goethe"}],"literature":["Nicholas Boyle: Goethe. The Poet and the Age. 2 Bde. Oxford University Press, Oxford 1991/2000.","Karl Otto Conrady: Goethe. Leben und Werk. 2 Bde. Athenäum, Königstein 1982/1985."]}] }, 'epochenchat_heinrich_heine': { name: 'Heinrich Heine', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDyyxCsZHPCg4zjvVsueBgYHTmqFm2xxwWG7JGeKuyjkMTgEcAVhU+I0jsTW06ISWOfXAp7nzMFSB6d6zWYKQTwpPcZp6TYPykYY8//AFqzcOpXMWUUiQMGPv71owxGZS0jgKo6saqQR+awAxg9hV2CL7VfrZBT5fHmP6dOB9M1MnpcuEbsfutreJpPJlkAOC5BAP09aq22t6fcymIgxMTgFvWuy1L4eX1pabrS6zt6v5hDsvpjoK4y98FvHcBlmZG6nzBuJNRCcOrNnSdvdRrLAFQYJOe/oKeibOMZ9MDNQ+H7lby3khkObiA7XU/zrVdFBIAGMdz0odzGyRRmUBxjg9MAVTJKsR3+lXZFUZyQcVQuZkB5x9KSuD7jZIi/TbxxzxUMg2wsT+hqKS9iiYFiBn35qtLqaSKyJnB6mrUZNEuSInILg85z6UVEZFLKMA4orREblVG4IXJG7p60pf5MFiMe9In3FyOvXHWkOIzgqAR2PJrViRIpDRY49yTUWQr8uQfWklYZO0nA9eKrmbec8cdqSQ2zYtNSW0AV/mUdM84HtXS+C5Vu/F4WX5oMmRFx3AJz+lcEs4zyV+ldZ4AuoU8RpJJM cVw3i3WLK+XMSKJWUBwh+Vj2I/z61y8k7m3ChjhW9aruSetYUsMoyTbN6uJbi4pDMkUbzSdqAK7ThF3+tBbPShcBvmHFTeWjDIFICvUkLmOUMDj1oaPHQ5phGKLXBM3OGRDuyxxjFTxsVYDbjA5rFt7ggCNjx/CfStW2nDEYPI4Oa5ZwaN4yuJfqchzzk0U68IaLjjBH40VrRfumVT4iq5Lylj19qbLH5eD/AAtyCKV02NliP8aXerR4UZwPypS3NIlWYZCD3pqSbZmx3BX9KUk7lJORmoFPz596taoTepYK5Rhkcjj86gJ4NWF+bgdhVduMnGRSiOZFTyMIDnrTQMnA607ac7en1rUxG57YpQWU+ntQvJxkDPelI5OGz70AOLZ5FNHUg0g4oPWgQDitC1YsAwxwcGs/OavaWQbgocYI9aip8Ny4bl26GEyee2fWipLxFCKBgD65oqKPwjqblCQoQdufcmiFhtKZIz2HeiinJaDjuRTKI+BnvjNVgCBRRTjsEiz/AKuAD+JqhkUrEOeTRRSiXLYiT7wqaZQAPlGT6UUVqc73I8DbxR0oopgNpaKKAEIwcCrFkcTjjp2ooqJ/CVHc3ZolNoAQQ2R16UUUVz0W+U0qLU//2Q==', source: 'https://de.wikipedia.org/wiki/Heinrich_Heine#/media/Datei:Heinrich_Heine-Oppenheim.jpg', theme: 'sebastian-wolf', modules: [{"type":"framing","content":"Du triffst gleich auf Heinrich Heine – oder besser: auf eine<br>Konstruktion, die so spricht, wie er geschrieben hat. Heine selbst<br>ist 1856 in Paris gestorben. Was du hier liest, basiert auf seinen<br>Texten, Gedichten und Briefen, ist aber eine didaktische<br>Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Romantik","start":1795,"end":1835,"active":false,"info":"Volksliedton, Natursehnsucht, Gefühlstiefe."},{"name":"Heines Leben","start":1797,"end":1856,"active":true,"info":"Geboren als Harry Heine in Düsseldorf. Gestorben im Pariser Exil."},{"name":"Vormärz","start":1815,"end":1848,"active":false,"info":"Politisch aufgeladene Epoche vor der Revolution."},{"name":"Exil","start":1831,"end":1856,"active":false,"info":"Ab 1831 in Paris. Publikationsverbote."}]},{"type":"persona","content":"Bonjour – oder, wenn Dir das lieber ist: Guten Tag! Ich bin Harry Heine aus Düsseldorf. Harry war mein Geburtsname, wobei ich mich selbst gern als „ersten Mann des Jahrhunderts\" bezeichnet habe – denn ich behauptete scherzhaft, in der Neujahrsnacht 1800 geboren worden zu sein. Du liest meine Texte in der Schule? Das amüsiert mich. Man hat mich zu Lebzeiten verboten, verfolgt und verspottet. Und jetzt sitze ich im Lehrplan.<br><span class=\"chat-source-ref\" title=\"vgl. Frankfurter Bundestagsbeschluss 1835\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. Frankfurter Bundestagsbeschluss 1835\">Q</span>"},{"type":"learner","content":"Heine wurde also verboten? Was hatte er denn so Schlimmes geschrieben?"},{"type":"context","content":"Bereits 1833 wurden Heines Werke in Preußen verboten. 1835 beschloss der Frankfurter Bundestag, die Werke der Schriftstellergruppe „Das Junge Deutschland\" in allen Mitgliedsstaaten des Deutschen Bundes zu verbieten – darunter auch alle zukünftigen Schriften Heines. Der Vorwurf: Angriff auf die christliche Religion, Herabwürdigung der sozialen Verhältnisse und Zerstörung von Zucht und Sittlichkeit. Heine lebte zu diesem Zeitpunkt bereits im Pariser Exil."},{"type":"persona","content":"Ich habe die Wahrheit geschrieben – das ist das Schlimmste, was man einem Mächtigen antun kann. 1843 durfte ich mein Exil noch einmal verlassen, um meine Mutter zu besuchen. In meinem „Deutschland. Ein Wintermärchen\" (1844) reiste ich dann literarisch durch ein Deutschland, dessen Zustand mich aufgewühlt hatte. Ich beschrieb es, wie es war: gespalten, rückständig, von Fürsten regiert, die das Volk schlafend halten wollten. <span class=\"chat-source-ref\" title=\"Deutschland. Ein Wintermärchen, Caput I, 1844\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Deutschland. Ein Wintermärchen, Caput I, 1844\">Q</span>"},{"type":"quote","text":"Ein neues Lied, ein besseres Lied, <br>O Freunde, will ich euch dichten! <br>Wir wollen hier auf Erden schon <br>Das Himmelreich errichten.","source":"Heinrich Heine, Deutschland. Ein Wintermärchen, Caput I (1844)"},{"type":"learner","content":"Aber du hast doch auch romantische Gedichte geschrieben?<br>Die Loreley zum Beispiel?"},{"type":"persona","content":"Ah, die Loreley! Ich veröffentlichte sie zuerst 1824 in einer Zeitschrift, bevor sie 1827 ins „Buch der Lieder\" aufgenommen wurde. Aber merkst Du, was ich in meinen Gedichten mache? Ich spiele mit der Romantik. Ich benutze ihren Ton, ihre Bilder, ihren Schauder – und dann breche ich sie ironisch auf. Ich habe mich selbst einmal den „entlaufenen Romantiker\" genannt. An meinen Freund Varnhagen schrieb ich aus Paris: „Das tausendjährige Reich der Romantik hat ein Ende, und ich selbst war sein letzter und abgedankter Fabelkönig.\" <span class=\"chat-source-ref\" title=\"Brief an Karl August Varnhagen von Ense, Paris\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Brief an Karl August Varnhagen von Ense, Paris\">Q</span>"},{"type":"annotation","text":"Ich weiß nicht, was soll es bedeuten, / \ndass ich so traurig bin; / \nein Märchen aus alten Zeiten, /  \ndas kommt mir nicht aus dem Sinn.","prompt":"Welche typisch romantischen Elemente erkennst du in diesen vier Versen?","targets":[{"word":"Märchen","feedback":"„Märchen\" und „alte Zeiten\" verweisen auf die romantische Hinwendung zur Vergangenheit und Volkskultur."},{"word":"traurig","feedback":"Die unerklärliche, diffuse Melancholie ist ein Kernmotiv der Romantik – das lyrische Ich weiß selbst nicht, warum es leidet."}]},{"type":"quiz-single","question":"Welche literarische Technik ist typisch für Heines Lyrik?","options":[{"text":"Er übernimmt romantische Motive und verstärkt sie noch.","correct":false,"feedback":null},{"text":"Er benutzt romantische Formen und bricht sie durch Ironie.","correct":true,"feedback":"Genau! Heine baut romantische Erwartungen auf und zerstört sie mit einer ironischen Pointe – das nennt man „Stimmungsbrechung\"."},{"text":"Er lehnt alle romantischen Themen vollständig ab.","correct":false,"feedback":"Nicht ganz – Heine nutzt romantische Themen sehr bewusst als Ausgangsmaterial."},{"text":"Er schreibt ausschließlich politische Pamphlete.","correct":false,"feedback":null}]},{"type":"context","content":"Heinrich Heine wurde wahrscheinlich am 13. Dezember 1797 in Düsseldorf als Harry Heine in eine jüdische Kaufmannsfamilie geboren; das genaue Datum ist bis heute nicht zweifelsfrei belegt. Er studierte Jura in Bonn, Göttingen und Berlin, hörte u. a. Vorlesungen bei Hegel, und wurde im Juli 1825 in Göttingen zum Doktor der Rechte promoviert. Noch im selben Monat ließ er sich in Heiligenstadt evangelisch-lutherisch taufen. Ab 1831 lebte er dauerhaft im Pariser Exil und starb dort am 17. Februar 1856."},{"type":"learner","content":"Du hast dich später taufen lassen. Hast du das bereut?"},{"type":"persona","content":"Mein Leben war alles andere als einfach. Ich bin als Jude in einer christlichen Gesellschaft aufgewachsen, die mir trotz Napoleons Emanzipationsgesetzen immer wieder die Türen vor der Nase zumachte.<br>Ich ließ mich taufen, um mir eine Karriere als Jurist zu ermöglichen. Religiös völlig gleichgültig sah ich in der Taufe „nichts als eine bloße Nützlichkeitstatsache\" und im Taufschein nur das „Entre Billet zur Europäischen Kultur\". Aber schon im Januar 1826 schrieb ich meinem Freund Moses Moser: „Ich bereue sehr daß ich mich getauft hab; ich seh noch gar nicht ein, daß es mir seitdem besser gegangen sey.\" <span class=\"chat-source-ref\" title=\"Brief an Moses Moser, 9. Januar 1826\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Brief an Moses Moser, 9. Januar 1826\">Q</span>"},{"type":"freetext","prompt":"Heine nennt die Taufe ein „Entre Billet zur Europäischen Kultur\" – also eine Eintrittskarte. Wenig später bereut er sie. Was sagt dieser Widerspruch über seine Lage als Jude im frühen 19. Jahrhundert aus?"},{"type":"context","content":"Das Buch der Lieder (1827) ist Heines bekannteste Gedichtsammlung; darin kehrt das Grundmotiv der unglücklichen, unerfüllten Liebe nach Heines eigenem Eingeständnis „auf geradezu monotone Weise\" wieder. Einzelne Gedichte wie die Loreley waren zuvor bereits in Zeitschriften erschienen. Die Reisebilder (1826–1831, 4 Bände) verbinden Reisebericht, Gesellschaftskritik und literarische Reflexion und begründeten den modernen politischen Journalismus in Deutschland. Deutschland. Ein Wintermärchen (1844) ist ein politisches Versepos. Der Romanzero (1851) versammelt späte Gedichte aus der „Matratzengruft\"."},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Heine sind korrekt?","options":[{"text":"Heine emigrierte 1831 nach Paris; Publikationsverbote 1833/1835 machten es zum echten Exil.","correct":true,"feedback":"Korrekt! Die Verbote ließen ihm keine Rückkehroption mehr."},{"text":"Heine war ein überzeugter Nationalist und unterstützte die deutschen Fürsten.","correct":false,"feedback":"Das stimmt nicht – Heine erkannte früh den zerstörerischen Zug im deutschen Nationalismus und kritisierte ihn scharf."},{"text":"Das Buch der Lieder erschien 1827 und wurde zu Heines bekanntestem Werk.","correct":true,"feedback":"Korrekt! Es wurde noch zu Heines Lebzeiten zum Bestseller und vielfach vertont."},{"text":"Heines Werke wurden 1835 im gesamten Deutschen Bund verboten.","correct":true,"feedback":"Korrekt! Der Frankfurter Bundestagsbeschluss traf ihn und das „Junge Deutschland\"."},{"text":"Heine schrieb ausschließlich Lyrik und keine Prosa.","correct":false,"feedback":null}]},{"type":"persona","content":"Du fragst dich vielleicht, warum ich nie nach Deutschland zurückgekehrt bin. Nun, ich wollte zurück. Aber 1844 erließ Preußen einen Grenzhaftbefehl gegen mich. Und dann wurde ich krank. Seit 1848 lag ich in meiner Pariser Wohnung, die ich selbst meine „Matratzengruft\" nannte. Acht Jahre lang. Und schrieb weiter. Weil Schreiben das Einzige war, was ich noch konnte. <span class=\"chat-source-ref\" title=\"vgl. Jan-Christoph Hauschild / Michael Werner, Heine-Biographie\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. Jan-Christoph Hauschild / Michael Werner, Heine-Biographie\">Q</span>"},{"type":"quote","text":"Ich habe die größten Schmerzen ausgestanden, aber noch größere Freuden genossen, und mein Dank dafür ist, dass ich die Götter lobe und preise, die mir ein so reiches Leben gegeben.","source":"Heinrich Heine, Geständnisse (1854)"},{"type":"barometer","statement":"Heine zeigt trotz Krankheit und Exil eine lebensbejahende Haltung.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"persona","content":"Man wirft mir manchmal vor, ich sei zu bissig, zu sarkastisch, zu politisch. Aber was ist Literatur, die nicht brennt? Im „Almansor\" von 1820 schrieb ich: „Das war ein Vorspiel nur, dort wo man Bücher verbrennt, verbrennt man auch am Ende Menschen.\" Ich meinte damals die Verbrennung des Korans im Spanien der frühen Neuzeit... und vielleicht auch die Bücherverbrennungen der Burschenschaft beim Wartburgfest 1817, die ich entschieden ablehnte.<span class=\"chat-source-ref\" title=\"Almansor, Tragödie, 1820/1823\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Almansor, Tragödie, 1820/1823\">Q</span>"},{"type":"learner","content":"Dieser Satz ist erschreckend prophetisch. Die Nazis haben 1933 Heines Bücher verbrannt – und dann auch Menschen."},{"type":"context","content":"Am 10. Mai 1933 verbrannten die Nationalsozialisten auf Berliner Plätzen u. a. Heines Bücher. Auf dem Bebelplatz in Berlin erinnert heute ein Denkmal daran: eine leere Bibliothek unter Glas. Heines vollständiges Zitat aus „Almansor\". „Das war ein Vorspiel nur, dort wo man Bücher verbrennt, verbrennt man auch am Ende Menschen\" ist dort in den Boden eingraviert. Die prophetische Kraft dieser Zeile macht sie zu einem der meistzitierten Sätze der deutschen Literaturgeschichte."},{"type":"annotation","text":"Das war ein Vorspiel nur, dort wo man Bücher verbrennt, verbrennt man auch am Ende Menschen.","prompt":"Worin liegt die Stärke des Bildes?","targets":[{"word":"Vorspiel","feedback":"Kein Ende, sondern Auftakt zu etwas Schlimmerem."},{"word":"Bücher","feedback":"Bücher stehen für Gedanken und Geistesfreiheit. Mit ihnen zerstört man auch ihre Träger."}]},{"type":"quiz-single","question":"Aus welchem Werk stammt Heines Satz über das Bücherverbrennen?","options":[{"text":"Deutschland. Ein Wintermärchen","correct":false,"feedback":"Das Wintermärchen entstand erst 1844 – der Satz wurde bereits 1820 geschrieben."},{"text":"Buch der Lieder","correct":false,"feedback":null},{"text":"Almansor (Tragödie, 1820)","correct":true,"feedback":"Richtig! Der Satz stammt aus Heines früher Tragödie über das maurische Spanien. Im Stück bezieht er sich auf die Vernichtung des Korans."},{"text":"Die Harzreise","correct":false,"feedback":null}]},{"type":"checkpoint","question":"Erkläre in zwei bis drei Sätzen, warum Heine als „entlaufener Romantiker\" gilt. Welche zwei Seiten stehen in seinen Texten in Spannung?"},{"type":"self-assessment","items":["Ich verstehe Heines Doppelrolle als Romantiker und Kritiker der Romantik","Ich kann Heines politische Haltung im historischen Kontext einordnen","Ich kenne mindestens drei wichtige Werke Heines","Ich verstehe, was mit „Stimmungsbrechung\" gemeint ist"]},{"type":"persona","content":"Ich war ein Mensch. Ich war widersprüchlich, verletzt, verletzlich, verletztend, manchmal ungerecht, manchmal brillant. Ich schrieb moralisch und ich schrieb kommerziell. Gerade darin, in dieser Widersprüchlichkeit meines Menschseins, liegt vielleicht das Menschliche meiner Literatur. Ein Dichter, der sich selbst zu ernst nimmt, taugt nichts. <span class=\"chat-source-ref\" title=\"vgl. Heines Selbstironie in den Geständnissen, 1854\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. Heines Selbstironie in den Geständnissen, 1854\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt von Heines Leben oder Werk hat dich am meisten überrascht oder beeindruckt?"},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du im Internet.","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/mediathek/audio/zeitzeichen/audio-heinrich-heine-warum-ein-dichter-fuer-seine-worte-fliehen-musste-100.html"},{"label":"BR2 RadioWissen","url":"https:
