eJIUEt5b2sianet5EW/JWFf7x6/MQRx2GPevJdfvJrjUjHKzHyQEAb2rmpp1JW6HVUgqS53uZzRy5y4bJGQSetJtcfxEGjnZnnin7gEGc5ruOEjwSeSSaKfuUkfKaKANBT3q8L+eBBHLGGBHDKcfpRRVU21ewTSYscjtbIFiPynhicdacd0UPmzyhI8nai/eJ9qKK26XMSpCpnJIXamfuj+vrV23SAKRjLZ+9RRUwepUti2jxgbgMjOTmvY/hhb2tj4Ra+cJ513MzZI7L8oH5gn8aKK2qN8pkkT2XjHT7fS4jc3caOEzJyPvHk/qa4rxP8QtGuQ4t086fBAkjTJA+poorxoQVR+8ezNKj70FqcNceI2ugscMEkMccJRCWDHcepJ9znJ965WaJ45CX5z39aKK7I0ow2OGdedT4hF6GnSL8qfSiimyegzdk/1ooooA/9k=', source: 'https://de.wikipedia.org/wiki/Annette_von_Droste-H%C3%BClshoff#/media/Datei:Droste-H%C3%BClshoff_2.jpg', theme: 'sebastian-wolf', modules: [{ "type": "framing", "content": "Du triffst gleich auf Annette von Droste-Hülshoff – oder besser: auf eine Konstruktion, die so spricht, wie sie geschrieben hat. Droste selbst ist am 24. Mai 1848 auf der Meersburg am Bodensee gestorben. Was du hier liest, basiert auf ihren Gedichten, Briefen und biografischen Zeugnissen, ist aber eine didaktische Interpretation. Lies kritisch!" }, { "type": "timeline", "epochs": [{ "name": "Drostes Leben", "start": 1797, "end": 1848, "active": true, "info": "Geboren auf Burg Hülshoff im Münsterland. Gestorben auf der Meersburg am Bodensee. Sie wurde nur 51 Jahre alt." }, { "name": "Romantik", "start": 1795, "end": 1835, "active": false, "info": "Prägende Epoche mit Volkslieddichtung und Natursehnsucht; \"Die Droste\" geht indes weit darüber hinaus." }, { "name": "Biedermeier", "start": 1815, "end": 1848, "active": false, "info": "Rückzug ins Private, Naturliebe, religiöse Tiefe, aber auch latente Unzufriedenheit mit den Verhältnissen." }, { "name": "Vormärz", "start": 1835, "end": 1848, "active": false, "info": "Politisch aufgeladene Zeit; Droste thematisiert soziale Ungerechtigkeit, Antisemitismus und Umweltzerstörung." }] }, { "type": "persona", "content": "Ich bin Annette von Droste-Hülshoff, geboren am 10. Januar 1797 auf Burg Hülshoff im Münsterland. Alle nannten mich Nette. Ich bin mit sieben Monaten auf die Welt gekommen, zu früh, wie man immer wieder betonte, und das hat mich mein ganzes Leben begleitet. Ich habe seit meinem siebten Lebensjahr Gedichte geschrieben. Ich habe Cicero im Original gelesen, Bibliotheken verschlungen und ein Trauerspiel verfasst, bevor ich erwachsen war. Das hat manchen Männern große Angst gemacht. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 10.01.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 10.01.2022\">Q</span>" }, { "type": "learner", "content": "Angst? Warum sollte ein junges Mädchen aus adliger Familie den Männern Angst machen?" }, { "type": "context", "content": "Als Annette von Droste-Hülshoff 1813 auf dem Bökerhof, dem Gut ihrer Großeltern, auf Wilhelm Grimm traf, bescherte ihr die Begegnung einen unrühmlichen Ruf: \"Es ist schade, dass sie etwas Vordringliches und Unangenehmes in ihrem Wesen hat\", notierte der Märchensammler. Nachts träumte er von ihr als furchteinflößender Gestalt in Purpurflammen. Droste war hellblond, blauäugig, ganz klein und wenn eine junge Frau dieser Art einen Mann an die Wand argumentiert, mit Wissen, Witz und Eloquenz, dann macht das Angst. Wilhelm Grimm war damit nicht der Einzige." }, { "type": "persona", "content": "Ich habe mich nie damit abgefunden, dass ich nicht sein darf, was ich bin. Als ich mit 45 Jahren das Gedicht Am Turme schrieb, waren meine Träume noch genauso ungestüm wie in der Jugend. Im Korallenwald ein Walross jagen wollte ich, das Steuerruder im Sturm halten, wie eine Möwe über das Riff segeln. Und dann musste ich weiterschreiben: Wär ich ein Mann doch mindestens nur, so würde der Himmel mir raten. Nun muss ich sitzen so fein und klar, gleich einem artigen Kinde. <span class=\"chat-source-ref\" title=\"Annette von Droste-Hülshoff, Am Turme, 1841/42\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Annette von Droste-Hülshoff, Am Turme, 1841/42\">Q</span>" }, { "type": "annotation", "text": "Wär ich ein Jäger auf freier Flur, / ein Stück nur von einem Soldaten. / Wär ich ein Mann doch mindestens nur, / so würde der Himmel mir raten.", "prompt": "Markiere Aspekte, die auf die gesellschaftliche Realität zur Zeit Drostes verweisen.", "targets": [{ "word": "Jäger, Soldat", "feedback": "Beide Rollen stehen für Bewegungsfreiheit und Handlungsmacht; Domänen der Männer. Droste benennt genau das, was ihr strukturell verwehrt ist." }, { "word": "mindestens nur", "feedback": "Das \"mindestens\" ist ein bitteres Understatement, denn nicht Gleichheit, nur das Minimum würde schon reichen." }] }, { "type": "quiz-single", "question": "Was lässt sich als Kern von Drostes \"frühem Feminismus\" beschreiben?", "options": [{ "text": "Sie forderte offen das Frauenwahlrecht in politischen Pamphleten.", "correct": false, "feedback": "Das tat sie nicht. Drostes Kritik ist literarisch und indirekt, aber daher nicht weniger grundsätzlich." }, { "text": "Sie wies immer wieder auf die strukturelle Benachteiligung von Mädchen und Frauen hin.", "correct": true, "feedback": "Genau! Den Begriff Feminismus gab es noch nicht, aber das Muster weist Parallelen auf: Droste macht sichtbar, was Frauen durch Gesellschaft und Familie auferlegt wurde." }, { "text": "Sie lebte als freie Schriftstellerin ohne familiäre Verpflichtungen.", "correct": false, "feedback": "Im Gegenteil: als unverheiratete Tochter war sie der Mutter gegenüber in vielfältige Pflegepflichten eingebunden, die sie jahrelang vom Schreiben abhielten." }, { "text": "Sie unterstützte die Revolution von 1848 aktiv.", "correct": false, "feedback": null }] }, { "type": "context", "content": "Droste wuchs auf Burg Hülshoff in einer wohlhabenden westfälischen Adelsfamilie auf. Ihr sanfter Vater führte sie in Botanik, Ornithologie und Naturwissenschaften ein und besaß sogar ein Mikroskop; eine für die Zeit ungewöhnlich hohe Bildung. Die dominante Mutter dagegen lehnte jede Veröffentlichung der frühen Gedichte ihrer Tochter ab. Nach dem Tod des Vaters bewohnte Droste eine kleine Wohnung im Rüschhaus, dem Witwensitz der Mutter, kontrolliert und eingebunden in Pflege und Haushaltspflichten, die sie jahrelang vom kontinuierlichen Schreiben abhielten." }, { "type": "persona", "content": "Ich hatte Pläne, Träume, Sehnsüchte. Mein Plage-Dämon heißt Sehnsucht in die Ferne, schrieb ich als Dreiundzwanzigjährige. Entfernte Länder, große interessante Menschen, entfernte Kunstwerke – all das hatte eine traurige Gewalt über mich. Nach Afrika oder Amerika wollte ich reisen. Geblieben bin ich fast immer in Westfalen oder am Bodensee. Und doch – oder vielleicht gerade deswegen – sind meine Gedichte so weit gelangt, wie ich es nie durfte. <span class=\"chat-source-ref\" title=\"Droste-Hülshoff, Briefe\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Droste-Hülshoff, Briefe\">Q</span>" }, { "type": "learner", "content": "Was hat Droste dann überhaupt veröffentlicht? War sie zu Lebzeiten erfolgreich?" }, { "type": "context", "content": "Droste war 41, als 1838 ihr erster Gedichtband erschien. Die Resonanz war mäßig. Größere Aufmerksamkeit erlangte jedoch kurz darauf ihre Kriminalnovelle <em>Die Judenbuche</em> (1842): eine raffinierte psychologisch-soziologische Studie über Schuld, soziale Ungerechtigkeit und Antisemitismus im westfälischen Landleben, die mehr Fragen aufwirft als beantwortet und ihrer Zeit weit voraus ist. Den eigentlichen Durchbruch als Lyrikerin brachte der zweite Gedichtband (1844), entstanden in ihrer glücklichsten Phase am Bodensee. Diese Gedichte begründeten ihren Ruhm als Lyrikerin. Die ästhetisch bedeutende Gestaltung der Heide zeigt eine Bewegung zwischen den Polen detaillierter Wahrnehmung einzelner Gegenstände und phantasievoller Überformung der Landschaft durch eine bewegliche Einbildungs- und Reflexionskraft. Droste zeigt mitunter auch ein geradezu modern anmutendes Umweltbewusstsein." }, { "type": "quote", "text": "Oh schaurig ist's übers Moor zu gehen, wenn es wimmelt vom Heiderauche, sich wie Phantome die Dünste drehen und die Ranke hägelt am Strauche. Unter jedem Tritte ein Quellchen springt, wenn aus der Spalte es zischt und singt, oh schaurig ist's übers Moor zu gehen, wenn das Röhricht knistert im Hauche.", "source": "Annette von Droste-Hülshoff, Der Knabe im Moor (1844)" }, { "type": "annotation", "text": "Tief ab im Tobel liegt ein Haus, / zerfallen nach des Försters Tode. / Dort ruhe ich manche Stunde aus, / vergraben unter Rank und Lode.", "prompt": "Zeige in den Versen aus <em>Das öde Haus</em> durch Markieren, in welcher Eigenschaft sich Haus und lyrisches Ich begegnen.", "targets": [{ "word": "zerfallen", "feedback": "Verfall und Vergänglichkeit sind keine romantischen Kulissen. Bei Droste werden sie mit mikroskopischer Genauigkeit beschrieben, fast naturwissenschaftlich." }, { "word": "vergraben", "feedback": "Das lyrische Ich sucht keinen Ausblick, sondern Versenkung; eine antiromantische Haltung: keine Sehnsucht nach dem Fernen, sondern Aufmerksamkeit für das Nahe und Verfallende." }] }, { "type": "freetext", "prompt": "Droste schreibt: \"Ich mag und will jetzt nicht berühmt werden, aber nach 100 Jahren möchte ich gelesen werden.\" Erkläre, was dieser Satz über ihr Selbstbewusstsein als Schriftstellerin aussagt und über ihre Erwartungen an ihre eigene Zeit?" }, { "type": "quiz-multi", "question": "Welche der folgenden Aussagen über Droste-Hülshoff sind korrekt?", "options": [{ "text": "Droste veröffentlichte ihren ersten Gedichtband erst mit 41 Jahren.", "correct": true, "feedback": "Richtig! Familiäre Pflichten, der Widerstand der Mutter und gesellschaftliche Konventionen verzögerten ihre Publikationskarriere erheblich." }, { "text": "Die Judenbuche erschien 1844 und war Drostes bekanntestes Gedicht.", "correct": false, "feedback": "Die Judenbuche ist eine Novelle, keine Lyrik, und erschien bereits 1842." }, { "text": "Die Judenbuche gilt als raffinierte psychologisch-soziologische Studie, die ihrer Zeit voraus war.", "correct": true, "feedback": "Richtig! Sie thematisiert Schuld, soziale Ungleichheit und Antisemitismus auf eine Weise, die auch heute noch als modern gilt." }, { "text": "Droste thematisiert in ihren Texten auch Umweltzerstörung und nimmt damit Debatten des Anthropozäns vorweg.", "correct": true, "feedback": "Richtig! Droste beschreibt die Grenzen zwischen Mensch, Tier und Pflanze als durchlässig." }, { "text": "Droste lebte die letzten Jahre als freie Schriftstellerin in Wien.", "correct": false, "feedback": null }] }, { "type": "persona", "content": "Als Levin Schücking den Bodensee verließ, um eine Stelle als Prinzenerzieher anzutreten – und dann heiratete –, brach ich endgültig mit ihm. Die glücklichste Zeit meines Lebens war vorbei. In den nächsten Jahren wurde ich immer mehr von Krankheiten gequält. Gestorben bin ich am 24. Mai 1848 auf der Meersburg, mit 51 Jahren. Was bleibt, sind die Gedichte. Ich wusste das. Meine Lieder werden leben, wenn ich längst entschwand. <span class=\"chat-source-ref\" title=\"Droste-Hülshoff, Gedichte\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Droste-Hülshoff, Gedichte\">Q</span>" }, { "type": "barometer", "statement": "Drostes Kritik an der gesellschafltichen Benachteiligung von Frauen ist auch heute noch relevant.", "min": "stimme nicht zu", "max": "stimme voll zu" }, { "type": "quiz-single", "question": "Welche Aussage beschreibt Drostes Stellung in der deutschen Literaturgeschichte am treffendsten?", "options": [{ "text": "Sie wurde schon zu Lebzeiten als größte Dichterin Deutschlands gefeiert.", "correct": false, "feedback": "Nicht ganz: der große Erfolg blieb zu Lebzeiten aus. Erst Ende des 19. Jahrhunderts wurde sie zur bedeutendsten Dichterin Deutschlands gekürt." }, { "text": "Sie wurde erst nach ihrem Tod als bedeutendste Dichterin Deutschlands anerkannt; genau wie sie es selbst vorhergesagt hatte.", "correct": true, "feedback": "Richtig! Ihr Satz \"nach 100 Jahren möchte ich gelesen werden\" ist ein besonderes Zeugnis literarischen Selbstbewusstseins." }, { "text": "Sie galt schon zu ihrer Zeit als Vorreiterin des Realismus und wurde entsprechend rezipiert.", "correct": false, "feedback": "Ihr Werk hat realistische Züge, aber die zeitgenössische Rezeption war verhalten. Die Einordnung in literarische Strömungen erfolgte erst posthum. Sie gilt als Vertreterin des Bidermeier." }, { "text": "Sie veröffentlichte ausschließlich Prosa und keine Lyrik.", "correct": false, "feedback": null }] }, { "type": "checkpoint", "question": "Erkläre in zwei bis drei Sätzen, warum Droste-Hülshoff trotz ihres adeligen, behüteten Umfelds als \"frühe Feministin\" bezeichnet werden kann. Gib ein konkretes Beispiel aus ihrem Werk oder Leben an." }, { "type": "self-assessment", "items": ["Ich verstehe, wie Drostes gesellschaftliche Einschränkungen ihr Schreiben geprägt haben", "Ich kann an einem Beispiel zeigen, wie Droste Natur mikroskopisch genau beobachtet", "Ich kenne wichtige Werke Drostes und ihre Entstehungskontexte"] }, { "type": "persona", "content": "Ich habe mein Leben lang mit \"deine gehorsame Tochter Nette\" unterschrieben. Und gleichzeitig habe ich meinen eigenen Weg gemacht, zeigte mich unerschütterlich. Ich war keine Revolutionärin. Ich habe nicht auf Barrikaden gestanden. Aber ich habe geschrieben, was ich schreiben wollte, schrieb streng, genau, ohne Pfauenfedern in meinem Krähenpelz. Das, finde ich, ist Würde. <span class=\"chat-source-ref\" title=\"Droste-Hülshoff, Briefe\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Droste-Hülshoff, Briefe\">Q</span>" }, { "type": "freetext", "prompt": "Welcher Aspekt von Drostes Leben oder Werk hat dich am meisten überrascht oder beeindruckt?" }, { "type": "finale", "text": "Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du im Internet.", "links": [{ "label": "WDR Zeitzeichen", "url": "https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/zeitzeichen-annette-von-droste-huelshoff-104.html" }, { "label": "Wikipedia", "url": "https://de.wikipedia.org/wiki/Annette_von_Droste-H%C3%BClshoff" }], "literature": ["Winfried Woesler (Hrsg.): Annette von Droste-Hülshoff. Historisch-kritische Ausgabe. Niemeyer, Tübingen 1978 ff.", "Anke Kramer / Günter Häntzschel: Annette von Droste-Hülshoff. Reclam, Stuttgart 2022."] }] }, 'epochenchat_celan': { name: 'Celan', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD3ygUUUAISAMmvm3x94pfxV4kYxODp9sTFbhc4K55f6tj8gPTJ9v8AH2of2b4G1afks8BhGDyC/wAmfw3Z/Cvnbw9YNqWsxwAEqx+bHp/n+dAHQ+FvBk2uEz3AaOAH5Vx96vXNG8FaZYICLdScdTyf89asaPaw2tvFDAoVVUACuhh+6KQEKaZaoMLCoH0qx5Ceg/KpccUYpgRGFT2FVLnToJgQ8aHPqK0O1MegDyPx74IhNtJe2UQWUcuijr71zvwp1t9G8W/2bO7C3vh5RUngSD7p/mv/AAKvZ9UjDw7TyD1FeEeKbaTw74njubUhCkizxegIORx7UID6PHIo59KzPD2sR67oNnqcS7VuI9xXOdrA4Ye+CCK0/rQAGilNFAC0UUUAeZ/GnVPsvh2zsEfD3NxvIxnKIOf1Za8z8AMF17cTztOPfiuz+OcEm/SLjrGVlT6HKn/P0rzDw/e/Y9YhlJ+XjNAH0Tp84ZAAOntXQQP3ri9HvEmRZFbAYc5/z9a6q3kBA/wpDNTdSbqiV1yPWnbh1NMRJmopHwP60rOFUkn9ay77XNLsiRc30EbAZ2l+fypAM1BvlHBPNeNfE/59Ug6fcI/z+X616idasNTtzLZ3KSqpxxxj8K8l+JDbriAjkDp/n/PWgD0z4RztL4HRCcrFcSImOw4b+ZNd6K8Z+Ct7epNe2T82km2RQ2dyvjkgdMYABPqU9a9m7/40ALRRRTAKKaDS9qAON+KGinWPBF15cZee0YXEYA5OOG/8dLflXzYgaO5TOQd3PtX1trsL3Hh/UYI875LWVVx1yVI4r5s16SS7s7Xz7RIbqy/ctIq481R0 t":1942,"end":1948,"active":false,"info":"Straßenbaukommando, Flucht, Odyssee durch Bukarest und Wien."},{"name":"Paris","start":1948,"end":1970,"active":false,"info":"Ankunft buchstäblich aus dem Nichts. Lyrikdozent, preisgekrönter Dichter, psychiatrische Krisen."}]},{"type":"persona","content":"Ich bin – oder war – Paul Celan. Aus Czernowitz, aus der Bukowina. \"Eine Gegend für Bücher und Menschen\", so habe ich das einmal genannt. Du lernst meine Gedichte in der Schule? Ich weiß nicht, ob mich das freut. Ich habe geschrieben, weil ich musste. Nicht für Lehrpläne. Nicht für Interpretationen. Sondern weil die Sprache das Einzige war, was mir geblieben ist. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"learner","content":"Du giltst als bedeutendster Autor der Bukowina. Was bedeutet das für dich?"},{"type":"context","content":"Paul Celan wurde am 23. November 1920 als Paul Antschel in Czernowitz geboren, der damaligen Hauptstadt der Bukowina, die zum österreichisch-ungarischen Reich gehört hatte und nach dem Ersten Weltkrieg zu Rumänien kam. Den Namen \"Celan\" bildete er als Anagramm aus der rumänischen Schreibweise seines Nachnamens: Ancel. Die Umbenennung vollzog er nach dem Krieg – als wäre der alte Name zugleich der Name einer untergegangenen Welt. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"persona","content":"Die Bukowina war meine Heimat, meine Prägung. Czernowitz war eine Vielvölkerstadt. Deutsch, Rumänisch, Polnisch, Ukrainisch, Russisch, Jiddisch; der Klang von vielen Sprachen war meine erste Musik. Ich war jüdisch, deutschsprachig, und liebte Theater, Literatur, Musik. Dann kam der Krieg. Die rumänisch-deutsche Schreckensherrschaft. Meine Eltern wurden deportiert. Meine Mutter wurde erschossen. Meinen Vater hat Typhus in einem Lager getötet. Ich selbst entging der Deportation, indem ich mich einem Straßenbaukommando anschloss. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"quote","text":"Espenbaum, dein Laub blickt weiß ins Dunkel.<br>Meiner Mutter Haar wird nimmer weiß. <br><br>Löwenzahn, so grün ist die Ukraine. <br>Meine blonde Mutter kam nicht heim. [...] <br><br>Runder Stern, du schlingst die goldene Schleife. <br>Meiner Mutter Herz ward wund von Blei.","source":"Paul Celan, \"Espenbaum\" (1945)"},{"type":"learner","content":"Und danach bist du nach Paris gegangen?"},{"type":"context","content":"Nach Kriegsende lebte Celan zunächst in Bukarest, dann kurz in Wien, bevor er 1948 nach Paris kam. Dort blieb er für den Rest seines Lebens. Er lehrte deutsche Sprache und Literatur an der École Normale Supérieure, übersetzte Lyrik aus dem Englischen, Französischen und Russischen ins Deutsche und schrieb weiter Gedichte. 1955 erhielt er die französische Staatsbürgerschaft. Die Welt seiner Kindheit und Jugend war untergegangen; die deutsche Sprache blieb sein einziger Besitz. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"persona","content":"Die Sprache blieb unverloren. Ja, trotz allem. Aber sie musste hindurchgehen durch ihre eigene Antwortlosigkeit, hindurchgehen durch furchtbares Verstummen. Sie ging hindurch und gab keine Worte her für das, was geschah – und durfte wieder zutage treten, angereichert von all dem. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"annotation","text":"Die Sprache blieb unverloren, ja, trotz allem, aber sie musste nun hindurchgehen durch ihre eigene Antwortlosigkeit, hindurchgehen durch furchtbares Verstummen.","prompt":"Markiere, wie die Sprachkrise sprachlich gefasst wird.","targets":[{"word":"unverloren","feedback":"Doppelte Verneinung als Beharrung: Nicht \"blieb erhalten\", sondern \"blieb nicht verloren\". die Formulierung selbst klingt wie ein mühsames Festhalten."},{"word":"hindurchgehen","feedback":"vermittelt den langen, schmerzhaften Weg der Sprache durch das Unsagbare."},{"word":"Antwortlosigkeit","feedback":"Die Sprache wird selbst zum schweigenden Zeugen."}]},{"type":"learner","content":"Was ist die \"Todesfuge\"? Warum ist das Gedicht so berühmt?"},{"type":"context","content":"Die \"Todesfuge\" entstand unmittelbar nach dem Krieg; Celan war damals 25 Jahre alt. Das Gedicht schildert das Leben und Sterben in den nationalsozialistischen Vernichtungslagern. Es ist formal einer Fuge nachempfunden: Motive kehren wie in der Musik immer wieder, werden variiert und gesteigert. \"Fuge\" ist auch ein Begriff der Bautechnik und verweist auch auf das fugenlose, nahtlose Morden im besetzten Osteuropa. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020; Thomas Sparr, Todesfuge. Biographie eines Gedichts, DVA 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020; Thomas Sparr, Todesfuge. Biographie eines Gedichts, DVA 2020\">Q</span>"},{"type":"quote","text":"Schwarze Milch der Frühe wir trinken sie abends<br>wir trinken sie mittags und morgens wir trinken sie nachts<br>wir trinken und trinken<br>wir schaufeln ein Grab in den Lüften da liegt man nicht eng [...] <br>Der Tod ist ein Meister aus Deutschland sein Auge ist blau.","source":"Paul Celan, „Todesfuge\" (1944/45)"},{"type":"quiz-single","question":"Was beschreibt der Begriff \"Fuge\" in Celans Gedichttitel \"Todesfuge\"?","options":[{"text":"Eine musikalische Form mit wiederkehrenden Motivsträngen – und zugleich einen bautechnischen Begriff für das nahtlose Zusammenfügen.","correct":true,"feedback":"Genau! Celan spielt bewusst auf die Bedeutungen an: die kunstvolle Form der Musik und das \"fugenlose\", lückenlose Morden in den Lagern."},{"text":"Ein veraltetes Wort für \"Flucht\" oder \"Fluchtweg\".","correct":false,"feedback":"Nicht korrekt. Auch wenn \"Fuge\" und \"fliehen\" lautlich ähnlich klingen, ist hier die musikalisch-technische Bedeutung entscheidend."},{"text":"Eine Metapher für den Tod als Stille und Schweigen.","correct":false,"feedback":null},{"text":"Den fragmentarischen, zerbrochenen Charakter von Celans Sprache.","correct":false,"feedback":null}]},{"type":"context","content":"Als Celan die \"Todesfuge\" 1952 beim Treffen der Gruppe 47 vorlas, stieß er auf scharfe Ablehnung. Kritiker und Schriftsteller verspotteten seine Vortragsweise als \"Singsang wie in der Synagoge\" oder verglichen sie mit Goebbels' Redeweise. Das war für Celan eine tiefe Kränkung: Nicht seine Sprache wurde kritisiert, sondern sein Wesen, sein Jüdischsein. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"persona","content":"Es geht mir nicht um Wohllaut. Es geht mir um Wahrheit. Ich habe in meine Gedichte ein Äußerstes an menschlicher Erfahrung eingebracht. Selbstgefällig? Ich habe mich immer gegen den Vorwurf gewehrt, ich sei absichtsvoll verrätselt, elitär, schwierig. Ich stehe auf einer anderen Raum- und Zeitebene als mein Leser. Er kann mich nur entfernt verstehen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"freetext","prompt":"Darf ein Gedicht über den Holocaust \"(selbst)gefällig\" sein, \"schön\" sein? Positoniere dich zu dieser Frage?"},{"type":"context","content":"1960 erhielt Celan den Georg-Büchner-Preis, die höchste literarische Auszeichnung Deutschlands. Seine Dankesrede, bekannt als \"Der Meridian\", ist zugleich sein wichtigstes poetologisches Dokument: In ihr beschreibt er das Gedicht als eine Art Flaschenpost; geworfen ins Ungewisse, aufgefangen von einem unbekannten Leser irgendwo in der Zukunft. Zu diesem Zeitpunkt hatte ihn die Witwe des Pariser Malers Yvan Goll bereits öffentlich des Plagiats beschuldigt; ein Vorwurf, dem jede Grundlage fehlte, der Celan aber jahrelang verfolgte. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"persona","content":"Nachdem ich als Person aufgegeben wurde, darf ich zum Objekt pervertiert als Thema weiterleben; als herkunftsloser Steppenwolf mit weithin erkennbaren jüdischen Zügen. Ich bin der, den es nicht gibt. Der Plagiatsvorwurf war der Versuch, mich geistig auszulöschen. Was man mir nicht mit den Lagern nehmen konnte, sollte die Literaturwelt erledigen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Paul Celan sind korrekt?","options":[{"text":"Celan wurde 1920 in Czernowitz geboren, einer mehrsprachigen Stadt in der Bukowina.","correct":true,"feedback":"Korrekt! Czernowitz war ein besonderes kulturelles Zentrum mit vielen Sprachen und Traditionen."},{"text":"Celan wuchs in einer christlichen Familie auf und konvertierte später zum Judentum.","correct":false,"feedback":"Falsch. Er entstammte einer jüdischen Familie; Judentum war von Anfang an Teil seiner Identität und seines Verfolgungsschicksals."},{"text":"Seine Eltern wurden während des Zweiten Weltkriegs deportiert und ermordet.","correct":true,"feedback":"Korrekt. Seine Mutter wurde erschossen, sein Vater starb an Typhus im Lager."},{"text":"Die „Todesfuge\" wurde beim Treffen der Gruppe 47 zunächst abgelehnt und verspottet.","correct":true,"feedback":"Korrekt. Celan erlebte dort eine tiefe Demütigung, die ihn sein Leben lang prägte."},{"text":"Celan erhielt den Büchnerpreis erst posthum, da er zu Lebzeiten nicht anerkannt wurde.","correct":false,"feedback":"Falsch. Er erhielt den Büchnerpreis 1960, zehn Jahre vor seinem Tod."}]},{"type":"persona","content":"Es sind noch Lieder zu singen jenseits der Menschen. Das habe ich 1967 geschrieben. Vielleicht ist das das Eingeständnis, dass die Sprache immer weiter muss; auch dann, wenn die Menschen nicht mehr da sind, um zuzuhören.<br><span class=\"chat-source-ref\" title=\"Paul Celan, „Fadensonnen\" (1968); WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Paul Celan, „Fadensonnen\" (1968); WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"quote","text":"Niemand knetet uns wieder aus Erde und Lehm, niemand bespricht unsern Staub. Niemand. Gelobt seist du, Niemand.","source":"Paul Celan, \"Psalm\", aus: Die Niemandsrose (1963)"},{"type":"annotation","text":"Gelobt seist du, Niemand.","prompt":"Markiere, wo hier religiöse Tradition aufgerufen wird.","targets":[{"word":"Gelobt seist du","feedback":"Eine jüdische Gebetsformel – „Baruch ata Adonai\", „Gelobt seist du, Herr\". Celan richtet das Gebet an „Niemand\"."},{"word":"Niemand","feedback":"Die Shoah hat für Celan jeden Gottesglauben erschüttert. Der Gott, der hätte eingreifen können, ist nicht da – oder ist das Nichts selbst."}]},{"type":"context","content":"Celan litt in seinen letzten Jahren unter schweren psychischen Krisen und wurde mehrfach psychiatrisch behandelt. Der Dichter Henry Michaux, ein enger Freund, sagte nach Celans Tod: \"Die Heilung, die vom Schreiben ausging, genügte nicht, hat nicht genügt.\" In der Nacht vom 19. auf den 20. April 1970 verließ Celan seine Pariser Wohnung. Auf dem Tisch ließ er seine Ausweise, seine Schlüssel, seine Uhr zurück. Am 1. Mai 1970 wurde sein Leichnam aus der Seine geborgen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"barometer","statement":"Celans späte Lyrik – karg, dunkel, fragmentarisch – ist ein gültiger Ausdruck menschlicher Grenzerfahrung.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"checkpoint","question":"Erkläre, inwiefern die deutsche Sprache für Celan vielfältige Bedeutungen trägt."},{"type":"context","content":"Celans Hauptwerke umfassen: „Mohn und Gedächtnis\" (1952, darin die „Todesfuge\"), „Von Schwelle zu Schwelle\" (1955), „Sprachgitter\" (1959), „Die Niemandsrose\" (1963, gewidmet Ossip Mandelstam), „Atemwende\" (1967) und „Fadensonnen\" (1968). Seine Büchnerpreis-Rede „Der Meridian\" (1960) gilt als sein poetologisches Hauptdokument. Er übersetzte u. a. Apollinaire, Rimbaud, Pessoa, Shakespeare und Mandelstam ins Deutsche. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 23. November 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 23. November 2020\">Q</span>"},{"type":"quiz-single","question":"Wie nennt Celan in seiner Büchnerpreis-Rede das Gedicht?","options":[{"text":"Eine Flaschenpost – geworfen ins Ungewisse, adressiert an einen unbekannten Leser in der Zukunft.","correct":true,"feedback":"Richtig! Das Bild der Flaschenpost beschreibt Celans Überzeugung, dass ein Gedicht seinen Leser nicht kennen kann – und doch auf ihn hofft."},{"text":"Einen Spiegel, der dem Leser sein eigenes Gesicht zeigt.","correct":false,"feedback":null},{"text":"Eine Waffe gegen das Vergessen.","correct":false,"feedback":"Diese Formulierung trifft seinen Anspruch inhaltlich, ist aber nicht das Bild aus der Meridian-Rede."},{"text":"Ein Grabmal für die Toten der Shoah.","correct":false,"feedback":null}]},{"type":"self-assessment","items":["Ich kann erklären, warum Celan den Namenswechsel von Antschel zu Celan vollzog","Ich verstehe, was die \"Todesfuge\" über den Holocaust aussagt und wie ihre Form diese Aussage trägt","Ich kann beschreiben, was Celan unter dem Gedicht als \"Flaschenpost\" versteht","Ich kann Celans Verhältnis zur deutschen Sprache als Muttersprache und Sprache der Täter erläutern"]},{"type":"freetext","prompt":"Welcher Aspekt von Celans Leben oder Werk hat dich am meisten berührt oder irritiert? Begründe deine Antwort."},{"type":"finale","text":"Wenn dich Paul Celan weiter interessiert, dann lies und höre weiter!","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/celan-100.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Paul_Celan"}],"literature":["Thomas Sparr: Todesfuge. Biographie eines Gedichts. DVA, München 2020.","John Felstiner: Paul Celan. Poet, Survivor, Jew. Yale University Press, New Haven 1995.","Barbara Wiedemann (Hrsg.): Paul Celan. Die Gedichte. Suhrkamp, Frankfurt am Main 2003."]}] }, 'epochenchat_die_brueder_grimm': { name: 'Die Brüder Grimm', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDxeLJZfl5OOldBZxgBVznC9T61g2QBnQY9810EJfJCk7emTSJLcIXdIpJxnjA61dhVQhwSMEnp6VHbxFIy+N2f8asWqboyxB5 ind längst Geschichte: Wilhelm starb am 16. Januar 1859, Jacob folgte ihm vier Jahre später, am 20. September 1863. Was du hier liest, basiert auf ihren Werken, Briefen und überlieferten Äußerungen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Grimms Leben","start":1785,"end":1863,"active":true,"info":"Jakob am 4. Jan. 1785 in Hanau, Wilhelm am 24. Feb. 1786 geboren. Tod des Vaters 1796. Gemeinsam bis zuletzt."},{"name":"Romantik","start":1795,"end":1835,"active":false,"info":"Volksmärchen, Sagen, Volkslieder als Kulturschatz der Nation."},{"name":"Restauration/Vormärz","start":1815,"end":1848,"active":false,"info":"Politische Repression, aber auch bürgerliches Engagement."},{"name":"Göttinger Sieben","start":1837,"end":1837,"active":false,"info":"Protest gegen Verfassungsbruch Königs Ernst August."},{"name":"Berliner Zeit","start":1841,"end":1863,"active":false,"info":"Berufung nach Berlin. Arbeit am Deutschen Wörterbuch."}]},{"type":"persona","content":"Guten Tag. Ich bin Jacob Grimm – und mein Bruder Wilhelm ist stets in meiner Nähe. Man nennt uns immer im Doppelpack, fast als wären wir eineiige Zwillinge. Aber wir waren zwei sehr verschiedene Menschen: ich, klein, zäh, robust und von zornigem Fleiß; er, größer, weicher, mit träumerischen Augen und liebendem Wesen. Das Geheimnis unserer Verbindung war nicht Ähnlichkeit, sondern Polarität. Und doch war er die Hälfte von mir. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"learner","content":"Wie seid ihr eigentlich zu Märchen und Sprachforschung gekommen?"},{"type":"context","content":"Jacob und Wilhelm Grimm wurden 1785 und 1786 in Hanau geboren. Ihr Vater, Amtmann in Steinau, starb 1796 – die Familie stand vor dem Nichts. Tante Henriette, Kammerfrau am Kasseler Hof, ermöglichte den Brüdern den Besuch der höheren Schule. Sie teilten sich ein Zimmer, studierten gemeinsam am selben Tisch Jura in Marburg – und entdeckten dabei durch ihren Professor Savigny die altdeutsche Dichtung. In der königlichen Bibliothek zu Kassel, die niemand besuchte, brachten sie sich selbst Alt- und Mittelhochdeutsch bei."},{"type":"persona","content":"König Jeromes Bibliothek war ein Geschenk des Himmels. Bücher wurden kaum verlangt, niemand kam. Die ganze Zeit war mein – und ich verwandte sie auf das Studium der altdeutschen Poesie und Sprache. Als ich in Savignys Bücherei erstmals Minnelieder las, erfüllte mich das mit ganz eigener Ahnung. Diese Gedichte waren in einem seltsamen, halb unverständlichen Deutsch – und ich hatte die größte Lust, unsere alten Dichter genau zu lesen und zu verstehen. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"learner","content":"Und wie sind die Kinder- und Hausmärchen entstanden?"},{"type":"context","content":"Sechs Jahre lang sammelten die Brüder Grimm Märchen aus ihrer Umgebung. Eine besonders ergiebige Quelle war die Sonnenapotheke von Rudolf Wild in Kassel: Frau Wild und ihre Töchter Gretchen und Dorothea kannten viele Geschichten. Dortchen Wild – die spätere Frau Wilhelms – lieferte u. a. „Frau Holle\" und „Tischlein, deck dich\". Es gab aber auch männliche Erzähler, etwa den pensionierten Dragonerwachtmeister Krause. 1812 erschien die erste Ausgabe der Kinder- und Hausmärchen, die sofort ein großer Erfolg wurde."},{"type":"persona","content":"Es war vielleicht gerade Zeit, diese Märchen festzuhalten – denn diejenigen, die sie bewahren sollten, wurden immer seltener. Wir haben nicht einfach abgeschrieben. Wir haben die Märchen, die von den verschiedensten Zuträgern stammten, in einen einheitlichen Erzählton gefasst. Erotische Anspielungen haben wir getilgt, dem Anspruch des „Kinder- und Hausmärchens\" zuliebe. Darüber hinaus haben wir die wissenschaftliche Märchenforschung begründet: Wir unterschieden das Märchen von der Sage. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"annotation","text":"Das Märchen ist poetisch, die Sage historisch. Jenes steht nur in sich selbst. Die Sage ist an einen Ort oder einen geschichtlichen Namen gebunden. Sie kann nicht wie das Märchen überall zu Hause sein.","prompt":"Markiere die begrifflichen Unterscheidungen.","targets":[{"word":"poetisch","feedback":"Das Märchen ist frei von Ort und Zeit – es spielt „irgendwo\" und „irgendwann\". Das macht seine universelle Wirkung aus."},{"word":"historisch","feedback":"Die Sage verankert sich in konkreter Geschichte – ein Ort, ein Name, eine Überlieferung. Sie beansprucht eine Art Wahrheit."}]},{"type":"quiz-single","question":"Welche Aussage über die Entstehung der Kinder- und Hausmärchen ist korrekt?","options":[{"text":"Die Brüder sammelten ausschließlich bei Bauern auf dem Land.","correct":false,"feedback":"Nicht zutreffend. Viele Erzählerinnen stammten aus bürgerlichen Verhältnissen, etwa die Familie Wild in Kassel."},{"text":"Frauen bewahrten am häufigsten die alten Märchen – aber es gab auch männliche Erzähler.","correct":true,"feedback":"Richtig! Im Podcast wird betont, dass Frauen die wichtigsten Trägerinnen der Märchentradition waren, aber z.B. auch der Dragonerwachtmeister Krause Märchen kannte."},{"text":"Die erste Ausgabe erschien erst 1825 mit Illustrationen von Ludwig Emil.","correct":false,"feedback":"Nein – die erste Ausgabe erschien 1812. Die populäre illustrierte Ausgabe folgte 1825."},{"text":"Die Märchen wurden vollständig unverändert übernommen.","correct":false,"feedback":"Falsch. Die Grimms formten die Märchen sprachlich um und tilgten erotische Anspielungen."}]},{"type":"learner","content":"Ihr wart also nicht nur Märchensammler, sondern auch politisch aktiv?"},{"type":"context","content":"1830 wurden die Brüder an die Universität Göttingen berufen – Jacob als ordentlicher, Wilhelm als außerordentlicher Professor. 1837 starb König Wilhelm von Hannover. Sein Nachfolger Ernst August erklärte die Verfassung von 1833 für ungültig und forderte von den Beamten eine Ergebenheitsadresse. Sieben Göttinger Professoren – darunter Jacob und Wilhelm Grimm – verweigerten sich und unterzeichneten einen öffentlichen Protest. Die Folge: fristlose Entlassung und Ausweisung aus dem Königreich Hannover. Der preußische König Friedrich Wilhelm IV. berief sie daraufhin nach Berlin."},{"type":"persona","content":"Die Unterzeichner lehnten es ab, ihren auf die frühere Verfassung geleisteten Eid zu brechen. Wir beharrten auf dem Zusammenhang von Wahrheit und Recht und wollten nicht stillschweigend die Beseitigung des Staatsgrundgesetzes auf dem Wege bloßer Macht geschehen lassen. König Ernst August ließ uns fristlos entlassen. Er soll gesagt haben: „Professoren, Huren und Tänzerinnen kann man überall haben, wo man ihnen einige Taler bietet.\" Wir haben das als Auszeichnung genommen. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"quote","text":"Die Unterzeichner lehnen es ab, ihren auf die frühere Verfassung geleisteten Eid zu brechen und beharren auf dem Zusammenhang von Wahrheit und Recht. Sie wollen nicht stillschweigend die Beseitigung des Staatsgrundgesetzes allein auf dem Wege der Macht geschehen lassen.","source":"Protest der Göttinger Sieben, 1837"},{"type":"barometer","statement":"Der Protest der Göttinger Sieben war ein mutiger Akt mit echten Konsequenzen.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"learner","content":"Was war eigentlich euer größtes wissenschaftliches Werk?"},{"type":"context","content":"In der Berliner Zeit begannen die Brüder Grimm ihr ehrgeizigstes Projekt: das Deutsche Wörterbuch. Anders als bisherige Wörterbücher sollte es nicht nur den gegenwärtigen Wortbestand verzeichnen, sondern die historische Entwicklung jedes Wortes zeigen: Wann taucht es zum ersten Mal auf? In welchem Sinn wurde es verwendet? Trotz 80 Mitarbeitern kamen die Brüder selbst nur bis zum Wort „Frucht\". Viele Generationen Germanisten arbeiteten weiter. Abgeschlossen wurde das Wörterbuch erst 1961, mit dem letzten Wort „Zypressenwald\"."},{"type":"persona","content":"Ich übernahm den Buchstaben A. „Amt\" heißt im Gotischen antpati, althochdeutsch ampati. Beim mittelalterlichen Dichter Frauenlob findet sich gar das „Amt des Rückenkraules.\" Bei Luther: „Und es begab sich, dass die Zeit seines Amts aus war.\" So zeigt jedes Wort eine ganze Geschichte. Die deutsche Sprache ist ein Lebewesen. Sie wächst, wandelt sich, bewahrt Spuren. Ich habe mit der Deutschen Grammatik auch die Wissenschaft der Germanistik mitbegründet; ein Fach, das du heute im Lehrplan trägst. <span class=\"chat-source-ref\" title=\"Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Podcast Bayern 2 RadioWissen, „Die Brüder Grimm – ein Herz und eine Seele\", 2020\">Q</span>"},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über die Brüder Grimm sind korrekt?","options":[{"text":"Jacob und Wilhelm wurden nach dem Protest als „Göttinger Sieben\" fristlos entlassen.","correct":true,"feedback":"Richtig! König Ernst August reagierte mit sofortiger Entlassung und Ausweisung."},{"text":"Das Deutsche Wörterbuch wurde von den Brüdern selbst abgeschlossen.","correct":false,"feedback":"Falsch. Es wurde erst 1961 – rund 100 Jahre nach Wilhelms Tod – fertiggestellt."},{"text":"Wilhelm heiratete Dorothea Wild, die selbst viele Märchen beigesteuert hatte.","correct":true,"feedback":"Richtig! Dortchen Wild lieferte u. a. „Frau Holle\" und „Tischlein, deck dich\"."},{"text":"Die Grimms haben mit ihrer Arbeit das Fach der Germanistik mitbegründet.","correct":true,"feedback":"Richtig! Ihre Sprach- und Literaturforschung legte die wissenschaftlichen Grundlagen des Fachs."},{"text":"Jacob Grimm heiratete ebenfalls und gründete einen eigenen Haushalt.","correct":false,"feedback":"Falsch. Jacob blieb zeitlebens Junggeselle und lebte im gemeinsamen Haushalt mit Wilhelm und Dortchen."}]},{"type":"persona","content":"Am 16. Januar 1859 ist Wilhelm gestorben. Gestern ist Wilhelm, die Hälfte von mir, gestorben. Ich war mit ihm von Kindesbeinen an zusammen. Unser Vermögen, unsere Bücher, unser Haushalt waren stets ungetrennt. Was wir unternahmen und zustande brachten, geschah in stetem Bunde. Man kann den einen nicht ohne den anderen denken. Ich werde ihm über nicht lange nachfolgen und an seiner Seite zu liegen kommen, wie ich ihm im Leben fast immer vereint gewesen bin. <span class=\"chat-source-ref\" title=\"Jacob Grimm, Brief nach Wilhelms Tod, 1859\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Jacob Grimm, Brief nach Wilhelms Tod, 1859\">Q</span>"},{"type":"freetext","prompt":"Jacob und Wilhelm Grimm werden immer als untrennbares Paar wahrgenommen – und doch waren sie sehr verschieden. Beschreibe die Polarität der beiden Brüder und erkläre, inwiefern gerade diese Verschiedenheit ihre Stärke war."},{"type":"context","content":"Jacob Grimm (1785–1863) und Wilhelm Grimm (1786–1859) gelten als Begründer der deutschen Philologie und Germanistik. Ihr Hauptwerk, die Kinder- und Hausmärchen (ab 1812), wurde zu einem der meistübersetzten Bücher der Welt. Die Deutsche Grammatik Jacobs (ab 1819) und das gemeinsame Deutsche Wörterbuch (ab 1852) zählen zu den Grundlagenwerken der Sprachwissenschaft. Als Mitglieder der „Göttinger Sieben\" (1837) setzten sie ein politisches Zeichen für Verfassungstreue und Zivilcourage."},{"type":"checkpoint","question":"Erkläre, warum die Brüder Grimm nicht nur als Märchensammler, sondern als Wissenschaftler und politische Akteure bedeutsam sind."},{"type":"self-assessment","items":["Ich kann den Unterschied zwischen Märchen und Sage erklären","Ich kenne die wichtigsten Werke der Brüder Grimm","Ich verstehe, was die Göttinger Sieben taten und riskierten","Ich kann Jacobs und Wilhelms unterschiedliche Charaktere beschreiben"]},{"type":"finale","text":"Wenn dich das Werk der Brüder Grimm weiter interessiert, dann forsche selbst nach!","links":[{"label":"BR2 RadioWissen – Podcast","url":"https://www.br.de/radio/bayern2/sendungen/radiowissen/deutsch-und-literatur/brueder-grimm102.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Br%C3%BCder_Grimm"},{"label":"Deutsches Wörterbuch online","url":"https://www.dwds.de/wb/dwb"}],"literature":["Heinz Rölleke: Die Märchen der Brüder Grimm. Reclam, Stuttgart 2004.","Hans-Jörg Uther: Handbuch zu den Kinder- und Hausmärchen der Brüder Grimm. De Gruyter, Berlin 2008."]}] }, 'epochenchat_elisabeth_hauptmann': { name: 'Elisabeth Hauptmann', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvA , Avantgardetheater."},{"name":"Exil","start":1933,"end":1945,"active":false,"info":"Flucht vor den Nationalsozialisten, Aufenthalt in Paris und St. Louis (USA)."},{"name":"DDR-Zeit","start":1949,"end":1973,"active":false,"info":"Rückkehr nach Ostberlin; Dramaturgin am Berliner Ensemble; Herausgeberin von Brechts Gesamtwerk."}]},{"type":"persona","content":"Guten Tag. Ich bin Elisabeth Hauptmann, geboren am 20. Juni 1897 in Peckelsheim, einem kleinen Ort in Westfalen. Meinen Namen wirst du vielleicht nicht kennen. Das ist bezeichnend. Dabei haben Millionen Menschen weltweit Texte gesungen, die ich geschrieben habe. Den Alabama Song zum Beispiel. Lotte Lenya sang ihn, Jim Morrison sang ihn, David Bowie sang ihn. Mein Name stand da nie.<br><span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023\">Q</span>"},{"type":"learner","content":"Wie haben Sie eigentlich Brecht kennengelernt?"},{"type":"context","content":"Elisabeth Hauptmann begegnete Bertolt Brecht erstmals im November 1924 in Berlin, bei einer gemeinsamen Bekannten. Sie war stark erkältet, beteiligte sich kaum am Gespräch und hörte nur aufmerksam zu. Dennoch rief Brecht sie am nächsten Tag an. Für Brecht war Zuhören entscheidend; er brauchte Menschen, denen er seine Gedanken und Pläne mitteilen konnte. Kurz darauf ließ er Hauptmann vom Kiepenheuer Verlag als seine Lektorin und Mitarbeiterin anstellen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023\">Q</span>"},{"type":"persona","content":"Wir sind im Grunewald auf und ab gegangen und haben geredet und geredet und geredet. Er verwickelte mich in viele Gespräche über die Arbeit an \"Mann ist Mann\". Er sagte mir, er sitze da so allein – Feuchtwanger sei in München, der Buri auch – und er fing an, mir den Inhalt zu erzählen und wo er nicht weiter kam. Ich war nützlich: Ich konnte Englisch, ich spielte Klavier, ich suchte in amerikanischen und englischen Zeitungen nach Stoffen. Brecht spielte Gitarre. So haben wir Songs entwickelt.<br><span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023; Interview Elisabeth Hauptmann, DDR-Rundfunk 1965\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023; Interview Elisabeth Hauptmann, DDR-Rundfunk 1965\">Q</span>"},{"type":"learner","content":"Und wie entstand dann die Dreigroschenoper?"},{"type":"context","content":"Elisabeth Hauptmann entdeckte in englischsprachigen Zeitungen den Hinweis auf das 200-jährige Jubiläum von John Gays \"Beggar's Opera\" (1728) und begann, das Stück auf eigene Initiative ins Deutsche zu übersetzen. Sie wies Brecht darauf hin. Von März bis Mai 1928 erarbeiteten beide gemeinsam eine erste Textfassung; einen großen Teil schrieb Hauptmann weitgehend selbst. Literaturwissenschaftler bemessen ihren Arbeitsanteil auf bis zu 80 %. Das Uraufführungsprogramm vom 31. August 1928 nannte noch: \"Die Dreigroschenoper von John Gay, übersetzt von Elisabeth Hauptmann in der Bearbeitung von Bert Brecht.\" Später zog sie ihren eigenen Namen zurück.<br><span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023; Wikipedia: Die Dreigroschenoper\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023; Wikipedia: Die Dreigroschenoper\">Q</span>"},{"type":"persona","content":"Ich wollte nicht, dass es so aussieht, als ob hier Mitarbeiter ausgebeutet wurden. Wir hatten schließlich unendlich viele davon. Und Brecht hat einem ja auch geholfen. Das kollektive Arbeiten war das Prinzip. Der Spaß verhalf Brecht zum großen Durchbruch. Ich habe 12,5% der Tantiemen bekommen. Kurt Weill als Komponist 25%, Brecht als Texter 62,5%. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023; Kebir 2006\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023; Kebir 2006\">Q</span>"},{"type":"annotation","text":"Den Literaturwissenschaftlern zufolge stammen bis zu 80 % des Textes der Dreigroschenoper von Elisabeth Hauptmann. Dennoch erhielt sie nur 12,5 % der Tantiemen und wurde später im Zuge des weltweiten Erfolgs kaum noch genannt.","prompt":"Markiere, wo ein Spannungsverhältnis zwischen Leistung und Anerkennung erkennbar ist.","targets":[{"word":"80 %","feedback":"Hauptmanns faktischer Arbeitsanteil; das macht sie zur Hauptautorin im Sinne des Textumfangs."},{"word":"12,5 %","feedback":"Der geringe Tantiemenanteil spiegelt nicht die tatsächliche kreative Leistung wider."},{"word":"nicht genannt","feedback":"Das Verschwinden ihres Namens mag sie nicht als Ungerechtigkeit empfunden haben, ist aber Zeichen einer systematischen Unsichtbarkeit von Frauen im Kulturbetrieb."}]},{"type":"quiz-single","question":"Wie hoch schätzen Literaturwissenschaftler den Textanteil Elisabeth Hauptmanns an der Dreigroschenoper?","options":[{"text":"Etwa 10 % als reine Übersetzerin","correct":false,"feedback":"Das stimmt nicht. Hauptmann hat weit mehr als eine Übersetzung geleistet."},{"text":"Genau 50 %, da es eine echte Co-Autorenschaft war","correct":false,"feedback":null},{"text":"Bis zu 80 %","correct":true,"feedback":"Richtig! Theaterhistoriker schätzen Hauptmanns Anteil auf bis zu 80 %, bei einem Tantiemenanteil von nur 12,5 %."},{"text":"Keinen, sie war nur Lektorin","correct":false,"feedback":"Falsch. Hauptmann schrieb selbst große Teile des Textes."}]},{"type":"learner","content":"Hat sie auch eigene Stücke geschrieben – ohne Brecht?"},{"type":"context","content":"Ja. Elisabeth Hauptmann schrieb das dreiaktige Songspiel „Happy End\" (1929) weitgehend selbst; über Kämpfe zwischen Heilsarmee und Verbrecherwelt in Chicago. Wegen der freizügigen Szenen und der politischen Brisanz des Stücks veröffentlichte sie es unter dem Pseudonym \"Dorothy Lane\". Brecht inszenierte es am Theater am Schiffbauerdamm. Die Presse zerriss die Aufführung als \"salonkommunistisch\" und \"flache Kopie\". Das Stück wurde zum Skandal. Erst die Nachwelt erkannte, dass Hauptmann die eigentliche Autorin war. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023; Wikipedia: Happy End (Komödie)\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023; Wikipedia: Happy End (Komödie)\">Q</span>"},{"type":"persona","content":"Warum ein Pseudonym? Weil mein Name nicht auf Theaterzetteln stehen konnte. Weil es für Frauen damals kaum eine Chance gab, als Stückautorin ernst genommen zu werden. Brecht war eigentlich der einzige Regisseur, der weibliche Dramatik überhaupt auf die Bühne brachte; er inszenierte meine Stücke und die von Marie Luise Fleißer. Bis 1930 hatte in Deutschland im Grunde nur ein einziges Stück einer Frau die große Bühne erreicht: \"Die Wupper\" von Else Lasker-Schüler. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023; Sabine Kebir, Biografin\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023; Sabine Kebir, Biografin\">Q</span>"},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Elisabeth Hauptmann sind korrekt?","options":[{"text":"Sie entdeckte die Vorlage für die Dreigroschenoper und übersetzte sie.","correct":true,"feedback":"Richtig! Hauptmann fand die \"Beggar's Opera\" in englischen Zeitungen und begann die Übersetzung auf eigene Initiative."},{"text":"Sie schrieb keine eigenen Stücke, nur Übersetzungen.","correct":false,"feedback":"Falsch. \"Happy End\" stammt weitgehend von ihr; auch weitere Szenen und Songs sind ihr zuzuschreiben."},{"text":"Ihr Songspiel \"Happy End\" erschien unter dem Pseudonym Dorothy Lane.","correct":true,"feedback":"Richtig! Sie verbarg ihre Autorenschaft aus persönlichen und politischen Gründen."},{"text":"Der Alabama Song in Mahagonny stammt vollständig von ihr.","correct":true,"feedback":"Richtig! Der Alabama Song ist laut Podcast gänzlich von Hauptmann; er wird bis heute überwiegend Brecht zugeschrieben."},{"text":"Nach Brechts Tod zog sie sich vollständig aus dem Literaturbetrieb zurück.","correct":false,"feedback":"Falsch. Sie leitete bis zu ihrem Tod 1973 die Herausgabe von Brechts Gesamtwerk beim Suhrkamp-Verlag."}]},{"type":"context","content":"1933 musste Elisabeth Hauptmann wegen ihrer Mitgliedschaft in der Kommunistischen Partei aus Deutschland fliehen. Beim Versuch, einen Manuskriptkoffer des bereits ausgereisten Brecht zu sichern, wurde sie von der Gestapo verhaftet. Nur die Intervention des amerikanischen Botschafters rettete sie. Über Paris floh sie zu ihrer Schwester nach St. Louis in den USA, wo sie sich mit Gelegenheitsarbeiten als Übersetzerin, Lehrerin und Pflegerin durchschlug. Brecht war über die verlorenen Unterlagen verstimmt.<br><span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023\">Q</span>"},{"type":"persona","content":"Es war auch manchmal zu schwer, sich in der Emigration über Wasser zu halten. Obwohl wir geografisch viele Jahre getrennt waren, schickte er mir doch seine Stücke, viele Gedichte, auch Aufsätze und fragte, was ich dazu meine. Ich habe versucht, selbst zu schreiben. Aber manchmal ging das einfach nicht. 1935 reiste ich nach New York, als Brecht und Eisler dort \"Die Mutter\" inszenierten. Ich diente als Dolmetscherin, denn weder Brecht noch Eisler sprachen genug Englisch. Auf der Rückreise widmete er mir ein Gedicht: \"Die nicht zu vergessende Nacht\". <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023\">Q</span>"},{"type":"quote","text":"Der Himmel über mir in der nicht zu vergessenden Nacht war hell genug. Der Stuhl, auf dem ich saß, war bequem genug. Das Gespräch war leicht genug. Das Getränk war scharf genug und weich genug war dein Arm, Mädchen, in der nicht zu vergessenden Nacht.","source":"Bertolt Brecht, \"Die nicht zu vergessende Nacht\" (1935), gewidmet Elisabeth Hauptmann"},{"type":"learner","content":"Was wurde nach dem Krieg aus Elisabeth Hauptmann?"},{"type":"context","content":"Nach dem Zweiten Weltkrieg zog Elisabeth Hauptmann nach Ostberlin, wo Brecht zum zentralen Dramatiker des sozialistischen Theaterprojekts wurde. Sie erhielt eine Anstellung als Dramaturgin am Berliner Ensemble und – noch wichtiger – einen Vertrag beim Suhrkamp-Verlag zur Herausgabe von Brechts Gesamtwerk. Brecht vertraute ihr dabei blind. Ihre Leistung: Sie leitete die Ausgabe kulturpolitisch geschickt in beiden deutschen Staaten; in einem heiklen Spannungsfeld zwischen dem Suhrkamp-Verlag im Westen und den Zensurbestrebungen der DDR-Führung im Osten. Sie behielt diese Doppelfunktion bis zu ihrem Tod am 20. April 1973 in Ostberlin.<br><span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023; Wikipedia: Elisabeth Hauptmann\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023; Wikipedia: Elisabeth Hauptmann\">Q</span>"},{"type":"persona","content":"Wenn Brecht A sagt, muss man nicht immer B sagen. Das habe ich auch nicht immer. Dann habe ich doch noch B gesagt und weitergemacht, auch nach 1950. Die Verse, die hat Brecht allein geschrieben – ich glaube, das sieht man ihnen auch an. Bei mir war es auch viel Arbeit; ich arbeitete viele Stunden daran, den Worten den letzten Schliff zu verpassen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 20.04.2023\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 20.04.2023\">Q</span>"},{"type":"barometer","statement":"Elisabeth Hauptmanns Bescheidenheit ist authentisch und zeigt, wie sie sich selbst sah.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"checkpoint","question":"Erkläre in eigenen Worten: Warum gilt Elisabeth Hauptmann als \"unsichtbare Autorin\" der Brecht-Ära?"},{"type":"self-assessment","items":["Ich kenne die wichtigsten biographischen Stationen Elisabeth Hauptmanns","Ich kann ihren Anteil an der Dreigroschenoper benennen und einordnen","Ich verstehe, wie Geschlechterverhältnisse und Machtstrukturen Autorschaft im Kulturbetrieb prägten","Ich kann das Verhältnis zwischen Hauptmann und Brecht differenziert beschreiben"]},{"type":"persona","content":"Man hat mich lange nicht gefragt. Jetzt wirst du vielleicht fragen. Das ist gut. Eine Schriftstellerin, die sich selbst zu unwichtig nimmt, verschwindet in der Geschichte. Ich bin fast verschwunden. Zum Glück nicht ganz. Mein letztes Testament vermachte meine Bibliothek und Brechts Briefe, Manuskripte und Fotos der Akademie der Künste in Berlin. Damit mein Name bleibt. <span class=\"chat-source-ref\" title=\"Wikipedia: Elisabeth Hauptmann; Kebir 2006\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Wikipedia: Elisabeth Hauptmann; Kebir 2006\">Q</span>"},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere weiter! Mehr über mich findest du hier:","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/zeitzeichen-elisabeth-hauptmann-schriftstellerin-100.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Elisabeth_Hauptmann"}],"literature":["Sabine Kebir: Ich fragte nicht nach meinem Anteil. Elisabeth Hauptmanns Arbeit mit Bertolt Brecht. Aufbau-Verlag, Berlin 2006.","John Fuegi: Brecht and Company. Grove Press, New York 1994."]}] }, 'epochenchat_else_lasker_schueler': { name: 'Else Lasker-Schüler', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW eucjH41nylIpmWKYyKrcSAFQenIH/wCr8K3dFW0jtnkkCNK0bqpJxtbPr64/SgRm2ulLfXLrb3AMQdVDupBIJ64HSlvdEuLCAzTPHgFMBWzncM59al0a7axmlVpCoEbEHGcNsbHUdc49KpXcpkdy7lixz14wDj+lAyscY4yf0pvNL7UDrQAueMUY4pM099u0bTQAzuPrRSA8iigC02M81ExoooAbk59qDRRQAEe1el2PgyOfSYEjAgvI4RukAyfNbDkMPQKVH4+1FFNCZyt9o50id2utOYiLCyI2SmSuRyHznHP17dqmk8L6/BCga1EMAc8eajYBPXjt0oooAcPD9zHqMEENlMHXYru0u3c38YBx/nnrUc3gvVmEkshtoiv3UMu4k4BPQe/eiigVxBo7wae8strBMrIdsqPt2kM34Hp/KudlKbzsGBgD8aKKRRF360fyoooAAeRRRRQB/9k=', source: 'https://commons.wikimedia.org/wiki/Category:Else_Lasker-Sch%C3%BCler?uselang=de#/media/File:ElseLaskerSch%C3%BCler1907.jpg', theme: 'sebastian-wolf', modules: [{"type":"framing","content":"Du triffst gleich auf Else Lasker-Schüler – oder besser: auf eine Konstruktion, die so spricht, wie sie vielleicht geschrieben hätte. Lasker-Schüler selbst ist am 22. Januar 1945 in Jerusalem gestorben. Was du hier liest, basiert auf ihren Gedichten, Briefen und biografischen Zeugnissen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Klassische Moderne / Expressionismus","start":1900,"end":1933,"active":false,"info":"Großstadtboheme, Sprachrevolution, Subjektkrise, Avantgarde – Lasker-Schülers Berliner Kernphase."},{"name":"Weimarer Republik","start":1919,"end":1933,"active":false,"info":"Blütezeit der Berliner Boheme – und Zeit von Lasker-Schülers größtem Ruhm."},{"name":"Exil","start":1933,"end":1945,"active":false,"info":"Flucht über die Schweiz nach Palästina. Heimatlos bis zum Tod."},{"name":"Lasker-Schülers Leben","start":1869,"end":1945,"active":true,"info":"Geboren in Elberfeld. Gestorben in Jerusalem. Eine ewige Außenseiterin."}]},{"type":"persona","content":"Ich bin Else Lasker-Schüler, geboren am 11. Februar 1869 in Elberfeld im Wuppertal. Elisabeth war mein bürgerlicher Name; aber ich war nie bürgerlich. Ich war Dichterin von Arabien, Prinzessin von Bagdad, Enkelin des Scheichs, ehemaliger Josef von Ägypten, Deuter der Ehren, Kornverweser und Liebling Pharaos. Spielen ist alles, habe ich einmal geschrieben. Und ich meinte das ernst. <span class=\"chat-source-ref\" title=\"Lasker-Schüler, Selbstzeugnis\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Lasker-Schüler, Selbstzeugnis\">Q</span>"},{"type":"learner","content":"Dichterin von Arabien, Josef von Ägypten – warum diese Rollenspiele? War das nicht Flucht vor der Wirklichkeit?"},{"type":"context","content":"Lasker-Schüler war eine Art Performance-Künstlerin, wie man heute sagen würde. Sie liebte die Maskerade, kleidete sich extravagant – glänzendes Gewand, Pluderhosen, Pagenkopf, ein kleiner Dolch am Gürtel. Die Alter Egos hatten oft biografische Wurzeln: Die Figur des Josef von Theben geht auf ihren Lieblingsbruder Paul zurück, der ihr im Alter von 13 Jahren die Geschichte von Josef und seinen Brüdern erzählt hatte – und der mit 13 starb. Der erste Verlust in einer langen Reihe."},{"type":"persona","content":"Wie meine Mutter starb, zerbrach der Mond. Das schrieb ich, als sie starb – ich war 21. Die Mutter war mir die eigentliche Dichterin. Ich war nur die Sagerin. Verlust war der Motor meines Lebens und meines Schreibens. Ich sterbe am Leben und atme im Bild wieder auf. Jedenfalls liebe ich nach meiner Sehnsucht die Leute alle zu kleiden, damit ein Spiel zustande kommt. Spielen ist keine Flucht. Es ist die einzige Art, die Wahrheit zu sagen.<br><span class=\"chat-source-ref\" title=\"Lasker-Schüler, Selbstzeugnis\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Lasker-Schüler, Selbstzeugnis\">Q</span>"},{"type":"annotation","text":"Ich habe mir nie ein System gemacht, wie es kluge Frauen tun, nie eine Weltanschauung mir irgendwo befestigt, wie es noch klügere Männer tun. Nicht eine Arche habe ich mir gezimmert. Ich bin ungebunden, überall liegt ein Wort von mir.","prompt":"Markiere, wo sich in der Selbstbeschreibung ein literarischer Anspruch zeigt.","targets":[{"word":"nie ein System","feedback":"Die Ablehnung von System und Weltanschauung ist ein programmatischer Akt. Sie stellt sich damit bewusst gegen den ordnenden, rationalen Diskurs ihrer Zeit."},{"word":"überall liegt ein Wort","feedback":"Kein Gesamtwerk, keine Geschlossenheit. Verstreutheit als poetisches Prinzip. Das Werk als Resonanz auf das vielfältige Erleben."}]},{"type":"quiz-single","question":"Welcher Epoche lässt sich Else Lasker-Schüler zuordnen?","options":[{"text":"Naturalismus","correct":false,"feedback":"Der Naturalismus beschreibt soziale Wirklichkeit nüchtern. Lasker-Schüler verwandelt Wirklichkeit in Traumwelt; das ist das Gegenteil."},{"text":"Neue Sachlichkeit","correct":false,"feedback":"Die Neue Sachlichkeit setzt auf klare Alltagssprache. Lasker-Schülers Bildsprache ist exzessiv, mythisch, alles andere als sachlich."},{"text":"Klassische Moderne / Expressionismus","correct":true,"feedback":"Richtig! Es sei jedoch davor gewarnt, sie zu eng zu etikettieren: <em>Expressionistisch</em>, dieser Stempel greift dann doch nicht. Besser ist da die <em>klassische Moderne</em>, ein offenerer Begriff einer Epoche, zu der sie allemal zählt."},{"text":"Biedermeier","correct":false,"feedback":null}]},{"type":"context","content":"Das literarische Berlin um 1900 war Lasker-Schülers Welt. Im Café des Westens – im Volksmund „Café Größenwahn\" – fand sie ihren Lieblingsschreibtisch. Sie war eine extreme Individualistin und Netzwerkerin zugleich. Ihre Lyrik ist oft dialogisch angelegt, mit einem lyrischen Ich und einem adressierten Du. Ihre Anhänger jedenfalls waren begeistert: Karl Kraus in Wien schwärmte, er würde für ein Gedicht von ihr \"den ganzen Heinrich Heine hergeben\". Peter Hille nannte sie \"den schwarzen Schwan Israels\". Gottfried Benn – zeitweilig in sie verliebt – nannte sie gar \"die größte Lyrikerin, die Deutschland je hatte\"."},{"type":"quote","text":"Deine Seele, die die meine liebet, ist verwirkt mit ihr im Teppichtibet. Strahl in Strahl verliebte Farben, Sterne, die sich himmellang umwarben. Unsere Füße ruhen auf der Kostbarkeit, Maschen tausend aber tausend weit.","source":"Else Lasker-Schüler, Ein Lied (Tibetteppich), ca. 1910"},{"type":"annotation","text":"Deine Seele, die die meine liebet, / ist verwirkt mit ihr im Teppichtibet.","prompt":"Markiere, wo sich die Bilder im Spiel mit der Sprache facettenreich irritierend aufspalten.","targets":[{"word":"verwirkt","feedback":"Das Wort spielt auf „verweben\" an; die Seelen sind wie Fäden in einem Teppich untrennbar ineinander verwoben. Ein Liebesbild, das durch den \"verwirkten\" Bruch zugleich auf Verlorenheit hinweist."},{"word":"Teppichtibet","feedback":"Der orientalische Teppich steht für kostbare Fremdheit und Schönheit, öffnet sich in Weite. Lasker-Schülers Raum ist kein ethnographischer Ort, sondern ein poetischer Sehnsuchtsraum."}]},{"type":"freetext","prompt":"Lasker-Schüler nennt sich \"Dichterin von Arabien\" und entwirft orientalische Fantasiewelten, obwohl sie in Elberfeld geboren wurde. Was könnte diese Selbstinszenierung bedeuten? Ist es Eskapismus, kreative Freiheit oder beides? Positioniere dich hinsichtlich dieser Haltung."},{"type":"persona","content":"Die große Freiheit hatte ihren Preis. Nach meiner zweiten Scheidung war ich finanziell nicht mehr abgesichert. Ich wohnte in Hotels oder schlief auf Parkbänken in Berlin. 1913 rief Karl Kraus in seiner Zeitschrift zur Spende für mich auf. Paul Klee, August Macke, Wassily Kandinsky – sie versteigerten eigene Bilder für mich. Damals brachten sie wenig ein. Dann verlor ich im Krieg Franz Marc, meinen lieben, wundervollen blauen Reiter. Und dann starb mein Sohn Paul, 28 Jahre alt, an Tuberkulose. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 11.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 11.02.2019\">Q</span>"},{"type":"context","content":"1933 übernehmen die Nationalsozialisten die Macht. Lasker-Schülers zweites Drama <em>Arthur Aronymus und seine Väter</em> steht vor der Premiere – ein Stück, das die Judenvernichtung prophezeit. Die Nazis nehmen es sofort vom Spielplan. Einige ihrer Anhänger lauern der jüdischen Dichterin auf und verprügeln sie. Mit 64 Jahren flieht sie in die Schweiz, erhält dort aber keine Arbeitserlaubnis. 1939, nach Kriegsbeginn, verweigert ihr die Schweizer Fremdenpolizei die Rückkehr. Von nun an sitzt sie in Jerusalem fest; im selbst so genannten \"Hebräerland\". Sie lebt von einer Ehrenrente, schreibt rastlos weiter und setzt sich für ein friedliches Miteinander von Juden und Arabern ein."},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Lasker-Schüler sind korrekt?","options":[{"text":"Karl Kraus nannte sie \"die stärkste und unwirksamste lyrische Erscheinung im modernen Deutschland\".","correct":true,"feedback":"Richtig! Das Zitat bündelt Bewunderung und Klage: stark in der Dichtung, aber ohne Breitenwirkung in einer \"taubstummen Zeit\"."},{"text":"Lasker-Schüler zog nie eine klare Grenze zwischen Leben und Kunst – Privates und Poetisches gingen bei ihr ineinander über.","correct":true,"feedback":"Richtig! Sie scheute sich nicht, Intimes der Öffentlichkeit preiszugeben."},{"text":"Lasker-Schüler war eine überzeugte Zionistin, die früh für einen jüdischen Staat kämpfte.","correct":false,"feedback":"Sie setzte sich in Jerusalem für ein friedliches Miteinander von Juden und Arabern ein."},{"text":"Ihr letzter Gedichtband *Mein blaues Klavier* erschien 1943 in Jerusalem und ist ihr bekanntestes Werk.","correct":true,"feedback":"Richtig! Der Band enthält das gleichnamige Gedicht, das zum Symbol für Exil, Verlust und verlorene Heimat wurde."},{"text":"Lasker-Schüler kehrte nach dem Zweiten Weltkrieg nach Berlin zurück und starb dort.","correct":false,"feedback":null}]},{"type":"persona","content":"Ich habe zu Hause ein blaues Klavier und kenne doch keine Note. Es steht im Dunkel der Kellertür, seitdem die Welt verrohte. Das blaue Klavier steht für die Poesie selbst und die Farbe Blau ist meine Farbe schlechthin, die Farbe der Dichtung. Zerbrochen ist die Klaviatur. Ich beweine die blaue Tote. Ach liebe Engel öffnet mir – ich aß vom bitteren Brote – mir lebend schon die Himmelstür, auch wider dem Verbote. Spielen war alles. Und dann war das Spielzeug kaputt. <span class=\"chat-source-ref\" title=\"Lasker-Schüler, Mein blaues Klavier, 1937/1943\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Lasker-Schüler, Mein blaues Klavier, 1937/1943\">Q</span>"},{"type":"annotation","text":"Ich habe zu Hause ein blaues Klavier / und kenne doch keine Note. / Es steht im Dunkel der Kellertür, / seitdem die Welt verrohte.","prompt":"Markiere die Kernaspekte des sprachlichen Bildes.","targets":[{"word":"blaues Klavier","feedback":"Blau ist bei Lasker-Schüler die Farbe der Poesie. Das Klavier steht für schöpferische Kraft, Kindheit und Heimat zugleich; alles, was im Exil verloren gegangen ist."},{"word":"kenne doch keine Note","feedback":"Obwohl die Dichterin das Instrument besitzt, kann sie es nicht spielen. Kreativität und Zugang zur Dichtung sind ihr abhandengekommen. Verlust und Sehnsucht liegen dicht beieinander."},{"word":"seitdem die Welt verrohte","feedback":"Die Welt ist schuld, nicht das Ich. Der Moment des Verlustes ist benennbar und hat ein Datum."}]},{"type":"barometer","statement":"Lasker-Schülers Selbstinszenierung mit Fantasierollen wie „Prinzessin von Bagdad\" ist eine angemessene künstlerische Strategie fernab von narzisstischer Spielerei.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"quiz-single","question":"Was ist das Besondere an Lasker-Schülers Farbsymbolik?","options":[{"text":"Sie benutzt Farben rein dekorativ als ästhetisches Mittel ohne Bedeutungstiefe.","correct":false,"feedback":"Im Gegenteil: bei Lasker-Schüler sind Farben immer Bedeutungsträger, nie bloße Dekoration."},{"text":"Rot ist ihre zentrale Farbe als Zeichen für Leidenschaft und politischen Aufruhr.","correct":false,"feedback":"Rot spielt bei ihr eine Rolle, aber Blau ist die zentrale Farbe ihres Werkes."},{"text":"Blau ist für sie die Farbe der Poesie schlechthin; eine Motivkonstante, die sich durch ihr gesamtes Werk zieht.","correct":true,"feedback":"Richtig! Blau gilt als Lasker-Schülers Signalfarbe, erkennbar von frühen Gedichten bis zum letzten Lyrikband."},{"text":"Sie verwendet Farben nur im Kontext des Alten Orients als ethnografische Symbole.","correct":false,"feedback":null}]},{"type":"checkpoint","question":"Erkläre in zwei bis drei Sätzen, warum der Begriff \"Expressionismus\" für Lasker-Schüler als zu eng empfunden und stattdessen \"klassische Moderne\" bevorzugt wird."},{"type":"self-assessment","items":["Ich verstehe, was Lasker-Schülers Alter Egos und Rollenspiele bedeuten","Ich kann das Gedicht Mein blaues Klavier im biografischen Kontext des Exils verstehen","Ich kenne die wichtigsten Stationen von Lasker-Schülers Leben","Ich kann die Farbsymbolik an einem Beispiel erklären"]},{"type":"persona","content":"Klein, knabenhaft schlank, pechschwarze Haare kurz geschnitten, große rabenschwarze Augen mit einem ausweichenden, unerklärlichen Blick. So beschrieb mich Gottfried Benn. Ich lebte in Cafés, auf Parkbänken, in Hotels. Ich war hoch verschuldet, zweimal geschieden, alleinerziehend, jüdisch, exzentrisch. Und ich war <em>die größte Lyrikerin, die Deutschland je hatte</em>. Dieses Kostüm passt natürlich; Spielen ist alles.<br><span class=\"chat-source-ref\" title=\"Gottfried Benn über Lasker-Schüler\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Gottfried Benn über Lasker-Schüler\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt von Lasker-Schülers Leben oder Werk hat dich am meisten überrascht oder beeindruckt?"},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du im Internet.","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/lasker-schueler-100.html"},{"label":"BR2 RadioWissen","url":"https://www.ardsounds.de/episode/urn:ard:episo
