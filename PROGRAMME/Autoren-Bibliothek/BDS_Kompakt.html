,{"type":"timeline","epochs":[{"name":"Hofmannsthals Leben","start":1874,"end":1929,"active":true,"info":"Geboren in Wien. Gestorben in Rodaun. Nur 55 Jahre alt."},{"name":"Wiener Moderne / Jugendstil","start":1890,"end":1910,"active":false,"info":"Ästhetizismus, Sprachskepsis, Subjektkrise, Verfall der k. u. k. Monarchie."},{"name":"Jahrhundertwende","start":1900,"end":1910,"active":false,"info":"Sprache, Identität und Wirklichkeit geraten in die Krise – der Chandos-Brief als literarisches Dokument."},{"name":"Erster Weltkrieg und Zwischenkriegszeit","start":1914,"end":1929,"active":false,"info":"Zerfall Österreich-Ungarns als traumatische Zäsur – Hofmannsthal antwortet mit den Salzburger Festspielen."}]},{"type":"persona","content":"Ich bin Hugo von Hofmannsthal, geboren am 1. Februar 1874 in Wien – in der prächtigen Hauptstadt eines großen Reiches, das man schon damals von innen ausbluten sehen konnte. Meine Familie lebte stilvoll, liebte Musik, umgab sich mit schönen kostbaren Dingen. Ich wuchs belesen und vielsprachig auf. Mit 16 saß ich im Café Griensteidl unter Wiener Schriftstellern – und sie staunten, dass dieser Gymnasiast jener Autor Loris sein sollte, dessen Gedichte ganz Wien begeisterten. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 01.02.2019; Stefan Zweig, Erinnerungen\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 01.02.2019; Stefan Zweig, Erinnerungen\">Q</span>"},{"type":"learner","content":"Mit 16 Jahren schon berühmt – das klingt traumhaft. War das nicht ein Vorteil?"},{"type":"context","content":"Stefan Zweig, der die Begegnung überliefert, nannte Hofmannsthals frühe Vollendung \"ein Phänomen, wie es sich innerhalb einer Generation kaum ein zweites Mal ereignet\". Doch wer als \"früh Vollendeter\" gilt, steht für immer in der Schuld gegenüber dem eigenen fulminanten Anfang. Das spätere Werk wird stets an diesem Maßstab gemessen – und das hat Hofmannsthal nicht selten unter Druck gesetzt. Von seinen frühen Arbeiten nahm er nur wenige in die Ausgaben seiner Werke auf, darunter ein einziges Gedicht, das er selbst auf Schallplatte gesprochen hat."},{"type":"persona","content":"Schön ist mein Garten mit den goldenen Bäumen, den Blättern, die mit Silbersäuseln zittern, den Diamantentau, den Wappengittern, dem Klang des Gong, bei dem die Löwen träumen. So schrieb ich damals. Perfekte Verse – und doch getränkt von jener tiefen Melancholie, die mein ganzes Werk durchziehen sollte. So etwas schreibt nur einer, dem Vergänglichkeit und Tod vertrauter Alltag sind. Wien war dafür der richtige Ort: herzzerreißend schön und leise sterbend. <span class=\"chat-source-ref\" title=\"Hofmannsthal, Gedichte\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Hofmannsthal, Gedichte\">Q</span>"},{"type":"annotation","text":"Und Kinder wachsen auf mit tiefen Augen, / die von nichts wissen, wachsen auf und sterben / und alle Menschen gehen ihre Wege.","prompt":"Markiere die Weltsicht, die sich in der Ballade des äußeren Lebens (1894) zeigt.","targets":[{"word":"tiefen Augen, die von nichts wissen","feedback":"Tiefe Augen gelten als Zeichen von Weisheit, aber hier ist es unwissendes Tiefschauen. Kindheit als Metapher für die Ahnungslosigkeit des Menschen gegenüber dem Tod."},{"word":"wachsen auf und sterben","feedback":"Kein Höhepunkt, kein Wendepunkt; das Leben reduziert sich auf Werden und Vergehen. Dazwischen liegt kein erkennbarer Sinn: Vergänglichkeit als Grundbedingung."}]},{"type":"quiz-single","question":"Welcher literarischen Strömung wird Hofmannsthals Frühwerk zugeordnet?","options":[{"text":"Expressionismus","correct":false,"feedback":"Der Expressionismus schreit und verzerrt – Hofmannsthals Jugendlyrik ist das genaue Gegenteil: verfeinert, melancholisch, ästhetisch vollkommen."},{"text":"Naturalismus","correct":false,"feedback":"Der Naturalismus beschreibt soziale Missstände mit wissenschaftlicher Nüchternheit. Hofmannsthal interessiert sich für das Innenleben und die Sprache der Schönheit."},{"text":"Wiener Moderne / Ästhetizismus","correct":true,"feedback":"Richtig! Hofmannsthal gehört zum \"Jungen Wien\" um 1890, das Schönheit als Wert an sich betrachtete und die Krise des modernen Subjekts ästhetisch verarbeitete."},{"text":"Biedermeier","correct":false,"feedback":null}]},{"type":"context","content":"Ende der 1890er Jahre – Hofmannsthal ist Mitte 20 – vollzieht sich eine entscheidende Zäsur: Er schreibt keine Lyrik mehr. Stattdessen denkt er über die Grenzen von Sprache nach, über die scheinbar verlorene Sicherheit, Dinge und Gedanken überhaupt benennen zu können. Das Ergebnis ist der Chandos-Brief von 1902: ein fiktives Schreiben des Lord Chandos an den Philosophen Francis Bacon, in dem Chandos erklärt, warum er aufgehört hat zu schreiben. Die Sprache selbst ist ihm unbrauchbar geworden. Worte sind leer, Begriffe versperren den Zugang zur Wirklichkeit. Der Chandos-Brief ist ein virtuoses Dokument, das die Möglichkeiten der Literatur testet und in ihrer Begrenztheit sichtbar macht."},{"type":"quote","text":"Es ist mir völlig die Fähigkeit abhanden gekommen, über irgendetwas zusammenhängend zu denken oder zu sprechen. Es zerfiel mir alles in Teile, die Teile wieder in Teile und nichts mehr ließ sich mit einem Begriff umspannen. Die einzelnen Worte schwammen um mich; sie wurden zu Wirbeln, durch die hindurch man ins Leere kommt.","source":"Hugo von Hofmannsthal, Ein Brief (Chandos-Brief), 1902"},{"type":"annotation","text":"Es zerfiel mir alles in Teile, die Teile wieder in Teile.","prompt":"Markiere, worin sich hier die Sprachkrise zeigt.","targets":[{"word":"zerfiel","feedback":"Das Zerfallen ist kein aktiver Akt; die Sprache zerbricht von selbst. Das Subjekt ist passiv, ausgeliefert. Eine moderne Krise."},{"word":"ins Leere","feedback":"Eine kommunikationslose Sprache, die nicht zu den Dingen führt, sondern an ihnen vorbei, ist die Urangst der Moderne: dass unsere Zeichen nichts bezeichnen."}]},{"type":"freetext","prompt":"Sammle, in welchen Situationen du selbst das Gefühl hast, dass Worte versagen."},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über den Chandos-Brief sind korrekt?","options":[{"text":"Der Chandos-Brief erschien 1902 und markiert Hofmannsthals Abkehr von der Lyrik.","correct":true,"feedback":"Richtig! Nach diesem Text schrieb Hofmannsthal keine Gedichte mehr."},{"text":"Lord Chandos ist eine fiktive Figur, die an den realen Philosophen Francis Bacon schreibt.","correct":true,"feedback":"Richtig! Hofmannsthal verschleiert den autobiografischen Bezug durch die historische Fiktion, macht ihn aber für aufmerksame Leser transparent."},{"text":"Im Chandos-Brief findet Chandos am Ende eine neue Sprache und schreibt wieder.","correct":false,"feedback":"Nein; die Konsequenz für Chandos ist, das Schreiben ganz aufzugeben und auf eine neue, stumme Sprache zu hoffen."},{"text":"Der Brief gilt als eines der wichtigsten Dokumente der Sprachkrise um 1900.","correct":true,"feedback":"Richtig! Er bündelt die Verunsicherung der Moderne gegenüber Sprache, Subjekt und Wirklichkeit auf engem Raum."},{"text":"Hofmannsthal schrieb den Chandos-Brief als politische Reaktion auf den Ersten Weltkrieg.","correct":false,"feedback":null}]},{"type":"persona","content":"Nach dem Chandos-Brief wandte ich mich dem Theater zu. Ich arbeitete unaufhörlich, wie getrieben. Dutzende Projekte liefen parallel. Ich war kein guter Erfinder, sondern ein großer und unendlich gebildeter Leser in sehr vielen Sprachen und Kulturen. Ich nahm mir Sophokles, Calderón, mittelalterliche Mysterienspiele vor und machte daraus etwas Neues. Als Richard Strauss meine Elektra auf der Bühne sah, wusste er: Vieles, was ich in aller Einsamkeit der Jugend hervorgebracht hatte, waren fantastische kleine Opern und Singspiele ohne Musik; durch seine Wünsche war nun ein Ziel gegeben. <span class=\"chat-source-ref\" title=\"Hofmannsthal\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Hofmannsthal\">Q</span>"},{"type":"context","content":"Die Zusammenarbeit mit dem Komponisten Richard Strauss und dem Regisseur Max Reinhardt wurde zu einer der fruchtbarsten Künstlerpartnerschaften der Epoche. Aus dem Dialog mit Strauss entstanden Libretti, die zum Vollkommensten der Opernliteratur zählen: Elektra (1909), Der Rosenkavalier (1911), Ariadne auf Naxos (1912), Die Frau ohne Schatten (1919), Arabella (posthum 1933). Mit Reinhardt gründete Hofmannsthal 1920 die Salzburger Festspiele als kulturelle Antwort auf den Zusammenbruch Österreich-Ungarns und den Hass des Nationalismus. Im Zentrum: der Jedermann, seit 1920 alljährlich auf dem Salzburger Domplatz aufgeführt."},{"type":"quiz-single","question":"Warum gründeten Hofmannsthal, Strauss und Reinhardt 1920 die Salzburger Festspiele?","options":[{"text":"Um Wien als Hauptstadt der deutschsprachigen Oper zu stärken.","correct":false,"feedback":"Die Festspiele waren bewusst nicht in Wien angesiedelt und ihre Intention war weiter gefasst als Opernpflege."},{"text":"Als kommerzielles Touristikprojekt für die Nachkriegszeit.","correct":false,"feedback":"Im Gegenteil: Hofmannsthal sah die Festspiele als kulturelles Gegenprogramm zu Nationalismus und Zerstörung."},{"text":"Als Rückbesinnung auf gemeinsame europäische Wurzeln und ein menschenverbindendes Ethos nach dem Ersten Weltkrieg.","correct":true,"feedback":"Richtig! Für Hofmannsthal war der Vielvölkerstaat Österreich-Ungarn eine Blaupause für ein geeintes Europa gewesen, die Festspiele sollten diesen Geist retten."},{"text":"Weil der Jedermann in Berlin verboten worden war.","correct":false,"feedback":null}]},{"type":"barometer","statement":"Hofmannsthals Frage, ob Sprache die Wirklichkeit überhaupt erfassen kann, ist heute aktueller denn je.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"persona","content":"Der Erste Weltkrieg hat mich vernichtet – innerlich. Das grausame Schlachten, dann der Zusammenbruch der Donaumonarchie. Ich wusste, dass die Welt, die mich geprägt hatte, unwiderruflich verloren war. Ich schrieb dagegen an, mit zunehmender Melancholie. Was frommt das alles uns und diese Spiele, die wir doch groß und ewig einsam sind und wandernd nimmer suchen irgend Ziele. Am 13. Juli 1929 erschoss sich mein ältester Sohn Franz. Zwei Tage später, als die Familie sich für die Beisetzung fertig machte, brach ich zusammen. Schlaganfall. Wenige Stunden später war auch ich tot. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 01.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 01.02.2019\">Q</span>"},{"type":"checkpoint","question":"Erkläre die These, Hofmannsthal habe in seinem Werk den Krisen Gehör verschafft."},{"type":"self-assessment","items":["Ich verstehe, was mit der \"Sprachkrise um 1900\" gemeint ist","Ich kann Hofmannsthals Entwicklung von der Lyrik zum Theater erklären","Ich kenne den Chandos-Brief und seine zentrale Aussage","Ich kann Hofmannsthal im Kontext der Wiener Moderne und des Zerfalls Österreich-Ungarns einordnen"]},{"type":"persona","content":"Ich war ein großer und unendlich gebildeter Leser. Kein guter Erfinder vielleicht. Aber ich hatte Antennen für die feinsten Verästelungen der zeitgenössischen Wahrnehmungen. Für diese Erosionen, diese Verstörungen, diese Brüche. Und ich habe daraus Texte gemacht, die mitunter Fragment blieben, weil die Wirklichkeit ja auch selbst Fragment blieb. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 01.02.2019\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 01.02.2019\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt von Hofmannsthals Leben oder Werk hat dich am meisten überrascht oder beeindruckt?"},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du im Internet.","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/von-hofmannsthal-100.html"},{"label":"Wikipedia","url":"https://d n_Eichendorff_(1841).jpg', theme: 'sebastian-wolf', modules: [{"type":"framing","content":"Du triffst gleich auf Joseph Karl Benedikt Freiherr von Eichendorff – oder besser: auf eine Konstruktion, die so spricht, wie er geschrieben hat. Eichendorff selbst ist 1857 in Neiße gestorben. Was du hier liest, basiert auf seinen Texten, Gedichten und Briefen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Befreiungskriege","start":1813,"end":1815,"active":false,"info":"Nationalpatriotische Aufbruchsstimmung gegen Napoleon."},{"name":"Spätromantik","start":1815,"end":1848,"active":false,"info":"Sehnsucht, Wandermotiv, Naturmystik, religiöse Tiefe."},{"name":"Revolution","start":1848,"end":1849,"active":false,"info":"Eichendorff lehnt Volksaufstände und Militärreaktion gleichermaßen ab."},{"name":"Eichendorffs Leben","start":1788,"end":1857,"active":true,"info":"Geboren auf Schloss Lubowitz in Schlesien. Gestorben in Neiße."}]},{"type":"persona","content":"Guten Tag! Ich bin Joseph Freiherr von Eichendorff, geboren am 10. März 1788 auf Schloss Lubowitz in Schlesien. Schlesien... das klingt weit weg, und das war es dann auch wirklich. Du liest meine Gedichte in der Schule? Das freut mich und wundert mich zugleich. Denn ich schrieb sie eigentlich nicht für Lehrpläne, sondern gegen die Stille des Beamtendaseins. Taugenichts bin ich selbst manchmal gewesen... zumindest im Herzen. <span class=\"chat-source-ref\" title=\"vgl. WDR Zeitzeichen, 10.03.2018\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. WDR Zeitzeichen, 10.03.2018\">Q</span>"},{"type":"learner","content":"Du warst Beamter? Ich dachte, du bist Dichter?"},{"type":"context","content":"Nach dem Bankrott seines Vaters wurde das Familiengut Lubowitz zwangsversteigert. Der Verlust des schlesischen Stammschlosses war für Eichendorff eine prägende, ja traumatische Erfahrung. Um sich zu finanzieren, musste er gemeinsam mit seinem Bruder eine Beamtenlaufbahn einschlagen. Als strenggläubiger Katholik hatte er im protestantischen Preußen kaum Aufstiegschancen. Die Beamtenstellen in Danzig, Königsberg und schließlich Berlin blieben bescheiden. Zeitlebens begleitete ihn die Verlusterfahrung der eigenen Heimat. So wurde die Sehnsucht nach dem Verlorenen zum eigentlichen Motor seines Schreibens."},{"type":"persona","content":"Ich habe wenig Geld, wenig Protektion, wenig Konnässons, Liasons, Savoir Vivre und anderen solchen Teufelsdreck. Und wenn mich meine brave Frau nicht noch stark, frisch und frei erhielt, wäre ich längst schon fortgelaufen. So schrieb ich es einmal nieder. Ganz ehrlich. Ich bin Beamter nur am Tage, aber ein Dichter in der Dämmerung. Mit Vorliebe schreibe ich spätabends oder im Morgengrauen, wenn die Welt noch nicht vollständig wach und laut war. <span class=\"chat-source-ref\" title=\"Eichendorff, Briefe\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Eichendorff, Briefe\">Q</span>"},{"type":"learner","content":"Diese Sehnsucht; wonach hat Eichendorff sich eigentlich gesehnt? Seine Heimat?"},{"type":"context","content":"Eichendorffs Sehnsucht richtet sich auf kein konkretes Ziel. Rüdiger Safranski, Autor des Buches „Romantik – eine deutsche Affäre\", betont, dass Eichendorff den romantischen Topos des Wanderns, des Unterwegsseins und des Aufbruchs wie kein anderer ausgeformt und in Sprache übersetzt hat. <br>Diese Sehnsucht ist von vornherein als etwas Unerfüllbares angelegt. Es geht Eichendorff nicht darum, wirklich nach Lubowitz zurückzukehren, sondern darum, dass die Sehnsucht selbst der Antrieb bleibt. Solange man sich nach Verlorenem sehnt, kann man immer weiter schreiben."},{"type":"persona","content":"Kein Dichter gibt einen fertigen Himmel. Er stellt nur die Himmelsleiter auf von der schönen Erde. So schrieb ich es in meinem ersten Roman Ahnung und Gegenwart. Wir müssen streben, Mühsal auf uns nehmen, leben. Ich wollte nie ankommen; auch nicht als Dichter, denn wer ankommt, der hat aufgehört zu suchen. Die Sehnsucht ist keine Schwäche. Sie ist das Menschlichste, was wir haben. Und diese ewige Suche ist doch etwas zutiefst Romantisches. <span class=\"chat-source-ref\" title=\"Ahnung und Gegenwart, 1815\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Ahnung und Gegenwart, 1815\">Q</span>"},{"type":"annotation","text":"Und meine Seele spannte / weit ihre Flügel aus, / flog durch die stillen Lande, / als flöge sie nach Haus.","prompt":"Markiere die romantischen Motive im Auszug aus dem Gedicht \"Mondnacht\" (1837).","targets":[{"word":"Seele","feedback":"Die Seele als handelndes Subjekt ist ein Kernmotiv der Romantik. Erst die offene Wahrnehmung des Inneren erlaubt eine Transzendenzerfahrung."},{"word":"nach Haus","feedback":"Dieses \"Haus\" meint kein konkretes Zuhause, sondern eine transzendente Heimat; das Unendliche, das Göttliche."}]},{"type":"quiz-single","question":"Was ist das zentrale Motiv in Eichendorffs Lyrik?","options":[{"text":"Politischer Protest gegen Fürsten und Adel","correct":false,"feedback":"Das ist eher Heines Terrain. Eichendorff kritisiert seine Zeit, aber nicht in Form direkten politischen Protests."},{"text":"Die unerfüllbare Sehnsucht nach einer verlorenen Heimat und Geborgenheit","correct":true,"feedback":"Genau! Eichendorffs Schreiben kreist um eine Sehnsucht, die absichtlich kein Ziel findet; sie ist Motor, nicht Problem."},{"text":"Die ironische Brechung romantischer Klischees","correct":false,"feedback":"Das ist ein Merkmal Heines. Eichendorff arbeitet mit romantischen Motiven, ohne sie zu ironisieren."},{"text":"Die nüchterne Beschreibung der industriellen Moderne","correct":false,"feedback":"Im Gegenteil: Die Moderne bedeutet für Eichendorff Verlust. Ein wohlwollendes Aufgreifen als Thema liegt ihm fern."}]},{"type":"quote","text":"Es war, als hätt' der Himmel<br>die Erde still geküsst,<br>dass sie im Blütenschimmer<br>von ihm nun träumen müsst.","source":"Joseph von Eichendorff, Mondnacht (1837)"},{"type":"learner","content":"Deine Gedichte wurden so oft vertont. War das geplant oder kommerzielle Absicht?"},{"type":"context","content":"Über 5000 Vertonungen von Eichendorffs Gedichten sind dokumentiert – eine außergewöhnliche Zahl. Es liegt wohl daran, dass diese Texte bereits in sich „liedhaft\" sind: rhythmisch fließend, klanglich weich, mit natürlichen Melodiebogen. Komponisten wie Robert Schumann und Franz Schubert schufen kongenialen Übersetzungen dieser Texte. Dabei hatten diese Vertonungen oft ein feines Gespür für das Abgründige in Eichendorffs Texten; denn so leicht und einfach, wie sie auf den ersten Blick erscheinen, sind sie nicht."},{"type":"persona","content":"Ich höre die Bächlein rauschen im Walde her und hin, im Walde in dem Rauschen, ich weiß nicht, wo ich bin... Das klingt einfach, nicht wahr? Aber ich rang um jedes Wort. Merkst du, was darunter liegt? Das lyrische Ich weiß nicht, wo es ist. Es verliert sich. Die Natur ist kein gemütlicher Hintergrund, sondern ein Raum, in dem man sich auflösen kann oder auflösen muss, sich verliert. Das Angenehme und das Beunruhigende liegen dicht beieinander. <span class=\"chat-source-ref\" title=\"Eichendorff, In der Fremde I\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Eichendorff, In der Fremde I\">Q</span>"},{"type":"learner","content":"Und dein <em>Taugenichts</em> – bist du das selbst?"},{"type":"persona","content":"Ha! Nun sagte ich, wenn ich ein Taugenichts bin, so ist es gut, so will ich in die Welt gehen und mein Glück machen. Ich gebe zu: Manches von mir steckt vielleicht wirklich in dieser Figur. Der Taugenichts ist das Gegenbild zum Beamten, zum Bürger, zum Philister. Er fragt nicht nach Nützlichkeit. Er wandert, spielt Musik und verlässt sich auf Gottes Fügung. Das ist eine Provokation und auch eine Sehnsucht. <span class=\"chat-source-ref\" title=\"Aus dem Leben eines Taugenichts, 1826\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Aus dem Leben eines Taugenichts, 1826\">Q</span>"},{"type":"context","content":"\"Aus dem Leben eines Taugenichts\" (1826) ist Eichendorffs bekannteste Prosaarbeit und gilt als Aushängeschild der deutschen Romantik. Ein Müllersohn – von seinem Vater als <em>Taugenichts</em> bezeichnet – zieht mit seiner Geige in die Welt, verliebt sich in eine Schlossdame, reist nach Italien und findet am Ende durch glückliche Fügungen sein Glück. Der Text ist einer der wenigen Eichendorffs mit einem Ich-Erzähler; das ermöglicht eine besonders direkte Identifikation. Zugleich ist der Text satirischer als er scheint: Eichendorff verspottet darin den Philister und das kleinbürgerliche Eheglück mit ironischem Augenzwinkern."},{"type":"annotation","text":"Mit seiner Geige wandert der Müllerssohn in den Süden. In der Nähe Wiens verliebt er sich Hals über Kopf in eine Schlossdame. Sie scheint für ihn unerreichbar zu sein.","prompt":"Markiere die in dieser Beschreibung des Handlungsauftakts erkennbaren romantischen Grundmotive.","targets":[{"word":"Wandern","feedback":"Das Wandermotiv ist das romantische Gegenbild zur bürgerlichen Sesshaftigkeit. In ihm zeigt sich Aufbruch als Lebenshaltung."},{"word":"unerreichbar","feedback":"Die unerreichbare Geliebte ist ein klassisch romantisches Motiv. Die Sehnsucht wirkt als treibende Kraft, nicht erfüllte Liebe."}]},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über den Taugenichts sind korrekt?","options":[{"text":"Der Taugenichts wird von seinem Vater aus dem Haus geschickt und zieht mit einer Geige in die Welt.","correct":true,"feedback":"Richtig! Der Aufbruch ist unfreiwillig, aber der Taugenichts macht das Beste daraus."},{"text":"Der Taugenichts ist ein verbitterter Gesellschaftskritiker, der das Bürgertum offen angreift.","correct":false,"feedback":"Nicht ganz; er spottet über Philister, aber aus naiver Fröhlichkeit, nicht aus bitterer Kritik."},{"text":"Der Text ist satirischer und ironischer, als er auf den ersten Blick wirkt.","correct":true,"feedback":"Genau! Eichendorff untergräbt mit feinem Augenzwinkern die Idylle, die er selbst aufbaut."},{"text":"Der Taugenichts erschien erstmals 1815 gemeinsam mit Ahnung und Gegenwart.","correct":false,"feedback":null}]},{"type":"persona","content":"Man sagt mir nach, ich sei ein reaktionärer Heimatdichter gewesen. Das ärgert mich. Als Napoleon Europa überrollte, meldete ich mich 1813 freiwillig zum Befreiungskrieg. Und als 1848 die Revolution ausbrach und dann das Militär die Aufstände niederschlug, schrieb ich: Das Pöbelregiment ist dumm, das Säbelregiment noch dümmer und so ärgere ich mich, ich mag mich stellen wie ich will, täglich tausendmal. Ich war kein einfacher Konservativer. Ich war ein Mensch, der seine Zeit sehr genau beobachtete und oft verzweifelte. <span class=\"chat-source-ref\" title=\"Eichendorff, Briefe, 1848\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Eichendorff, Briefe, 1848\">Q</span>"},{"type":"freetext","prompt":"Eichendorff lehnt 1848 sowohl den Volksaufstand als auch die militärische Reaktion ab. Was sagt das über seine politische Haltung aus? Lässt sie sich eindeutig einordnen? Charakterisiere Eichendorffs Position."},{"type":"context","content":"Eichendorff starb 1857 und damit mitten in der Epoche des Realismus. Man könnte das als \"Gleichzeitigkeit des Ungleichzeitigen\" beschreiben: 1857 war der Realismus längst etabliert, die Restaurationsepoche bereits Geschichte und Eichendorff schrieb noch immer romantische Texte. Das trug ihm Spott und Ablehnung ein. Als Spätromantiker war er seltsam aus der Zeit gefallen. Zugleich scheinen uns Eichendorffs Themen heute bemerkenswert zeitlos: Das Gefühl von Ordnungsverlust, die Frage nach gesellschaftlichem Zusammenhalt, die Erosion sozialer Strukturen sind Erfahrungen, die auch das 21. Jahrhundert kennt."},{"type":"barometer","statement":"Eichendorffs Sehnsucht nach dem Verlorenen ist heute noch genauso verständlich wie 1820.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"quiz-single","question":"In welchem Jahr starb Eichendorff und was macht das biografisch besonders?","options":[{"text":"1835 – mitten in der Hochromantik","correct":false,"feedback":"Zu früh. Eichendorff lebte noch mehr als zwanzig Jahre länger."},{"text":"1848 – im Revolutionsjahr","correct":false,"feedback":"Nein, aber 1848 war ein wichtiges Jahr für ihn: Er kritisierte sowohl Revolution als auch Militärreaktion."},{"text":"1857 – ein Romantiker im Realismus","correct":true,"feedback":"Richtig! Das macht ihn zum \"aus der Zeit gefallenen Spätromantiker\", denn er schrieb gegen den Zeitgeist."},{"text":"1813 – gefallen im Befreiungskrieg gegen Napoleon","correct":false,"feedback":"Nein, er überlebte den Krieg und schrieb danach noch Jahrzehnte lang."}]},{"type":"checkpoint","question":"Heute gelten Eichendorffs Themen als zeitlos. Erkläre, warum Eichendorffs Sehnsucht eine <strong>produktive Unerfüllbarkeit</strong> ist."},{"type":"self-assessment","items":["Ich verstehe, warum Eichendorffs Sehnsucht kein konkretes Ziel hat","Ich kann den Taugenichts als romantische Gegenfigur zum bürgerlichen Philister beschreiben","Ich kenne mindestens drei wichtige Werke Eichendorffs","Ich kann erklären, was mit \"Spätromantik\" gemeint ist"]},{"type":"persona","content":"Ich war kein Revolutionär. Ich war kein Nationalist. Ich war ein Beamter, der abends dichtete, ein Schlesier in Berlin, ein Katholik im protestantischen Preußen, ein Romantiker im Zeitalter des Realismus. Vielleicht liegt darin meine Modernität: Ich habe immer irgendwo nicht hingepasst. Und ich habe aus diesem Gefühl Literatur gemacht. <span class=\"chat-source-ref\" title=\"vgl. Rüdiger Safranski, Romantik – eine deutsche Affäre\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: vgl. Rüdiger Safranski, Romantik – eine deutsche Affäre\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt von Eichendorffs Leben oder Werk hat dich am meisten überrascht oder beeindruckt?"},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du im Internet.","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/freiherr-von-eichendorff-100.html"},{"label":"BR2 RadioWissen","url":"https://www.ardsounds.de/episode/urn:ard:episode:e7a56ec4bbb344be/"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Joseph_von_Eichendorff"}],"literature":["Rüdiger Safranski: Romantik – eine deutsche Affäre. Hanser, München 2007.","Hartwig Schultz: Joseph von Eichendorff. Reclam, Stuttgart 2007."]}] }, 'epochenchat_mascha_kal_ko': { name: 'Mascha Kaléko', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD2aQ4Y/Wo81JJ94/WoSSBmgAaVY0ZyQFAySTjFYGpeKdN0tWM10N+0kLyCccd/f2qTV9Vt4S0TuqShSSrjgj1/nXz9448QC4v5grxvMHwcDO3r7YOOOT7CgDf8YfFu8vi9jZeXHCG+dlO7J9jgYrg73xbfTqUimkRWUKctuOB29P071zpJJyaQ8mgDQh1W9SRnS5lLtyxLE5+vrXpfg3XNfttPku11GSNcZ8sgPkD2PavJASpFddpvjH+z9LjtkiBZRtO7uOv9Mf5NAHuul/FTw7PGsOpX8dtdKuXLKQjH26/l7GuptNV07UkDWd3DNnoFbn8utfLFjZW2u6kDHMscrtuMT9Dz0HNdbf6nL4d8R2Npp7MqCNAVViOSepwfTFAHuWpLmBselc5p0ZW6Y44J61p2uqf2jphEuBcRr8+Dwfeq9rFiQYPvQBtW6ZAq9GtVYBgc1ejXIFAFmFPmTnuKKfAPmX6iigBj53H61E4JBAOKlc/MfrTOpoA8h+IzvZ/6d9tc7GeMYK/J9B3z05PpXgc8jSXDuzEsSSST1r3z Kalékos Berliner Erfolgsphase."},{"name":"Exil","start":1938,"end":1975,"active":false,"info":"Flucht vor den Nationalsozialisten nach New York, später Jerusalem. Nie wirklich angekommen."},{"name":"Kalékos Leben","start":1907,"end":1975,"active":true,"info":"Geboren in Galizien. Gestorben in Zürich. Eine ewige Emigrantin."}]},{"type":"persona","content":"Ich bin Mascha Kaléko, geboren am 7. Juni 1907 in Galizien im Süden Polens als uneheliches jüdisches Kind eines russischen Kaufmanns und einer österreichischen Mutter ohne Beruf. Mein meist gesprochenes Wort als Kind war <em>nein</em>. Ich war lebhaft, aufsässig, mutig. Ein Wildfang, sagten sie. Diese Heimatlosigkeit begann damals und hat mich nie verlassen. Die Fremde ist ein kaltes Kleid mit einem engen Kragen. Ich habe es mit meinem Koffer oft im Leben schon getragen. <span class=\"chat-source-ref\" title=\"Kaléko, Gedichte\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Kaléko, Gedichte\">Q</span>"},{"type":"learner","content":"Woher kam das Schreiben bei dir? Wann hast du angefangen?"},{"type":"context","content":"Als 1914 russische Truppen in Polen einmarschierten, floh die Familie. Der Vater wurde in Frankfurt als \"feindlicher Ausländer\" eingesperrt. Weiter nach Marburg, dort schrieb Mascha die ersten Gedichte und wollte ihrer Lehrerin für das Zuhören Kuchen spendieren. Nach dem Ersten Weltkrieg zog die Familie nach Berlin. Dort arbeitete die junge Kaléko acht Stunden täglich als Büroangestellte und schrieb abends Gedichte. Eines Tages schickte sie ein Gedicht, das ihr zu schade für den Papierkorb schien, an die Vossische Zeitung, die wichtigste Berliner Tageszeitung. Es wurde wenige Tage später abgedruckt."},{"type":"persona","content":"Acht Stunden bin ich dienstlich angestellt und tue eine schlecht bezahlte Pflicht. Am Abend schreibe ich manchmal ein Gedicht. Mein Vater meint, das habe noch gefehlt. Bei schönem Wetter reise ich ein Stück per Bleistift auf der bunten Länderkarte. An stillen Regentagen aber warte ich manchmal auf das sogenannte Glück. So umschrieb ich seltsame Tage. Und das Glück kam, weil ich es nicht abgewartet, sondern einfach abgeschickt hatte.<br><span class=\"chat-source-ref\" title=\"Kaléko, Gedichte\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Kaléko, Gedichte\">Q</span>"},{"type":"annotation","text":"8 Stunden bin ich dienstlich angestellt / und tue eine schlecht bezahlte Pflicht. / Am Abend schreibe ich manchmal ein Gedicht.","prompt":"Markiere, worin man die Neue Sachlichkeit entdecken kann.","targets":[{"word":"8 Stunden","feedback":"Eine konkrete Zahl statt romantischer Vagheit; die Arbeitswelt der Weimarer Republik tritt direkt ins Gedicht ein. Kein lyrisches Ich auf dem Berggipfel, sondern am Schreibtisch."},{"word":"schlecht bezahlte Pflicht","feedback":"Das Adjektiv \"schlecht bezahlt\" klingt prosaisch, fast bürokratisch. Kaléko ironisiert das Bürgerideal der Pflichterfüllung."}]},{"type":"quiz-single","question":"Welcher Epoche und welchem Stil wird Kalékos Berliner Frühwerk zugeordnet?","options":[{"text":"Expressionismus","correct":false,"feedback":"Der Expressionismus schreit und verzerrt, Kaléko schreibt klar, nah, alltagsbezogen. Der Ton ist ganz anders."},{"text":"Romantik","correct":false,"feedback":"Die Romantik sehnt sich nach dem Fernen und Irrationalen. Kaléko beschreibt das ganz Nahe: Büro, Liebe, Alltag."},{"text":"Neue Sachlichkeit","correct":true,"feedback":"Richtig! Kaléko war die einzige Frau im Kreis der Autoren der Neuen Sachlichkeit. Ihre Biografen vergleichen sie gerne mit Kästner, Ringelnatz und Heine, betonen aber, dass sie einen eigenen, unverwechselbaren Stil entwickelt hat."},{"text":"Biedermeier","correct":false,"feedback":null}]},{"type":"context","content":"Im Romanischen Café in Berlin traf Kaléko die männlichen Kollegen der Neuen Sachlichkeit. Ihr erster Gedichtband Das lyrische Stenogrammheft erschien im Januar 1933; just als die Nationalsozialisten die Macht übernahmen. Ein denkbar ungünstiger Zeitpunkt für eine beginnende Dichterinnen-Karriere. Und doch: Die Gedichte trafen den Ton der Zeit, die Menschen erkannten sich darin wieder. Kaléko nannte ihre Kunst selbst bescheiden „Gebrauchslyrik\" – zur täglichen Anwendung, eine tröstliche Stimme des Alltags."},{"type":"freetext","prompt":"Kaléko nennt ihre Gedichte \"Gebrauchslyrik\". Sie scheinen einfach, aber sie sind nicht simpel. Was ist der Unterschied zwischen simpel und einfach; und warum ist dies in der Lyrik entscheidend? Erkläre."},{"type":"persona","content":"Wie Janus zeigt zuweilen mein Gedicht seines Verfassers doppeltes Gesicht. Die eine Hälfte des Gesichts ist lyrisch. Die andere hingegen fast satirisch. Denn was einst war, das stimmt uns meistens lyrisch, doch das was ist zum großen Teil satirisch. Das <em>Januskript</em> ist das Motto meiner Mimikry. Ein zweiter Boden, der nicht obenliegt, aber da ist. Für die, die suchen. <span class=\"chat-source-ref\" title=\"Kaléko, Quasi ein Januskript\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Kaléko, Quasi ein Januskript\">Q</span>"},{"type":"annotation","text":"Denn was einst war, das stimmt uns meistens lyrisch, / doch das, was ist, zum großen Teil satirisch.","prompt":"Markiere die Gegensätzlichkeit, die ihre literarische Haltung zeigt.","targets":[{"word":"was einst war","feedback":"Die Vergangenheit wird in der Erinnerung verklärt als lyrischer Reflex."},{"word":"was ist","feedback":"Die Gegenwart ruft nach kritischer Distanz. Satire ist Bewältigungsstrategie. Man lacht, weil man sonst weinen müsste."}]},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Kalékos Stil sind korrekt?","options":[{"text":"Ihre Gedichte wirken einfach, haben aber oft einen zweiten Boden mit literarischen, religiösen und philosophischen Bezügen.","correct":true,"feedback":"Richtig! Es ist spannend, den Unterbau zu entdecken."},{"text":"Kaléko war die einzige Frau im Kreis der Autoren der Neuen Sachlichkeit.","correct":true,"feedback":"Richtig! Sie bewegte sich in einer rein männlich dominierten literarischen Szene und entwickelte darin einen eigenständigen Stil."},{"text":"Kaléko schrieb hauptsächlich politische Kampflyrik gegen den Nationalsozialismus.","correct":false,"feedback":"Ihre Stärke lag im persönlichen, alltäglichen Ton. Die politische Dimension ist oft indirekt, eingewoben, nicht konfrontativ."},{"text":"Kalékos bekanntestes Gedicht ist eine politische Satire auf Hitler.","correct":false,"feedback":null}]},{"type":"persona","content":"1938 emigrierte ich in letzter Minute mit meinem zweiten Mann Chemjo Vinaver und unserem Sohn nach Amerika. Nun habe ich selbst ein Emigrantenkind, das lernt das Wörtchen Alien buchstabieren und spricht zur Mutter: Don't speak German, dear. Grad wie das Flüchtlingskind beim Rektor Mai; er denkt, was ich in seinem Alter dachte, dass wenn die Kriege aus sind, Frieden sei. Geschichte wiederholt sich. Nur die Namen ändern sich.<br><span class=\"chat-source-ref\" title=\"Kaléko, Gedichte\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Kaléko, Gedichte\">Q</span>"},{"type":"context","content":"In New York blieb Kaléko im Schatten ihres Mannes, eines Musikers und Chorleiters. Ihre eigene kreative Arbeit stellte sie hinten an. In Amerika kannte sie kaum jemand. Aus der gefeierten Berliner Dichterin war „Mrs. Wiener\" geworden. 1956 legte Ernst Rowohlt ihre Gedichtbände neu auf. Kaléko reiste zur Buchpräsentation nach Deutschland. Sie wurde begeistert empfangen. Und doch kehrte sie nicht zurück. Stattdessen folgte sie ihrem Mann nach Jerusalem. Als ihr Sohn Steven 1968 überraschend in New York starb, war es ihr Mann, der sie zusammenhielt. Fünf Jahre später verlor sie auch ihn."},{"type":"quote","text":"Vor meinem eigenen Tod ist mir nicht bang, nur vor dem Tode derer, die mir nah sind. Wie soll ich leben, wenn sie nicht mehr da sind? Allein im Nebel tast ich todentlang und lass mich willig in das Dunkel treiben. Das Gehen schmerzt nicht halb so wie das Bleiben. Bedenkt: den eigenen Tod, den stirbt man nur, doch mit dem Tod der andern muss man leben.","source":"Mascha Kaléko, Memento (1944/45)"},{"type":"annotation","text":"Den eigenen Tod, den stirbt man nur, / doch mit dem Tod der andern muss man leben.","prompt":"Markiere Stellen, die die Absurdität der Todesangst deutlich machen.","targets":[{"word":"den eigenen Tod, den stirbt man nur","feedback":"Sterben ist eine einmalige, abgeschlossene Handlung. Man stirbt und ist fertig. Das \"nur\" klingt fast wie Erleichterung."},{"word":"mit dem Tod der andern muss man leben","feedback":"Weiterleben führt zu Schmerz. Das Verb \"muss\" zeigt: Es ist kein Trost, es ist eine Zumutung. Kaléko schrieb das 1944, noch ohne die persönlichen Verluste, aus reiner emotionaler Empathie, die später zur erschütternden Prophezeiung wurde."}]},{"type":"barometer","statement":"Den eigenen Tod stirbt man nur, doch mit dem Tod der andern muss man leben. Dieser Satz trifft etwas Wahres.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"quiz-single","question":"Wann schrieb Kaléko ihr bekanntestes Gedicht Memento und was macht das besonders?","options":[{"text":"1968, nach dem Tod ihres Sohnes Steven","correct":false,"feedback":"Das Gedicht war da längst geschrieben. Kaléko setzte es dann jedoch über die Todesanzeige ihres Sohnes als erschütternde Wiederholung."},{"text":"1975, kurz vor ihrem eigenen Tod in Zürich","correct":false,"feedback":"Nein. Memento entstand Jahrzehnte früher."},{"text":"1944 im Exil in New York, noch bevor sie selbst diese Verluste erlebte","correct":true,"feedback":"Richtig! Das Gedicht zeigt Kalékos außerordentliche Empathie. Sie schrieb über Gefühle, die sie damals noch nicht selbst erlebt hatte, und traf damit dennoch etwas universell Menschliches."},{"text":"1933, als Reaktion auf die Machtergreifung der Nationalsozialisten.","correct":false,"feedback":null}]},{"type":"checkpoint","question":"Erkläre in zwei bis drei Sätzen, was Kaléko mit ihrem Begriff \"Gebrauchslyrik\" meint und warum ihre Gedichte trotz Schlichtheit nicht simpel sind."},{"type":"self-assessment","items":["Ich verstehe, was Kaléko mit \"Gebrauchslyrik\" und dem \"Januskript\" meint","Ich kann Kalékos Biografie als Geschichte mehrfacher Heimatlosigkeit beschreiben","Ich kenne Memento und seinen biografischen Kontext","Ich kann Kaléko in die Neue Sachlichkeit einordnen und ihren Stil umschreiben"]},{"type":"persona","content":"Meine einzige Heimat, schrieb ich einmal, war die Liebe. Nicht Berlin, nicht New York, nicht Jerusalem. Die Liebe. Ich habe mit meinem Koffer oft im Leben die Fremde getragen. Am Ende starb ich heimatlos, in Zürich, auf der Durchreise. Als ob ich einfach nicht ankommen sollte.<br><span class=\"chat-source-ref\" title=\"Kaléko, Gedichte\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Kaléko, Gedichte\">Q</span>"},{"type":"freetext","prompt":"Welcher Aspekt von Kalékos Leben oder Werk hat dich am meisten überrascht oder beeindruckt?"},{"type":"finale","text":"Wenn dich mein Leben interessiert, dann recherchiere doch weiter! Mehr über mich findest du im Internet.","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/zeitzeichen-mascha-kaleko-100.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Mascha_Kal%C3%A9ko"},{"label":"WDR 3 Kulturfeature zu Kaléko","url":"https://www1.wdr.de/radio/wdr3/programm/sendungen/wdr3-kulturfeature/dichterin-mascha-kaleko-100.html"}],"literature":["Jutta Rosenkranz: Mascha Kaléko. Biographie. dtv, München 2012.","Mascha Kaléko: Sämtliche Werke und Briefe in vier Bänden. Hrsg. von Jutta Rosenkranz. dtv, München 2012."]}] }, 'epochenchat_novalis': { name: 'Novalis', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/ wQ3BPQ8dfavrSK6j/s+Jl5DqCCcg7cd/Q18aadeCVUgkPzKfl9xX0B4R8XwS+B1ee62vp8RW4GSSAoPzEdyQM+5B471zxk6V0zvx8ViLV6ez38n2KXxV8UStFFokcgUNmWcjgKmTtX3zjJOeMd814bqepG6byoc+Uv4bv8A61WPE2vT6rqdzLIxDzPukGQfouR1wAB+FZUVs02PLALHHf8Az6U4U7v2kx1MR7Gj9Vpf9vPu+3oiEOcAZOBzjtTWJPtTnwC2DntUea6DzWKKlQ9s1DnBqWMkn+uKTKjudLoN5IENuSSB8yHdj6j8ufworL0+VoblGAGc4yaK82vTXPdI9Cm/d1KhnyxJAxmqzNuYnpSueMd6j6elekkcU5N6CnrTaU8ik6mmZMSpRPII/KDHZnOPeozSUC2LC2xMTyrLHuTnyycMR6jse3v7YBrVh1u6tNKmgLHNxgMpPBAOQSOmc9+vvgnOWjyTlY1QMw5yBzgDkn8Ov0pLuGaGZlm2s2eWVw4/MEiolFS0kb0q0qSbh1IwGnl6jcx5LNj8yaNrbSR0HXkUkWVcMGVSOfmGQfwwc1I0uIzGI4+v3wDn/P4VZivMjJyKNwAxgdaaSaSgTHdaki5qIe9SI3PBoZUdy5A21s9xRTInZTxj86KwnG7OuL0KhPJzTc0UVuclwpwA2iiigENNJRRTRLHI2xg38qklmEoBOd3cmiiiw7tKxNEFnEau0ahBgZwuepwT1P1Pt7VVbG47Tx2ooqVuNiYpKKKolhT1oopDjuWIuTycUUUVmzqi9D//2Q==', source: 'https://de.wikipedia.org/wiki/Novalis#/media/Datei:Franz_Gareis_-_Novalis.jpg', theme: 'sebastian-wolf', modules: [{"type":"framing","content":"Du triffst gleich auf Novalis – oder besser: auf eine Konstruktion, die so spricht, wie er vielleicht geschrieben hätte. Novalis ist 1801 in Weißenfels gestorben. Was du hier liest, basiert auf seinen Texten, Fragmenten und Briefen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Aufklärung","start":1700,"end":1800,"active":false,"info":"Vernunft, Rationalismus, Fortschrittsglaube. Gegen diese Einseitigkeit richtet sich die Romantik."},{"name":"Französische Revolution","start":1789,"end":1799,"active":false,"info":"Novalis ist 17 – und von der Idee begeistert, Geschichte gestalten zu können."},{"name":"Novalis Leben","start":1772,"end":1801,"active":true,"info":"Geboren als Friedrich von Hardenberg in Oberwiederstedt im Harz. Gestorben in Weißenfels mit nur 28 Jahren."},{"name":"Frühromantik","start":1795,"end":1804,"active":false,"info":"Der Jenaer Kreis um Schlegel, Tieck und Novalis entwickelt ein neues Kunst- und Weltbild."}]},{"type":"persona","content":"Guten Tag. Ich bin Friedrich von Hardenberg – doch du kennst mich besser als Novalis. Diesen Namen haben schon meine Vorfahren aus dem 12. Jahrhundert getragen. Für mich war er Programm: Neuland roden, aufbrechen ins Unbekannte. Du lernst mich in der Schule? Das überrascht mich kaum. Ich wusste früh: Wir sind auf einer Mission. Zur Bildung der Erde sind wir berufen. <span class=\"chat-source-ref\" title=\"Blütenstaub-Fragment 32, 1798\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Blütenstaub-Fragment 32, 1798\">Q</span>"},{"type":"learner","content":"Novalis, das klingt geheimnisvoll. Wer warst du eigentlich?"},{"type":"context","content":"Friedrich von Hardenberg, genannt Novalis, wurde am 2. Mai 1772 in Oberwiederstedt im Harz geboren und pietistisch erzogen. Sein Vater war Direktor der Thüringer Salinen. Novalis studierte zunächst Jura mit Prädikatsexamen, dann Naturwissenschaften an der Bergakademie Freiberg; er wurde Bergbauingenieur, Philosoph und Dichter zugleich. Man beschreibt ihn als jemanden, der immer auf der Suche war, auf der Suche nach sich selbst und nach einer Bestimmung; und das alles mit Mitte zwanzig. Mit 28 Jahren starb er, wie seine Verlobte vor ihm, an Tuberkulose."},{"type":"persona","content":"Ich gehörte zu einer goldenen Generation. Schlegel, Hölderlin, Schelling, Beethoven, Hegel; wir alle waren zur selben Zeit geboren. Wir spürten: Die alte Welt nimmt Abschied. Friedrich Schlegel schrieb nach unserer ersten Begegnung an seinen Bruder, ich sei \"voll tätiger unruhiger Freude\" und hätte \"unbeschreiblich viel Feuer\". Ich wollte nicht nur Dichter sein; ich wollte alles wissen, alles verbinden. Erkenntnis war für mich eine unabschließbare Bewegung. <span class=\"chat-source-ref\" title=\"Brief Friedrich Schlegels an August Wilhelm Schlegel, ca. 1792\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Brief Friedrich Schlegels an August Wilhelm Schlegel, ca. 1792\">Q</span>"},{"type":"learner","content":"Und was wolltest du mit deiner Dichtung? Was ist dein Programm?"},{"type":"persona","content":"Die Welt muss romantisiert werden. So findet man den ursprünglichen Sinn wieder. Indem ich dem Gemeinen einen hohen Sinn gebe, dem Gewöhnlichen ein geheimnisvolles Ansehen, dem Bekannten die Würde des Unbekannten, dem Endlichen einen unendlichen Schein, so romantisiere ich es. Poesie ist für mich keine Freizeitbeschäftigung. Sie ist das, was die Wissenschaft nicht mehr kann: Die Lücken füllen, die Einheit von Mensch und Natur bewahren. <span class=\"chat-source-ref\" title=\"Novalis, Fragmente und Studien, ca. 1797/98\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Novalis, Fragmente und Studien, ca. 1797/98\">Q</span>"},{"type":"annotation","text":"Die Welt muss romantisiert werden. So findet man den ursprünglichen Sinn wieder. Indem ich dem Gemeinen einen hohen Sinn, dem Gewöhnlichen ein geheimnisvolles Ansehen, dem Bekannten die Würde des Unbekannten, dem Endlichen einen unendlichen Schein gebe, so romantisiere ich es.","prompt":"Markiere zentrale Begriffe des romantischen Programms.","targets":[{"word":"romantisieren","feedback":"Novalis meint damit eine Transformation der Wahrnehmung: das Alltägliche soll geheimnisvoll, das Bekannte fremd und bedeutungsvoll erscheinen."},{"word":"dem Endlichen einen unendlichen Schein geben","feedback":"Das Endliche (das Sterbliche, Greifbare) wird durch Poesie ins Unendliche (Ewige, Transzendente) gehoben – ein Kerngedanke der Romantik."}]},{"type":"quiz-single","question":"Was meint Novalis mit dem Programm \"Die Welt muss romantisiert werden\"?","options":[{"text":"Die Welt soll in Liebesgeschichten verwandelt werden.","correct":false,"feedback":null},{"text":"Das Alltägliche soll durch Poesie mit tieferem Sinn und Geheimnis aufgeladen werden.","correct":true,"feedback":"Genau! Novalis will durch Dichtung das Gewöhnliche transzendieren, ihm ein geheimnisvolles Ansehen geben."},{"text":"Die Naturwissenschaft soll durch Gefühl ersetzt werden.","correct":false,"feedback":"Nicht ganz. Novalis lehnt die Wissenschaft nicht ab, sondern will sie mit der Poesie verbinden."},{"text":"Deutschland soll politisch romantisiert, also nationalistisch geprägt werden.","correct":false,"feedback":null}]},{"type":"context","content":"Novalis gehörte zum Jenaer Kreis der Frühromantiker. Gemeinsam mit Friedrich und August Wilhelm Schlegel, Ludwig Tieck und anderen. In der Zeitschrift \"Athenäum\" (gegründet 1798 von den Schlegels) veröffentlichte Novalis seine Blütenstaub-Fragmente, für die er erstmals das Pseudonym Novalis verwendete. Das Fragment war für die Frühromantiker keine Notlösung, sondern bewusste Kunstform: Unvollständigkeit und Offenheit galten als Ausdruck eines unabgeschlossenen, ja unabschließbaren Denkens. Novalis selbst schrieb hoffnungsvoll über seine Fragmentsammlung: \"Es mag freilich manches Taubenkörnchen darunter sein, indessen, wenn nur einiges aufgeht.\" Dorothea Schlegel, die bei solchen Treffen dabei war, kommentierte die Gruppe trocken: \"Die Herren sind etwas toll. Ich will wetten, sie verstehen sich selbst nicht und einander nicht.\""},{"type":"learner","content":"Du hast dich auch mit der Sehnsucht beschäftigt. Warum so intensiv?"},{"type":"persona","content":"1794 verliebte ich mich in Sophie von Kühn. Sie war zwölf Jahre alt, ich zweiundzwanzig. Eine Viertelstunde hatte genügt, um mich zu entflammen. Doch sie erkrankte an Tuberkulose und starb mit fünfzehn. Ich war absolut lebensmüde. Ich glaubte ihr nachsterben zu müssen. Ich schrieb verliebt, ich schrieb melancholisch und fand mich schließlich in der ewigen Liebe, der ewigen Sehnsucht wieder. <span class=\"chat-source-ref\" title=\"Novalis, Tagebuch 1797 / Fragmente\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Novalis, Tagebuch 1797 / Fragmente\">Q</span>"},{"type":"quote","text":"Hinunter zu der süßen Braut,<br>Zu Jesus, dem Geliebten –<br>Getrost, die Abenddämmrung graut<br>Den Liebenden, Betrübten.<br>Ein Traum bricht unsre Banden los<br>Und senkt uns in des Vaters Schooß.","source":"Novalis, Hymnen an die Nacht, Hymne 6 (Sehnsucht nach dem Tode), 1800"},{"type":"context","content":"Die Hymnen an die Nacht (1800) entstanden im Gedenken an Sophie von Kühn. In sechs Hymnen – teils in rhythmischer Prosa, teils in Versform – erhebt Novalis die Nacht zum Gegenprinzip des aufgeklärten Tages: Sie steht für Traum, Tod, Liebe und Transzendenz. Das Werk gilt als einer der bedeutendsten lyrischen Texte der deutschen Frühromantik."},{"type":"annotation","text":"Muß immer der Morgen wiederkommen? Endet nie des Irdischen Gewalt? Unselige Geschäftigkeit verzehrt den himmlischen Anflug der Nacht. Wird nie der Liebe geheimes Opfer ewig brennen? Zugemessen ward dem Lichte seine Zeit; aber zeitlos und raumlos ist der Nacht Herrschaft.","prompt":"Markiere die romantische Licht-Nacht-Gegensatz-Struktur.","targets":[{"word":"Morgen / Licht","feedback":"Stehen für den aufgeklärten, rationalen Tag – das Irdische, Vergängliche, Begrenzte."},{"word":"Nacht","feedback":"Wird zum positiven Gegenpol: zeitlos, raumlos, dem Irdischen enthoben – ein romantischer Sehnsuchtsraum."}]},{"type":"barometer","statement":"Für Novalis ist die Nacht dem Tag überlegen.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"learner","content":"Und in deinem Roman? Was hat es mit der blauen Blume auf sich?"},{"type":"persona","content":"Im Heinrich von Ofterdingen, meinem Romanfragment, erscheint meinem Helden im Traum eine Blume. Eine blaue Blume. Die Blütenblätter zeigen einen ausgebreiteten Kragen, in dem ein zartes Gesicht schwebt. Er weiß nicht, was er sucht, aber er weiß, dass er suchen muss. Ich habe diesen Roman als Gegenentwurf zu Goethes Wilhelm Meister gedacht. Denn das Romantische geht im Wilhelm Meister zugrunde, auch das Wunderbare. <span class=\"chat-source-ref\" title=\"Novalis, Heinrich von Ofterdingen, Fragment, ca. 1799/1800\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Novalis, Heinrich von Ofterdingen, Fragment, ca. 1799/1800\">Q</span>"},{"type":"context","content":"Der Heinrich von Ofterdingen ist Novalis' unvollendeter Bildungsroman (Fragment, ca. 1799/1800) und das Fragmentarische ist hier Programm: Für die Frühromantiker war das offene, nie abgeschlossene Kunstwerk die einzig ehrliche Form, weil das Streben nach dem Unendlichen niemals zu einem Ende kommen kann. Im Gegensatz zu Goethes Entwicklungsroman Wilhelm Meister, den Novalis kritisierte, stellt sein Werk nicht die bürgerliche Bildung, sondern die Poesie selbst ins Zentrum. Die blaue Blume, nach der Heinrich sich sehnt, wurde zum Schlüsselsymbol der gesamten Romantik. Sie hat kein eindeutiges Ziel: Sie steht für Sehnsucht, Unendlichkeit, das ewig Unerreichbare und verbindet Liebes- und Todessehnsucht in einem einzigen Bild. Blau und die geheimnisvolle Nacht sind bei Novalis zu Chiffren für Gegenwelten, für Freiheitsträume, für Sehnsuchtsräume geworden; doch sind sie keine persönlichen Chiffren geblieben, sie wurden dauerhaft, zu Symbolen der Sehnsucht, die bis heute wirken."},{"type":"annotation","text":"Endlich wollte er sich ihr nähern, als sie auf einmal sich zu bewegen und zu verändern anfing. Die Blume neigte sich nach ihm zu und die Blütenblätter zeigten einen blauen ausgebreiteten Kragen, in welchem ein zartes Gesicht schwebte.","prompt":"Markiere, was die Bildlichkeit der blauen Blume.","targets":[{"word":"blaue Blume","feedback":"Blau ist die Farbe des Unendlichen, des Himmels, der Ferne. Die Blume ist kein erreichbares Ziel, sondern das Symbol der Sehnsucht selbst nach Liebe, Transzendenz und dem Ungreifbaren."},{"word":"zartes Gesicht","feedback":"Die Blume verwandelt sich in ein Gesicht, doch das Begehrte bleibt unscharf, traumhaft. Viele Interpreten sehen hier Sophie von Kühn gespiegelt."}]},{"type":"quiz-single","question":"Was symbolisiert die blaue Blume im Heinrich von Ofterdingen?","options":[{"text":"Sehnsucht, das Unendliche und das Unerreichbare – ein romantisches Wunschbild.","correct":true,"feedback":"Richtig! Die blaue Blume wurde zum zentralen Symbol der gesamten deutschen Romantik."},{"text":"Die Schönheit der Natur im realistischen Sinne.","correct":false,"feedback":null},{"text":"Den politischen Widerstand gegen den Staat.","correct":false,"feedback":null},{"text":"Die Vernunft und Klarheit der Aufklärung.","correct":false,"feedback":"Das ist das Gegenteil. Die blaue Blume steht für das, was die Aufklärung nicht erfassen kann."}]},{"type":"quiz-multi","question":"Welche der folgenden Aussagen über Novalis sind korrekt?","options":[{"text":"Novalis ist ein Pseudonym; bürgerlicher Name: Friedrich von Hardenberg.","correct":true,"feedback":"Korrekt! Der Name bezieht sich auf einen Vorfahren und impliziert das Nutzbarmachen von Neuland."},{"text":"Novalis starb mit 28 Jahren an Tuberkulose.","correct":true,"feedback":"Korrekt! Wie schon seine Verlobte Sophie von Kühn."},{"text":"Novalis schrieb einen vollendeten Bildungsroman.","correct":false,"feedback":"Nicht korrekt. Der Heinrich von Ofterdingen blieb bewusst Fragment. Die Unabschließbarkeit war Prinzip."},{"text":"Die blaue Blume wurde zum Symbol der gesamten deutschen Romantik.","correct":true,"feedback":"Korrekt! Sie steht für Sehnsucht, Unendlichkeit und das Unerreichbare."},{"text":"Novalis lehnte Naturwissenschaften und Philosophie ab.","correct":false,"feedback":"Falsch. Er war Bergbauingenieur und philosophischer Denker zugleich. Er wollte alles verbinden."}]},{"type":"freetext","prompt":"Novalis war gleichzeitig Bergbauingenieur, Philosoph und Dichter. Charakterisiere das Weltbild, das diesen Facetten entspringt."},{"type":"checkpoint","question":"Erkläre begründet, was Novalis mit \"Romantisierung der Welt\" meint."},{"type":"self-assessment","items":["Ich verstehe, was Novalis mit dem Programm der Romantisierung meint","Ich kann die blaue Blume als Symbol erklären","Ich kenne die Bedeutung von Sophies Tod für Novalis' Werk","Ich kann das Fragment als romantische Kunstform erläutern","Ich kann Novalis in den Kontext der Frühromantik einordnen"]},{"type":"persona","content":"Wer es nicht unmittelbar weiß und fühlt, was Poesie ist, dem lässt sich kein Begriff davon beibringen. Es ist das der eigentliche Prüfstein jedes Lesers. Nicht das Wissen, das Fühlen. Und das Fragen.<br><span class=\"chat-source-ref\" title=\"Novalis, Fragmente und Studien\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: Novalis, Fragmente und Studien\">Q</span>"},{"type":"finale","text":"Wenn dich mein Leben und Werk interessieren, dann recherchiere weiter! Mehr über mich findest du hier:","links":[{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/mediathek/audio/zeitzeichen/audio-novalis-dichter-geburtstag--100.html"},{"label":"Deutschlandfunk: Novalis – Die Romantisierung der Welt","url":"https://www.deutschlandfunk.de/novalis-die-romantisierung-der-welt-100.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Novalis"}],"literature":["Herbert Uerlings: Novalis. Reclam, Stuttgart 1998.","Gerhard Schulz: Novalis. Biographie. C.H. Beck, München 1969/2011."]}] }, 'epochenchat_schiller': { name: 'Schiller', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDDjVN8ZKEHBj6AZzgD26D 8kjQGcAJAm1QX79Py4oooAsRbTGCpznJbjOB0NVp5FijKgYYk5B5wP5Z/lmiihbjMqUljv3cknvz+NadnbedahtzJH90kdz6fTv8A5FFFE3ZaBBXZrwNjoSoAwAvSiiiuVnSf/9k=', source: 'https://de.wikipedia.org/wiki/Friedrich_Schiller#/media/Datei:Friedrich_Schiller_by_Ludovike_Simanowiz.jpg', theme: 'sebastian-wolf', modules: [{"type":"framing","content":"Du triffst gleich auf Friedrich Schiller – oder besser: auf eine Konstruktion, die so spricht, wie er vielleicht geschrieben hätte. Schiller selbst ist 1805 in Weimar gestorben. Was du hier liest, basiert auf seinen Dramen, Gedichten und Briefen, ist aber eine didaktische Interpretation. Lies kritisch!"},{"type":"timeline","epochs":[{"name":"Schillers Leben und Tod","start":1759,"end":1805,"active":true,"info":"Geboren in Marbach am Neckar. Gestorben in Weimar mit 45 Jahren."},{"name":"Karlsschule","start":1772,"end":1780,"active":false,"info":"Militärakademie unter Herzog Karl Eugen. Drill, Unterdrückung – und heimliches Schreiben."},{"name":"Sturm und Drang","start":1767,"end":1785,"active":false,"info":"Rebellion gegen Autorität, Freiheitsdrang, Leidenschaft. Die Räuber als Höhepunkt."},{"name":"Weimarer Klassik","start":1786,"end":1805,"active":false,"info":"Freundschaft mit Goethe. Wallenstein, Maria Stuart, Wilhelm Tell, Die Jungfrau von Orléans."}]},{"type":"persona","content":"Guten Tag. Ich bin Johann Christoph Friedrich Schiller. Dass ich je Nationaldichter werden würde, hätte mir in meiner Jugend niemand geglaubt; meine Lehrer hielten mich für faul und verträumt. Dabei las ich nachts heimlich Shakespeare, Klopstock und Goethes Werther, während ich tagsüber im Drill der Karlsschule steckte. Manchmal, so erinnert sich ein Freund, deklamierte ich meine Texte und tanzte dazu nachts im Schlafsaal. Wer weiß, vielleicht war das schon Theater. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"learner","content":"Was war das für eine Schule, diese Karlsschule?"},{"type":"context","content":"Friedrich Schiller wurde am 10. November 1759 in Marbach am Neckar im Herzogtum Württemberg geboren. Mit 13 Jahren wurde er auf Befehl von Herzog Karl Eugen in dessen Fürstenakademie, die sogenannte Karlsschule in Stuttgart, aufgenommen. Dort studierte er zunächst Jura, später Medizin, um Militärarzt zu werden. Der Herzog ließ sich \"Vater\" nennen und verlangte, dass die Eltern beim Eintritt alle Rechte an ihren Kindern an ihn abtraten. Schiller litt unter dem Verlust seiner Familie und der strengen autoritären Zucht; Erfahrungen, die direkt in sein erstes Drama einflossen. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 13.01.2022; WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 13.01.2022; WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"persona","content":"Die Karlsschule war eine allzu autoritäre Umgebung, die mich presste und unterdrückte! Schreiben war für mich Befreiung, aber nie ein leichtes Fließen. Ein Freund beobachtete: \"Es ist ein wahres Pressen und Herauspumpen.\" Aber die Kraft kam aus genau diesem Druck heraus. Mit 18, 19 Jahren gelingt mir etwas, das die deutsche Bühne bis dahin nicht kannte: Die Räuber. Rasant, wortgewaltig, respektlos. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"quote","text":"Mir ekelt vor diesem Tintenklecksenden Säkulum. Pfui über das schlaffe Kastraten Jahrhundert. Das Gesetz hat noch keinen großen Mann gebildet, aber die Freiheit brütet Kolosse und Extremitäten aus.","source":"Friedrich Schiller, Die Räuber, I/2 (1781), Karl Moor"},{"type":"learner","content":"Was passiert in den Räubern eigentlich genau?"},{"type":"context","content":"Die Räuber (1781/1782) erzählt die Geschichte zweier Brüder: Franz Moor, der Jüngere, manipuliert den Vater und treibt Karl, den älteren, bevorzugten Erstgeborenen, durch eine Intrige aus dem Haus. Karl Moor schließt sich aus Schmerz und Idealismus einer Räuberbande an; er kämpft für die Armen und gegen die Obrigkeit. Doch wie so vielen Idealisten geht es auch Karl und seiner Bande schlecht: Sie scheitern und richten mehr Schaden an als Nutzen. Am Ende übergibt sich Karl der Staatsgewalt. Die Hälfte der Bande ist tot. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"annotation","text":"Menschen, Menschen, falsche heuchlerische Krokodilbrut. Ihre Augen sind Wasser, ihre Herzen sind Erz. Küsse auf den Lippen, Schwerter im Busen.","prompt":"Markiere sprachliche Mittel, die Karls Weltbild zeigen.","targets":[{"word":"Krokodilbrut","feedback":"Tiermetapher für verlogene Gesellschaft; aggressiv, archaisch, nicht verhandelbar. Typisch für den Furor des Sturm und Drang."},{"word":"Augen sind Wasser, Herzen sind Erz","feedback":"Antithese aus weichen Oberflächen und harten Kernen verweist auf die wahrgenommene Heuchelei."}]},{"type":"quiz-single","question":"Wie endet Karl Moors Geschichte in den Räubern?","options":[{"text":"Er siegt über seinen Bruder und kehrt zum Vater zurück.","correct":false,"feedback":null},{"text":"Er flieht in die Böhmischen Wälder und bleibt unangetastet.","correct":false,"feedback":null},{"text":"Er übergibt sich der Staatsgewalt, damit ein armer Tagelöhner das Kopfgeld erhält.","correct":true,"feedback":"Richtig! Karl Moor scheitert als Idealist, behält aber am Ende einen Rest moralischer Haltung."},{"text":"Er und seine Bande triumphieren über die Unterdrücker.","correct":false,"feedback":null}]},{"type":"persona","content":"Bei der Uraufführung am 13. Januar 1782 in Mannheim bricht ein Sturm los. Rollende Augen, geballte Fäuste, stampfende Füße, heisere Aufschreie. Fremde Menschen fielen einander in die Arme. Frauen wankten einer Ohnmacht nahe zur Türe. Das nennt man Wirkung. Dass der Intendant die Handlung ins Mittelalter verlegt hatte, um das Stück politisch zu entschärfen, half da wohl nicht; das Publikum ließ sich nicht täuschen. Es spürte den rebellischen Geist genau. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 13.01.2022; WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 13.01.2022; WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"barometer","statement":"Karl Moor ist trotz seiner Verbrechen eine sympathische Figur.","min":"stimme nicht zu","max":"stimme voll zu"},{"type":"learner","content":"Hat dir das Stück nicht Ärger eingebracht?"},{"type":"context","content":"Als Herzog Karl Eugen erfuhr, dass Schiller ohne seine Erlaubnis zur Uraufführung nach Mannheim gereist war, bestrafte er ihn mit 14 Tagen Arrest und einem Ausreiseverbot. Als Schiller sich auch darüber hinwegsetzte, untersagte ihm der Herzog jede schriftstellerische Tätigkeit. Diese Strafe trieb Schiller im September 1782 in die Flucht nach Mannheim. \"Die Räuber kosteten mir Familie und Vaterland\", sagte er selbst. Zugleich begründeten sie seinen Ruhm: Das Stück wurde in München, Frankfurt, Hamburg, Erfurt, Weimar, Leipzig und Berlin gespielt und überall gefeiert. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 13.01.2022\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 13.01.2022\">Q</span>"},{"type":"persona","content":"Ich wurde hart bestraft, schließlich zur Flucht getrieben, die ich viel zu lange meinem Vater zuliebe aufgeschoben hatte. Nun war ich völlig gebrochen: heimatlos, ehrlos, brotlos. Und krank, fast immer war ich krank. Durch die erzwungene Geheimnistuerei hatte ich mir im sumpfigen Klima Mannheims eine schwere Lungenerkrankung zugezogen. Kurz: Es schien mir recht wirklich eine Katastrophe zu sein. Kein Geld, keine Gesundheit, kein Vaterland mehr. Ich war am Ende. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"learner","content":"War das nicht die Zeit, in der die Ode an die Freude entstand? Wie passt das zu dieser persönlichen Vernichtung?"},{"type":"persona","content":"Ich war am Boden. Aber dann erlebte ich eine herrlichste Überraschung: Ich bekomme Pakete aus Leipzig und finde von vier ganz fremden Personen Briefe voll Wärme und Leidenschaft für meine Schriften. Sie laden mich nach Sachsen ein. Ein solches Geschenk war mir die einzige nötige Entschädigung für tausend trübe Minuten. Neun Tage dauerte die Reise. Mit 26 Jahren komme ich den Orten näher, in denen ich der werde, der ich bin: Jena. Weimar. Rudolfstadt. Dank meiner Freude fasse ich neuen Mut! <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"freetext","prompt":"Schiller verliert durch Die Räuber sein Vaterland, gewinnt aber Ruhm und neue Freunde. Wie beurteilst du diesen Tausch?"},{"type":"context","content":"1785, mit 26 Jahren, schreibt Schiller die Ode an die Freude; ein Gedicht, das durch Ludwig van Beethovens 9. Sinfonie Weltgeltung erlangt und heute als Melodie der Europahymne erklingt. Es entsteht in einer Phase persönlichen Aufbruchs: Schiller hat die Enge Württembergs hinter sich gelassen und spürt zum ersten Mal die Möglichkeit einer freien bürgerlichen Existenz. Gleichzeitig berichten die Freunde, dass ihm die Worte nie zuflogen, sondern immer hart erarbeitet werden mussten. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"quote","text":"Freude, schöner Götterfunken, Tochter aus Elysium. Wir betreten feuertrunken, Himmlische, dein Heiligtum. Deine Zauber binden wieder, was die Mode streng geteilt. Bettler werden Fürstenbrüder, wo dein sanfter Flügel weilt.","source":"Friedrich Schiller, An die Freude (1785)"},{"type":"annotation","text":"Bettler werden Fürstenbrüder, wo dein sanfter Flügel weilt.","prompt":"Markiere die Bilder, die das politische Ideal zeigen.","targets":[{"word":"Bettler werden Fürstenbrüder","feedback":"Soziale Utopie: Freude und Freundschaft hebt alle Standesunterschiede auf; kein Gesetz, keine Herkunft, nur das gemeinsame Gefühl."},{"word":"sanfter Flügel","feedback":"Die Freude wirkt nicht durch Gewalt oder Revolution, sondern durch eine zärtliche, fast fragile Kraft; ein Gegenbild zu Karls Furor in den Räubern."}]},{"type":"quiz-multi","question":"Welche Aussagen über die Ode an die Freude sind korrekt?","options":[{"text":"Sie entstand 1785, als Schiller 26 Jahre alt war.","correct":true,"feedback":"Korrekt! Es war eine Phase des persönlichen Aufbruchs nach der Flucht aus Württemberg."},{"text":"Beethoven vertonte sie Jahrzehnte nach Schillers Tod in seiner 9. Sinfonie.","correct":true,"feedback":"Korrekt! Beethoven hatte Schiller von Jugend an verehrt."},{"text":"Die Ode ist Schillers bekanntestes Drama.","correct":false,"feedback":"Falsch. Es ist ein Gedicht, kein Drama."},{"text":"Die Melodie der Ode an die Freude ist heute die Europahymne.","correct":true,"feedback":"Korrekt! Die EU übernahm Beethovens Vertonung als ihr musikalisches Symbol."},{"text":"Das Gedicht entstand während Schillers Zeit in der Karlsschule.","correct":false,"feedback":null}]},{"type":"persona","content":"In Jena wurde ich Professor für Geschichte; ohne Honorar, ich verabscheute ohnehin Menschen, die nur des Geldes wegen geistig arbeiten. Sklavenseelen im Reiche der vollkommenen Freiheit, nannte ich sie. Mich unterstützten meine Freunde. Der Großherzog von Weimar Karl August verschaffte mir schließlich ein kleines Einkommen, auf Empfehlung eines späteren Freundes. So konnte ich Charlotte von Lengefeld heiraten. Und dann die wichtigste Freundschaft meines Lebens finden: Goethe. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"learner","content":"Wie war die Freundschaft mit Goethe zustandegekommen; ihr wart doch sehr verschieden?"},{"type":"context","content":"Die Freundschaft zwischen Schiller und Goethe begann nach Jahren gegenseitiger Distanz und sogar persönlicher Abneigung, als beide gemeinsam eine Literaturzeitschrift planen. Schiller schrieb an Goethe: \"Ich bitte nur um die leidige Freiheit, bei Ihnen krank sein zu dürfen.\" Goethe – der sonst allen körperlichen Leiden aus dem Weg ging – unterstützte ihn sogar in akuten Krankheitsphasen. Für Goethe war diese Freundschaft existenziell: \"Sie haben mir eine zweite Jugend verschafft und mich wieder zum Dichter gemacht, welcher zu sein ich so gut wie aufgehört hatte.\" Erst durch Schillers Inspiration nahm Goethe die Arbeit am Faust wieder auf. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"persona","content":"Die Freundschaft zu Goethe war nicht leicht entstanden. Wir waren uns zunächst in inniger Abneigung begegnet und hielten nicht viel voneinander. Doch eines Abends führten wir ein ganz vortreffliches Gespräch über Goethes Ansichten zur \"Metamorphose der Pflanzen\". Wenig später verband uns ein unzertrennliches Band der innigsten Freundschaft."},{"type":"quote","text":"Der Mensch spielt nur, wo er in voller Bedeutung des Worts Mensch ist, und er ist nur da ganz Mensch, wo er spielt.","source":"Friedrich Schiller, Über die ästhetische Erziehung des Menschen (1795)"},{"type":"freetext","prompt":"Der Mensch ist nur ganz Mensch, wenn er spielt - Erkläre diese These mit eigenen Worten und nenne ein Beispiel aus deinem Alltag."},{"type":"context","content":"In den letzten Jahren seines Lebens schreibt Schiller – seinem kranken Körper abgerungen – jedes Jahr ein großes Drama: Wallenstein (1799), Maria Stuart (1800), Die Jungfrau von Orléans (1801), Wilhelm Tell (1804). Keinen der Schauplätze von Böhmen über England, Frankreich bis in die Schweiz hat er je besucht, trifft dank intensiver Recherchen dennoch bemerkenswert sicher. Schiller stirbt am 9. Mai 1805 in Weimar, gerade 45 Jahre alt. Goethe überlebt ihn um 27 Jahre und verteidigt ihn zeitlebens gegen jede Kritik. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"persona","content":"Man erinnert sich an mich heute vor allem als den Dichter der Freiheit. Aber Freiheit war nie abstrakt für mich; sie war immer konkret, erkämpft, bezahlt. Mit 1,90 Meter war ich übrigens der Größere von uns beiden. Auf dem Denkmal vor dem Weimarer Theater hat man mich etwas kleiner gemacht, damit Goethe und ich gleich groß dastehen. Im Erz hat man uns auf Augenhöhe gebracht. Das amüsiert mich nun doch ein wenig. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"checkpoint","question":"Erkläre, inwiefern Schillers eigene Biografie in Die Räuber eingeflossen ist und warum das Stück bis heute immer wieder neu inszeniert wird."},{"type":"self-assessment","items":["Ich kann die Entstehungsbedingungen von Schillers Räubern erläutern","Ich verstehe den Unterschied zwischen Karl und Franz Moor als Figurenkonzepte","Ich kann das Drama im Kontext des Sturm und Drang einordnen","Ich kenne Schillers Weg vom Sturm und Drang zur Weimarer Klassik","Ich weiß, was die Ode an die Freude mit Schillers Leben zu tun hat"]},{"type":"persona","content":"Man hat mich einen Idealisten, einen Dichter der Freiheit genannt. Vielleicht zu Recht. Die Frage, die mein gesamtes Werk durchzieht, ist ja eben diese Frage: Wie weit darf der Kampf für Gerechtigkeit gehen? Wo endet die Freiheit des Einen und beginnt die Freiheit des Anderen? Die Antwort muss das Publikum selbst finden. <span class=\"chat-source-ref\" title=\"WDR Zeitzeichen, 10.11.2024\" tabindex=\"0\" role=\"button\" aria-label=\"Quelle: WDR Zeitzeichen, 10.11.2024\">Q</span>"},{"type":"freetext","prompt":"Schiller zeigt Freiheit als Ideal, an dem Figuren scheitern. Recherchiere aktuelle Beispiele – aus Politik, Gesellschaft oder deinem Alltag – wo ein ähnlicher Konflikt sichtbar wird."},{"type":"finale","text":"Wenn dich mein Leben und Werk interessieren, dann recherchiere weiter!","links":[{"label":"WDR Zeitzeichen: Uraufführung Die Räuber (13.01.2022)","url":"https://www1.wdr.de/mediathek/audio/zeitzeichen/audio-urauffuehrung-von-schillers-drama-die-raeuber-am-13-januar-1782-100.html"},{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/zeitzeichen-friedrich-schiller-102.html"},{"label":"WDR Zeitzeichen","url":"https://www1.wdr.de/radio/wdr5/sendungen/zeitzeichen/urauffuehrung-raeuber-schiller-100.html"},{"label":"Wikipedia","url":"https://de.wikipedia.org/wiki/Friedrich_Schiller"}],"literature":["Peter-André Alt: Schiller. Leben – Werk – Zeit. 2 Bde. Beck, München 2000.","Rüdiger Safranski: Schiller oder Die Erfindung des Deutschen Idealismus. Hanser, München 2004."]}] }, 'epochenchat_sophie_von_la_roche': { name: 'Sophie von La Roche', avatar: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoE
