// Build flat render segments: [{text, col}]
function buildTickerSegments(){
  const segs=[];
  TICKER.forEach(item=>{
    segs.push({text:'  ['+item.g+'] ', col:item.gc});
    segs.push({text:item.t, col:C.WH});
    segs.push({text:'  ['+item.y+']', col:C.DG});
    segs.push({text:'   ?', col:C.CY});
  });
  return segs;
}
const TICKER_SEGS=buildTickerSegments();

// Precompute total width
function segWidth(seg){ return seg.text.length*7; }
const TICKER_TOTAL=TICKER_SEGS.reduce((s,g)=>s+segWidth(g),0);

function drawMarquee(){
  box(0,382,W,18,C.BK);
  ctx.strokeStyle=C.CY; ctx.lineWidth=1; ctx.strokeRect(0,382,W,18);
  mqX-=0.50; if(mqX<-TICKER_TOTAL) mqX=W;
  // Draw two loops
  [0,1].forEach(loop=>{
    let cx=~~mqX+loop*TICKER_TOTAL;
    TICKER_SEGS.forEach(seg=>{
      const w=segWidth(seg);
      if(cx+w>0 && cx<W){
        ctx.save(); ctx.font='8px monospace'; ctx.imageSmoothingEnabled=false;
        ctx.fillStyle=seg.col; ctx.fillText(seg.text, cx, 383+8); ctx.restore();
      }
      cx+=w;
    });
  });
}

function playBellTone(){
  try{
    const a=ac();
    [523,659,784,1047].forEach((f,i)=>{
      const o=a.createOscillator(), g=a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type='sine'; o.frequency.value=f;
      const t0=a.currentTime+i*0.18;
      g.gain.setValueAtTime(0,t0);
      g.gain.linearRampToValueAtTime(0.18,t0+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t0+1.4);
      o.start(t0); o.stop(t0+1.5);
    });
  }catch(e){}
}

function playFarbeSound(){
  try{
    const a=ac();
    // slow ascending sine sweep � "prismatic"
    const osc=a.createOscillator(), g=a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(180, a.currentTime);
    osc.frequency.linearRampToValueAtTime(720, a.currentTime+3.5);
    g.gain.setValueAtTime(0,a.currentTime);
    g.gain.linearRampToValueAtTime(0.10,a.currentTime+0.4);
    g.gain.setValueAtTime(0.10,a.currentTime+3.0);
    g.gain.linearRampToValueAtTime(0,a.currentTime+3.6);
    osc.start(a.currentTime); osc.stop(a.currentTime+3.7);
  }catch(e){}
}
function eggFARBE(){
  if(!FARBE.snd){ playFarbeSound(); FARBE.snd=true; }
  FARBE.timer++;
  const t2=FARBE.timer;

  // Phase 0: sky slowly shifts through spectrum (120 frames)
  // Phase 1: DOS window slides in (frames 80-160)
  // Phase 2: loading bar fills (frames 160-340)
  // Phase 3: Newton text + punchline (frames 340-480)
  // Phase 4: fade out (frames 480-520)

  if(t2<20) FARBE.phase=0;
  else if(t2<160) FARBE.phase=1;
  else if(t2<360) FARBE.phase=2;
  else if(t2<500) FARBE.phase=3;
  else FARBE.phase=4;

  // -- Spectral sky overlay --
  const prog=Math.min(1, t2/480);
  for(let y=0;y<185;y++){
    const base=y/185;
    // hue cycles 0..300 degrees across sky height, shifted by timer
    const hue=(base*280 + t2*0.8) % 360;
    const sat=Math.min(100, prog*100);
    const light=Math.max(8, 18-base*10);
    ctx.fillStyle=`hsl(${hue},${~~sat}%,${~~light}%)`;
    ctx.fillRect(0,y,W,1);
  }
  // Stars still visible but tinted
  STARS.forEach(s=>{
    if(Math.sin(T*.0012+s.ph)>0.2){
      const hue2=(s.x+T*.5)%360;
      ctx.fillStyle=`hsl(${hue2},90%,75%)`;
      ctx.fillRect(~~s.x,~~s.y,s.s,s.s);
    }
  });
  drawMoon();

  // -- Phase 1+: DOS window --
  if(FARBE.phase>=1){
    const winY=Math.max(30, 30 + Math.max(0,(80-t2)*3));
    const dw=420, dh=130, dx=~~((W-dw)/2);
    box(dx+4,winY+4,dw,dh,C.BK);
    box(dx,winY,dw,dh,C.BL);
    ctx.strokeStyle=C.WH; ctx.lineWidth=2; ctx.strokeRect(dx+1,winY+1,dw-2,dh-2);
    box(dx+2,winY+2,dw-4,16,C.LG);
    ctx.strokeStyle=C.DG; ctx.lineWidth=1; ctx.strokeRect(dx+2,winY+2,dw-4,16);
    px('  FARBENLEHRE.EXE',dx+4,winY+1,C.BK,1);
    box(dx+dw-15,winY+3,12,12,C.LG);
    ctx.strokeStyle=C.BK; ctx.strokeRect(dx+dw-15,winY+3,12,12);
    px('X',dx+dw-12,winY+2,C.BK,1);
    px('C:\WEIMAR\GOETHE> FARBENLEHRE.EXE',dx+8,winY+22,C.WH,1);
    px('Initialisiere Spektralanalyse...',dx+8,winY+38,C.LC,1);

    // -- Phase 2: loading bar --
    if(FARBE.phase>=2){
      const barProg=Math.min(1,(t2-160)/200);
      const barW=~~(barProg*320);
      px('Lade Farbspektrum:',dx+8,winY+54,C.WH,1);
      box(dx+8,winY+66,320,12,C.DG);
      // Rainbow loading bar
      for(let i=0;i<barW;i++){
        const h=~~(i/320*300);
        ctx.fillStyle=`hsl(${h},100%,55%)`;
        ctx.fillRect(dx+8+i,winY+66,1,12);
      }
      ctx.strokeStyle=C.WH; ctx.lineWidth=1; ctx.strokeRect(dx+8,winY+66,320,12);
      const pct=~~(barProg*100);
      px(pct+'%',dx+334,winY+66,C.YE,1);
      if(barProg>=1){
        px('Spektrum vollst�ndig geladen. [OK]',dx+8,winY+82,C.LN,1);
      }
    }
    // -- Phase 3: Newton verdict --
    if(FARBE.phase>=3){
      px('Ergebnis: Newton hatte UNRECHT.',dx+8,winY+98,C.LR,1);
      if(blink) px('(laut Goethe, 1810)',dx+8,winY+114,C.YE,1);
    }
  }

  // -- Phase 4: fade --
  if(FARBE.phase===4){
    ctx.globalAlpha=Math.max(0, 1-(t2-480)/40);
  }
  if(t2>520){
    ctx.globalAlpha=1;
    EGG=null;
    FARBE={timer:0,phase:0,barW:0,hue:0,snd:false};
  }
}

  requestAnimationFrame(loop);
}
